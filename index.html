<!--
=============================================================
PATCH META ADS — Gasto por período no Dashboard + Auto-sync
=============================================================

O QUE FAZ:
  1. Card "Gastos com Anúncios" agora acompanha o filtro do Dashboard
     (Hoje / Ontem / Esta Semana / Este Mês / Este Ano / meses passados)
  2. Sincronização automática do Meta Ads a cada 30 min em background

COMO APLICAR (é uma cola só, sem mexer no código antigo):

  1. Abre index.html no GitHub → botão Edit (✏️)
  2. Ctrl+F busca por:   </body>
  3. Cole TODO o bloco abaixo (do <script> até </script>) LOGO ANTES do </body>
  4. Commit changes
  5. Espera 30s o Vercel republicar
  6. Ctrl+Shift+R no ERP
  7. Métricas → 🔄 Sincronizar Agora (uma vez, pra popular o cache)
  8. Volta pro Dashboard e troca entre os filtros — vai atualizar o gasto

Se quiser desligar depois: remove esse bloco.
=============================================================
-->

<script>
(function(){
  'use strict';

  // Espera o app carregar antes de instalar o patch
  function waitForApp(cb){
    if(typeof syncMetaAds==='function'&&typeof render==='function'){cb();return;}
    setTimeout(()=>waitForApp(cb),300);
  }

  waitForApp(function(){
    console.log('[Patch Meta Ads] Instalando...');

    // Guarda referência à syncMetaAds original (pra chamar dentro da nova versão)
    const _originalSync=window.syncMetaAds;

    // ====================================================================
    // NOVA syncMetaAds — pré-busca gasto de vários períodos numa call só
    // ====================================================================
    window.syncMetaAds=async function(){
      const token=state.config.metaToken;
      let account=state.config.metaAdAccount;
      if(!token||!account){alert('Configure o token e Ad Account ID primeiro.');return;}
      if(!account.startsWith('act_'))account='act_'+account;
      setSyncStatus('syncing');

      const isAuto=window._adsAutoTick===true;
      window._adsAutoTick=false;
      if(!isAuto)showToast('⏳ Sincronizando Meta Ads...','or');

      try{
        if(!window._adsPer)window._adsPer='hoje';

        // Datas locais (fuso do navegador)
        const todayD=localDate(0);
        const yesterdayD=localDate(-1);
        const since7=localDate(-6);
        const since30=localDate(-29);
        const firstDayD=new Date(new Date().getFullYear(),new Date().getMonth(),1).toLocaleDateString('fr-CA');
        const firstDayYearD=new Date(new Date().getFullYear(),0,1).toLocaleDateString('fr-CA');

        // Períodos que a Dashboard pode selecionar
        const preCache={
          hoje:{since:todayD,until:todayD},
          ontem:{since:yesterdayD,until:yesterdayD},
          '7d':{since:since7,until:todayD},
          week:{since:since7,until:todayD},
          '30d':{since:since30,until:todayD},
          mes:{since:firstDayD,until:todayD},
          month:{since:firstDayD,until:todayD},
          ano:{since:firstDayYearD,until:todayD},
          year:{since:firstDayYearD,until:todayD}
        };

        // Custom (personalizado no card do Meta Ads)
        const per=window._adsPer;
        if(per==='custom'){preCache.custom={since:window._adsSince||todayD,until:window._adsUntil||todayD};}

        // Se dashboard está em mês/ano específico do passado, busca também
        if(typeof dashMonth==='number'&&typeof dashYear==='number'){
          const dm=dashMonth,dy=dashYear;
          const monthStart=new Date(dy,dm,1).toLocaleDateString('fr-CA');
          const monthEnd=new Date(dy,dm+1,0).toLocaleDateString('fr-CA');
          preCache['m_'+dy+'_'+dm]={since:monthStart,until:monthEnd};
        }
        if(typeof dashYear==='number'){
          const yStart=new Date(dashYear,0,1).toLocaleDateString('fr-CA');
          const yEnd=new Date(dashYear,11,31).toLocaleDateString('fr-CA');
          preCache['y_'+dashYear]={since:yStart,until:yEnd};
        }
        // Se está em modo "day" e o dia não é hoje/ontem, busca esse dia específico
        if(typeof dashPeriod!=='undefined'&&dashPeriod==='day'&&dashDay&&dashDay!==todayD&&dashDay!==yesterdayD){
          preCache['d_'+dashDay]={since:dashDay,until:dashDay};
        }

        const fields='spend,impressions,clicks,reach,cpm,cpc,actions,action_values,cost_per_action_type';
        function urlFor(range){
          const trStr='{"since":"'+range.since+'","until":"'+range.until+'"}';
          return 'https://graph.facebook.com/v19.0/'+account+'/insights?fields='+fields+'&time_range='+encodeURIComponent(trStr)+'&access_token='+token;
        }
        function getAction(actions,type){const a=(actions||[]).find(x=>x.action_type===type);return a?Number(a.value||0):0;}
        function getActionVal(av,type){const a=(av||[]).find(x=>x.action_type===type);return a?Number(a.value||0):0;}
        function getCPA(cpa,type){const a=(cpa||[]).find(x=>x.action_type===type);return a?Number(a.value||0):0;}
        function getFollows(actions){return getAction(actions,'instagram_profile_follow')||getAction(actions,'page_fan')||getAction(actions,'follow');}
        function summarize(insData){
          const d=(insData&&insData.data&&insData.data[0])||{};
          const leads=getAction(d.actions,'onsite_conversion.messaging_conversation_started_7d')||getAction(d.actions,'lead');
          const vendas=getAction(d.actions,'purchase')||getAction(d.actions,'omni_purchase');
          const valor=getActionVal(d.action_values,'purchase')||getActionVal(d.action_values,'omni_purchase');
          const follows=getFollows(d.actions);
          const cplRaw=getCPA(d.cost_per_action_type,'onsite_conversion.messaging_conversation_started_7d')||getCPA(d.cost_per_action_type,'lead');
          const spend=Number(d.spend||0);
          return {
            spend,impressions:Number(d.impressions||0),clicks:Number(d.clicks||0),
            reach:Number(d.reach||0),cpm:Number(d.cpm||0),cpc:Number(d.cpc||0),
            leads,vendas,valor,follows,
            cpl:cplRaw>0?cplRaw:(leads>0?spend/leads:0),
            cpf:follows>0&&spend>0?(spend/follows):0
          };
        }

        // Dispara todas em paralelo
        const periodKeys=Object.keys(preCache);
        const responses=await Promise.all(periodKeys.map(k=>fetch(urlFor(preCache[k])).then(r=>r.json()).catch(()=>({data:[{}]}))));
        const byPeriod={};
        periodKeys.forEach((k,i)=>{byPeriod[k]=summarize(responses[i]);});

        const dHoje=byPeriod.hoje||{};
        const dMes=byPeriod.mes||{};

        // Campanhas / adsets / ads — usa o período selecionado no card Meta Ads
        const adsRange=preCache[per]||preCache.hoje;
        const trStr='{"since":"'+adsRange.since+'","until":"'+adsRange.until+'"}';
        const campFields='name,status,insights.time_range('+trStr+'){spend,impressions,clicks,reach,actions,action_values,cost_per_action_type,cpm,ctr,frequency}';
        const adsetFields='name,status,campaign_id,insights.time_range('+trStr+'){spend,impressions,clicks,reach,actions,cost_per_action_type,cpm,ctr,frequency}';
        const adFields='name,status,adset_id,campaign_id,creative{name,thumbnail_url},insights.time_range('+trStr+'){spend,impressions,clicks,reach,actions,cost_per_action_type,cpm,ctr,frequency}';
        const [rCamp,rAdsets,rAds]=await Promise.all([
          fetch('https://graph.facebook.com/v19.0/'+account+'/campaigns?fields='+campFields+'&limit=30&access_token='+token).then(r=>r.json()),
          fetch('https://graph.facebook.com/v19.0/'+account+'/adsets?fields='+adsetFields+'&limit=50&access_token='+token).then(r=>r.json()),
          fetch('https://graph.facebook.com/v19.0/'+account+'/ads?fields='+adFields+'&limit=100&access_token='+token).then(r=>r.json())
        ]);

        function parseIns(ins){
          const i=ins||{};
          const leads=getAction(i.actions,'onsite_conversion.messaging_conversation_started_7d')||getAction(i.actions,'lead');
          const vendas=getAction(i.actions,'purchase')||getAction(i.actions,'omni_purchase');
          const follows=getFollows(i.actions);
          const cplRaw=getCPA(i.cost_per_action_type,'onsite_conversion.messaging_conversation_started_7d')||getCPA(i.cost_per_action_type,'lead');
          const spend=Number(i.spend||0);
          const cpf=follows>0&&spend>0?(spend/follows):0;
          return {spend,impressions:Number(i.impressions||0),clicks:Number(i.clicks||0),reach:Number(i.reach||0),leads,vendas,follows,cpf,cpm:Number(i.cpm||0),ctr:Number(i.ctr||0),freq:Number(i.frequency||0),cpl:cplRaw>0?cplRaw:(leads>0?spend/leads:0)};
        }

        const campaigns=(rCamp.data||[]).map(c=>Object.assign({id:c.id,name:c.name,status:c.status},parseIns((c.insights&&c.insights.data&&c.insights.data[0])||{}))).filter(c=>c.spend>0||c.status==='ACTIVE').sort((a,b)=>b.spend-a.spend);
        const adsets=(rAdsets.data||[]).map(s=>Object.assign({id:s.id,name:s.name,status:s.status,campaignId:s.campaign_id},parseIns((s.insights&&s.insights.data&&s.insights.data[0])||{}))).filter(s=>s.spend>0||s.status==='ACTIVE');
        const ads=(rAds.data||[]).map(a=>Object.assign({id:a.id,name:a.name||((a.creative&&a.creative.name)||'Criativo'),status:a.status,adsetId:a.adset_id,campaignId:a.campaign_id,thumb:a.creative&&a.creative.thumbnail_url},parseIns((a.insights&&a.insights.data&&a.insights.data[0])||{}))).filter(a=>a.spend>0||a.status==='ACTIVE');

        // Instagram followers
        let igFollowers=Number(state.config.igFollowers||0);
        let igHistory=state.config.igHistory||[];
        let followersByDay=(state.config.adsData&&state.config.adsData.followersByDay)||[];
        if(state.config.igUserId&&token){
          try{
            const rIg=await fetch('https://graph.facebook.com/v19.0/'+state.config.igUserId+'?fields=followers_count&access_token='+token).then(r=>r.json());
            if(rIg.followers_count){
              igFollowers=rIg.followers_count;
              state.config.igFollowers=igFollowers;
              const todayKey=localDate(0);
              igHistory=igHistory.filter(x=>x.date!==todayKey);
              igHistory=igHistory.concat([{date:todayKey,count:igFollowers}]).sort((a,b)=>a.date.localeCompare(b.date)).slice(-60);
              state.config.igHistory=igHistory;
              followersByDay=igHistory.map((e,i)=>i===0?{date:e.date,delta:0}:{date:e.date,delta:e.count-igHistory[i-1].count});
              if(!isAuto)showToast('✅ Instagram: '+igFollowers.toLocaleString('pt-BR')+' seguidores','gr');
            }
          }catch(e){console.warn('Instagram error:',e);}
        }

        const cpfMes=(byPeriod.mes&&byPeriod.mes.follows>0&&byPeriod.mes.spend>0)?(byPeriod.mes.spend/byPeriod.mes.follows):0;

        state.config.adsData={
          today:Number(dHoje.spend||0),
          month:Number(dMes.spend||0),
          impressions:Number(dMes.impressions||0),
          clicks:Number(dMes.clicks||0),
          reach:Number(dMes.reach||0),
          cpm:Number(dMes.cpm||0),
          cpc:Number(dMes.cpc||0),
          todayImpressions:Number(dHoje.impressions||0),
          todayClicks:Number(dHoje.clicks||0),
          leadsHoje:dHoje.leads||0,
          vendasHoje:dHoje.vendas||0,
          valorVendasHoje:dHoje.valor||0,
          cplHoje:dHoje.cpl||0,
          leadsMes:dMes.leads||0,
          vendasMes:dMes.vendas||0,
          valorVendasMes:dMes.valor||0,
          cplMes:Number(dMes.cpl||0),
          followsHoje:dHoje.follows||0,
          followsMes:dMes.follows||0,
          cpfHoje:dHoje.cpf||0,
          cpfMes:Number(cpfMes),
          campaigns,adsets,ads,followersByDay,
          byPeriod  // <-- ISSO É NOVO: gasto detalhado por período
        };
        state.config.adsLastSync=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        save('config');setSyncStatus('ok');render();
        if(!isAuto)showToast('✅ Meta Ads sincronizado!','gr');
      }catch(e){
        console.error('[Meta Ads sync]',e);
        setSyncStatus('error');
        if(!isAuto)showToast('❌ Erro ao conectar com Meta Ads. Verifique o token.','rd');
      }
    };

    // ====================================================================
    // Função helper: pega o gasto do período atualmente selecionado no Dashboard
    // ====================================================================
    window._dashAdsSpend=function(){
      if(!state.config.adsData)return 0;
      const bp=state.config.adsData.byPeriod||{};
      const today=localDate(0);
      const yest=localDate(-1);
      if(dashPeriod==='day'){
        if(dashDay===today)return Number((bp.hoje&&bp.hoje.spend)||state.config.adsData.today||0);
        if(dashDay===yest)return Number((bp.ontem&&bp.ontem.spend)||0);
        const key='d_'+dashDay;
        return Number((bp[key]&&bp[key].spend)||0);
      }
      if(dashPeriod==='week')return Number((bp.week&&bp.week.spend)||(bp['7d']&&bp['7d'].spend)||0);
      if(dashPeriod==='month'){
        const isCur=dashMonth===new Date().getMonth()&&dashYear===new Date().getFullYear();
        if(isCur)return Number((bp.mes&&bp.mes.spend)||state.config.adsData.month||0);
        const key='m_'+dashYear+'_'+dashMonth;
        return Number((bp[key]&&bp[key].spend)||0);
      }
      if(dashPeriod==='year'){
        if(dashYear===new Date().getFullYear())return Number((bp.ano&&bp.ano.spend)||0);
        const key='y_'+dashYear;
        return Number((bp[key]&&bp[key].spend)||0);
      }
      return 0;
    };

    // ====================================================================
    // Intercepta renderDashboard: reescreve o card "Gastos com Anúncios"
    // depois que o dashboard já foi renderizado, injeta o valor certo.
    // ====================================================================
    const _originalRender=window.render;
    window.render=function(){
      _originalRender.apply(this,arguments);
      // Só mexe se estamos no Dashboard e o Meta Ads está configurado
      if(currentTab!=='dashboard')return;
      if(!state.config.metaToken||!state.config.adsData)return;
      // Deixa o DOM assentar antes de mexer
      setTimeout(patchDashboardAdsCard,10);
    };

    function patchDashboardAdsCard(){
      // Procura o card de Gastos com Anúncios pelo texto do título
      const cards=document.querySelectorAll('.card');
      let target=null;
      cards.forEach(c=>{
        const ct=c.querySelector('.ct');
        if(ct&&ct.textContent.trim().indexOf('Gastos com An')>=0)target=c;
      });
      if(!target)return;

      const spendVal=window._dashAdsSpend();
      const lbl=_getPeriodLabel();

      // Localiza o div grande com o número (font-size:26px ou similar)
      const bigNumbers=target.querySelectorAll('div');
      let numDiv=null;
      bigNumbers.forEach(d=>{
        const fs=d.style&&d.style.fontSize;
        if(fs&&(fs==='26px'||fs==='22px')&&d.style.fontWeight==='800')numDiv=d;
      });
      if(!numDiv)return;

      // Localiza a linha de subtítulo (font-size:10px com "Meta Ads" ou "—")
      const subDiv=numDiv.nextElementSibling;

      if(spendVal>0){
        numDiv.style.color='var(--or)';
        numDiv.textContent=fmtBRL(spendVal);
        if(subDiv){
          subDiv.style.color='var(--gr)';
          subDiv.innerHTML='✅ '+lbl+' — Meta Ads (auto)';
        }
      }else{
        numDiv.style.color='var(--txd)';
        numDiv.textContent='—';
        if(subDiv){
          subDiv.style.color='var(--txd)';
          subDiv.innerHTML='Sem dados de '+lbl+' — <a href="javascript:syncMetaAds()" style="color:var(--or);text-decoration:underline">buscar agora</a>';
        }
      }
    }

    function _getPeriodLabel(){
      const today=localDate(0);
      if(dashPeriod==='day'){
        if(dashDay===today)return 'Hoje';
        if(dashDay===localDate(-1))return 'Ontem';
        return dashDay;
      }
      if(dashPeriod==='week')return 'Esta semana';
      if(dashPeriod==='month'){
        const isCur=dashMonth===new Date().getMonth()&&dashYear===new Date().getFullYear();
        return isCur?'Este mês':(MESES[dashMonth]+'/'+dashYear);
      }
      if(dashPeriod==='year')return String(dashYear);
      return '';
    }

    // ====================================================================
    // Ao trocar de período, se não temos dados desse período em cache,
    // dispara sync automaticamente em background.
    // ====================================================================
    const _originalSetDash=window.setDashPeriod;
    window.setDashPeriod=function(p){
      _originalSetDash(p);
      _maybeAutoSync();
    };
    const _originalNavMonth=window.navMonth;
    window.navMonth=function(delta){
      _originalNavMonth(delta);
      _maybeAutoSync();
    };
    const _originalNavDay=window.navDay;
    if(typeof _originalNavDay==='function'){
      window.navDay=function(delta){
        _originalNavDay(delta);
        _maybeAutoSync();
      };
    }

    function _maybeAutoSync(){
      if(!state.config.metaToken||!state.config.metaAdAccount)return;
      const bp=state.config.adsData&&state.config.adsData.byPeriod;
      if(!bp)return;
      // Já tem dado pro período atual?
      const today=localDate(0);
      let key=null;
      if(dashPeriod==='day'){
        if(dashDay===today)key='hoje';
        else if(dashDay===localDate(-1))key='ontem';
        else key='d_'+dashDay;
      }else if(dashPeriod==='week')key='week';
      else if(dashPeriod==='month'){
        const isCur=dashMonth===new Date().getMonth()&&dashYear===new Date().getFullYear();
        key=isCur?'mes':'m_'+dashYear+'_'+dashMonth;
      }else if(dashPeriod==='year'){
        key=dashYear===new Date().getFullYear()?'ano':'y_'+dashYear;
      }
      if(key&&!bp[key]){
        window._adsAutoTick=true; // silencia toast
        setTimeout(syncMetaAds,300);
      }
    }

    // ====================================================================
    // Sincronização automática em background (default: 30 min)
    // ====================================================================
    window._adsAutoTimer=null;
    window.startAdsAutoSync=function(){
      if(window._adsAutoTimer)clearInterval(window._adsAutoTimer);
      const enabled=state.config.adsAutoSyncEnabled!==false;
      if(!enabled){console.log('[Meta Ads] Auto-sync desligado (config)');return;}
      if(!state.config.metaToken||!state.config.metaAdAccount)return;
      const mins=Math.max(5,Number(state.config.adsAutoSyncMin||30));
      window._adsAutoTimer=setInterval(()=>{
        if(document.visibilityState==='visible'){
          window._adsAutoTick=true;
          syncMetaAds();
        }
      },mins*60*1000);
      console.log('[Meta Ads] Auto-sync ligado — a cada',mins,'min');
    };
    window.stopAdsAutoSync=function(){
      if(window._adsAutoTimer){clearInterval(window._adsAutoTimer);window._adsAutoTimer=null;}
    };

    // Liga o auto-sync ao carregar
    startAdsAutoSync();

    // Se acabou de instalar mas nunca sincronizou, dispara uma vez pra popular
    if(state.config.metaToken&&state.config.metaAdAccount){
      const bp=state.config.adsData&&state.config.adsData.byPeriod;
      if(!bp){
        console.log('[Meta Ads] Primeiro sync pra popular byPeriod...');
        window._adsAutoTick=true;
        setTimeout(syncMetaAds,1000);
      }
    }

    console.log('[Patch Meta Ads] ✅ Instalado! Auto-sync ligado. Filtros do Dashboard agora puxam gasto correto.');
  });
})();
</script>
