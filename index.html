<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestao Zambonini</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d0d;--sf:#141414;--sf2:#1c1c1c;--sf3:#242424;--sf4:#2e2e2e;--bd:rgba(255,255,255,.07);--bdb:rgba(249,115,22,.4);--or:#f97316;--orl:#fb923c;--ordim:rgba(249,115,22,.1);--ordim2:rgba(249,115,22,.18);--tx:#f0f0f0;--txd:#555;--txm:#888;--gr:#22c55e;--rd:#ef4444;--bl:#3b82f6;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
.app{display:flex;flex-direction:column;min-height:100vh;}
.topnav{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;height:46px;position:sticky;top:0;z-index:20;overflow-x:auto;gap:0;}
.logo{font-weight:800;font-size:15px;color:var(--or);margin-right:16px;white-space:nowrap;letter-spacing:1px;}
.ni{padding:0 12px;height:46px;display:flex;align-items:center;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;border:none;background:transparent;}
.ni:hover{color:var(--tx);}.ni.active{color:var(--or);border-bottom-color:var(--or);}
.topnav-r{margin-left:auto;display:flex;align-items:center;gap:10px;padding-left:16px;flex-shrink:0;}
.main{flex:1;padding:20px 24px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;}
.ct{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txd);margin-bottom:8px;font-weight:600;}
.cv{font-size:22px;font-weight:700;}.cs{font-size:11px;color:var(--txm);margin-top:4px;}
.cv-or{color:var(--or);}.cv-gr{color:var(--gr);}.cv-rd{color:var(--rd);}.cv-bl{color:var(--bl);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:9px 12px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd);font-weight:500;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.cr:hover td{background:rgba(249,115,22,.05);cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.b-or{background:rgba(249,115,22,.15);color:var(--or);}
.b-gr{background:rgba(34,197,94,.12);color:var(--gr);}
.b-bl{background:rgba(59,130,246,.12);color:var(--bl);}
.b-rd{background:rgba(239,68,68,.12);color:var(--rd);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;}
.bp{background:var(--or);color:#fff;}.bp:hover{background:var(--orl);}
.bg2{background:transparent;color:var(--txm);border:1px solid var(--bd);}.bg2:hover{border-color:var(--or);color:var(--or);}
.bd2{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2);}
.bgr2{background:rgba(34,197,94,.1);color:var(--gr);border:1px solid rgba(34,197,94,.2);}
.sm{padding:4px 10px;font-size:11px;}
.fg{display:grid;gap:10px;}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
label{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--txm);text-transform:uppercase;}
input,select,textarea{background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:8px 11px;color:var(--tx);font-family:inherit;font-size:12px;outline:none;transition:border-color .15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--or);}
select option{background:var(--sf2);}
.ip{position:relative;}
.ips{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txd);font-size:12px;pointer-events:none;}
.ip input{padding-left:24px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--sf);border:1px solid var(--bdb);border-radius:12px;padding:24px;max-width:100%;max-height:94vh;overflow-y:auto;}
.modal-sm{width:560px;}.modal-md{width:760px;}.modal-xl{width:980px;}
.mt2{font-size:18px;font-weight:700;margin-bottom:16px;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--bd);}
.divider{height:1px;background:var(--bd);margin:10px 0;}
.sl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:8px;font-weight:700;}
.empty{text-align:center;padding:40px 20px;color:var(--txd);}
.empty-ic{font-size:32px;margin-bottom:10px;opacity:.3;}
.sbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;}
.spill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bd);color:var(--txm);transition:all .15s;background:transparent;}
.spill:hover{border-color:var(--or);color:var(--tx);}
.spill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.spill .cnt{font-size:9px;background:rgba(0,0,0,.3);padding:1px 5px;border-radius:10px;}
.fbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.tfoot{display:flex;justify-content:flex-end;gap:20px;padding:10px 12px;border-top:1px solid var(--bdb);background:var(--sf2);font-size:12px;}
.tfoot .tfl{color:var(--txd);}.tfoot .tfv{font-weight:700;color:var(--or);font-size:15px;}
.pf{display:flex;gap:6px;align-items:center;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:16px;flex-wrap:wrap;}
.ptab{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);color:var(--txm);background:transparent;transition:all .15s;}
.ptab.active{background:var(--or);color:#fff;border-color:var(--or);}
.hbar{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.hbar-lbl{font-size:11px;color:var(--txm);width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.hbar-bg{flex:1;background:var(--sf3);border-radius:3px;height:8px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:3px;background:var(--or);}
.hbar-val{font-size:11px;font-weight:600;color:var(--or);width:75px;text-align:right;flex-shrink:0;}
.np-wrap{display:grid;grid-template-columns:320px 1fr;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.np-left{background:var(--sf2);border-right:1px solid var(--bd);padding:18px;}
.np-right{padding:18px;overflow-y:auto;max-height:72vh;}
.wa-box{background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:10px;margin-bottom:10px;}
.wa-box textarea{background:transparent;border:none;resize:vertical;font-family:monospace;font-size:11px;color:var(--tx);width:100%;outline:none;}
.parse-btn{background:var(--or);color:#fff;border:none;border-radius:7px;padding:10px;width:100%;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.parse-btn:hover{background:var(--orl);}.parse-btn:disabled{opacity:.5;cursor:not-allowed;}
.nbadge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;background:var(--or);color:#fff;margin-left:8px;}
.ck-r{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);margin-bottom:5px;}
.ck-r.on{background:var(--ordim2);border-color:rgba(249,115,22,.4);}
.ck-b{width:16px;height:16px;border-radius:3px;background:var(--sf3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:#fff;font-weight:700;}
.ck-b.on{background:var(--or);border-color:var(--or);}
.ig-top{height:3px;background:linear-gradient(to right,#833ab4,#fd1d1d,#f97316);border-radius:8px 8px 0 0;margin:-16px -16px 12px;}
.roas-row{background:var(--sf3);border-radius:6px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.vl-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);}
.vl-num{width:22px;height:22px;border-radius:5px;background:var(--or);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ads-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--gr);font-size:10px;font-weight:600;}
.ads-dot{width:6px;height:6px;border-radius:50%;background:var(--gr);}
.s-ok{color:var(--gr);font-weight:600;}.s-low{color:#f59e0b;font-weight:600;}.s-zero{color:var(--rd);font-weight:600;}
.onum{font-size:13px;font-weight:700;color:var(--or);}
.pay-row{background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px;display:grid;gap:8px;grid-template-columns:100px 140px 90px 160px 1fr auto;align-items:end;margin-bottom:7px;}
.mtabs{display:flex;border:1px solid var(--bd);border-radius:6px;overflow:hidden;}
.mtab{flex:1;padding:6px 0;text-align:center;font-size:11px;font-weight:600;cursor:pointer;color:var(--txm);background:transparent;border:none;}
.mtab-p{background:var(--bl);color:#fff;}.mtab-l{background:var(--or);color:#fff;}
.dre-t{width:100%;border-collapse:collapse;}
.dre-t tr td{padding:8px 14px;font-size:12px;border-bottom:1px solid var(--bd);}
.dre-t tr:last-child td{border-bottom:none;}
.dre-g{background:var(--sf2);}.dre-g td{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);font-weight:700;}
.dre-i td:first-child{padding-left:24px;color:var(--txm);}
.dre-t2{background:var(--sf3);}.dre-t2 td{font-weight:700;font-size:13px;}
.dre-hl{background:rgba(249,115,22,.08)!important;}.dre-hl td{font-size:14px!important;}
.tf2{background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.cp-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:3px 9px;font-size:10px;cursor:pointer;color:var(--txd);}
.cp-btn:hover{border-color:var(--or);color:var(--or);}
.su-c{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);display:inline-block;}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite;}
.sync-dot.error{background:var(--rd);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
#loading-screen{position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
#loading-screen .logo-l{font-size:28px;font-weight:800;color:#f97316;letter-spacing:2px;}
#loading-screen .sub-l{font-size:12px;color:#555;}

.login-screen{position:fixed;inset:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:var(--sf);border:1px solid var(--bdb);border-radius:16px;padding:40px;width:380px;text-align:center;}
.login-logo{font-size:22px;font-weight:800;color:var(--or);letter-spacing:2px;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--txd);margin-bottom:32px;letter-spacing:1px;}
.login-field{text-align:left;margin-bottom:14px;}
.login-field label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--txm);text-transform:uppercase;display:block;margin-bottom:5px;}
.login-field input{width:100%;background:var(--sf3);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.login-field input:focus{border-color:var(--or);}
.login-btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s;}
.login-btn:hover{background:var(--orl);}
.login-err{color:var(--rd);font-size:12px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo-l">GESTAO ZAMBONINI</div>
  <div class="sub-l" id="loading-msg">Conectando ao Supabase...</div>
</div>

<div class="app" id="app" style="display:none;">
  <nav class="topnav">
    <div class="logo">⚡ GESTAO ZAMBONINI</div>
    <button class="ni active" onclick="setTab('dashboard')" id="nav-dashboard">Dashboard</button>
    <button class="ni" onclick="setTab('pedidos')" id="nav-pedidos">Pedidos</button>
    <button class="ni" onclick="setTab('notas')" id="nav-notas">Notas Fiscais</button>
    <button class="ni" onclick="setTab('estoque')" id="nav-estoque">Estoque <span id="stock-badge" style="display:none;margin-left:4px;background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;"></span></button>

      <span id="sync-status" style="font-size:11px;color:var(--txd);display:flex;align-items:center;gap:5px;"><span class="sync-dot" id="sync-dot"></span><span id="sync-txt">Sincronizado</span></span>
    </div>
  </nav>

<script>
// ============ CONFIG SUPABASE ============
const SUPA_URL = 'https://oxtxvfzeowonjsgxkcsn.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94dHh2Znplb3dvbmpzZ3hrY3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODYwMDUsImV4cCI6MjA5MDk2MjAwNX0.oLYb0w3VKRptmmgp7bIONOi2g8A20uAzNs0tz9cYdqE';
// ========================================

const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// ============ CONSTANTS ============
function buildRates(b,s1,s2,s3,lb,ls1,ls2,ls3){const r={presencial:{},link:{}};for(let i=1;i<=18;i++){if(i===1){r.presencial[i]=b;r.link[i]=lb;}else if(i<=6){r.presencial[i]=+(b+s1*(i-1)).toFixed(2);r.link[i]=+(lb+ls1*(i-1)).toFixed(2);}else if(i<=12){r.presencial[i]=+(b+s1*5+s2*(i-6)).toFixed(2);r.link[i]=+(lb+ls1*5+ls2*(i-6)).toFixed(2);}else{r.presencial[i]=+(b+s1*5+s2*6+s3*(i-12)).toFixed(2);r.link[i]=+(lb+ls1*5+ls2*6+ls3*(i-12)).toFixed(2);}}return r;}

const DEF_MAQ=[{id:'cielo',name:'Cielo',color:'#0051A5',rates:buildRates(2.99,.30,.20,.10,3.49,.32,.22,.12)},{id:'infinitepay',name:'Infinite Pay',color:'#00B4A2',rates:buildRates(2.49,.28,.18,.09,2.99,.30,.20,.10)},{id:'mercadopago',name:'Mercado Pago',color:'#009EE3',rates:buildRates(2.89,.29,.19,.10,3.39,.31,.21,.11)},{id:'pagbank',name:'PagBank',color:'#F5A800',rates:buildRates(2.99,.30,.20,.10,3.49,.32,.22,.12)}];
const DEF_CH=[{id:'instagram',label:'Instagram'},{id:'whatsapp',label:'WhatsApp'},{id:'loja',label:'Loja Fisica'},{id:'site',label:'Site'},{id:'outro',label:'Outro'}];
const OS=[{id:'em_aberto',label:'Em Aberto',c:'#f97316'},{id:'aprovado',label:'Aprovado',c:'#22c55e'},{id:'preparando',label:'Preparando',c:'#3b82f6'},{id:'faturado',label:'Faturado',c:'#8b5cf6'},{id:'pronto',label:'Pronto Envio',c:'#f59e0b'},{id:'enviado',label:'Enviado',c:'#06b6d4'},{id:'entregue',label:'Entregue',c:'#22c55e'},{id:'cancelado',label:'Cancelado',c:'#ef4444'}];
const NS=[{id:'pendente',label:'Pendente',c:'#f97316'},{id:'emitida',label:'Emitida',c:'#22c55e'},{id:'cancelada',label:'Cancelada',c:'#ef4444'},{id:'denegada',label:'Denegada',c:'#8b5cf6'}];
const DLV=[{id:'retirada',label:'Retirada',icon:'🏪'},{id:'sedex',label:'SEDEX',icon:'📦'},{id:'sedex10',label:'SEDEX 10',icon:'📦'},{id:'pac',label:'PAC',icon:'📬'},{id:'pac_mini',label:'PAC Mini',icon:'📬'},{id:'motoboy',label:'Motoboy',icon:'🛵'},{id:'jadlog',label:'Jadlog',icon:'🚚'},{id:'transportadora',label:'Transportadora',icon:'🚛'},{id:'outro',label:'Outro',icon:'📮'}];

// ============ STATE ============
let state = {
  tab: 'dashboard',
  prods: [], orders: [], maqs: JSON.parse(JSON.stringify(DEF_MAQ)),
  channels: JSON.parse(JSON.stringify(DEF_CH)), nfs: [], stock: [],
  suppliers: [], purchaseOrders: [], orderSeq: 1001,
  deliveryCities: [],
  motoboys: [], clients: [],
  config: {gastoAnuncios:'',igFollowers:'',igF7:'',igF30:'',valores:['Venda e Energia!','Atendimento Humanizado!','Foco no Cliente!','Quanto mais voce posta, mais voce vende!','Simples e bem feito resolve!']}
};
let saveTimers = {};
let currentTab = 'dashboard';

// ============ UTILS ============
const fmtBRL = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtPct = v => Number(v||0).toFixed(2)+'%';
const uid = () => Math.random().toString(36).slice(2,10);
const stInfo = id => OS.find(s=>s.id===id)||OS[0];
const nfInfo = id => NS.find(s=>s.id===id)||NS[0];
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function payFee(pay,maqs){
  if(!pay||pay.type==='dinheiro'||pay.type==='pix')return 0;
  const m=maqs.find(x=>x.id===pay.maquininhaId);if(!m)return 0;
  const md=pay.mode||'presencial';const inst=Number(pay.installments||1);
  return(Number(pay.amount||0)*(m.rates[md]&&m.rates[md][inst]?m.rates[md][inst]:0))/100;
}
function getCost(prod,si){if(!prod)return 0;if(prod.costMode==='avg'&&si&&Number(si.avgCost)>0)return Number(si.avgCost);return Number(prod.costPrice||0);}
function calcM(order){
  const prod=state.prods.find(p=>p.id===order.productId);
  const si=state.stock.find(s=>s.productId===order.productId);
  const cp=getCost(prod,si);const sp=Number(order.salePrice||0);const qty=Number(order.quantity||1);
  const mot=Number(order.motoboyCost||0);const cor=Number(order.correiosCost||0);
  const fee=(order.payments||[]).reduce((a,p)=>a+payFee(p,state.maqs),0);
  const upsell=(order.upsells||[]).reduce((s,u)=>s+Number(u.price||0),0);
  const rev=sp*qty+upsell-Number(order.discount||0);
  const cost=cp*qty;const total=cost+mot+cor+fee;
  const profit=rev-total;const roi=total>0?(profit/total)*100:0;
  return{fee,rev,profit,roi,mot,cor,upsell,cost};
}
function calcAvg(cq,ca,aq,ac){const t=cq+aq;return t>0?((cq*ca)+(aq*ac))/t:0;}

// ============ SUPABASE STORE ============
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  if(!dot||!txt)return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  txt.textContent=s==='syncing'?'Salvando...':s==='error'?'Erro ao salvar':'Sincronizado';
}

async function dbGet(key){
  try{
    const {data,error}=await sb.from('zambonini_data').select('value').eq('key',key).single();
    if(error||!data)return null;
    return data.value;
  }catch{return null;}
}
async function dbSet(key,value){
  try{
    await sb.from('zambonini_data').upsert({key,value,updated_at:new Date().toISOString()});
  }catch(e){setSyncStatus('error');}
}

function save(key){
  setSyncStatus('syncing');
  clearTimeout(saveTimers[key]);
  saveTimers[key]=setTimeout(async()=>{
    await dbSet(key,state[key]);
    setSyncStatus('ok');
  },800);
}

// ============ LOAD ============

async function buscarCEP(cep, callback){
  const c=cep.replace(/\D/g,'');
  if(c.length!==8)return;
  try{
    const r=await fetch('https://viacep.com.br/ws/'+c+'/json/');
    const d=await r.json();
    if(d.erro)return;
    callback({street:d.logradouro||'',bairro:d.bairro||'',city:d.localidade||'',state:d.uf||'',cep:c});
  }catch(e){}
}

// ============ AUTH ============
const SESSION_KEY = 'zb_session';
const SESSION_HOURS = 24;
const DEFAULT_PASS = 'zambonini123';

function checkSession(){
  try{
    const s = localStorage.getItem(SESSION_KEY);
    if(!s)return false;
    const d = JSON.parse(s);
    if(!d.ts)return false;
    const hours = (Date.now()-d.ts)/(1000*60*60);
    return hours < SESSION_HOURS;
  }catch{return false;}
}

function saveSession(){
  localStorage.setItem(SESSION_KEY, JSON.stringify({ts:Date.now()}));
}

function logout(){
  localStorage.removeItem(SESSION_KEY);
  showLoginScreen();
}

function getPassword(){
  return localStorage.getItem('zb_password')||DEFAULT_PASS;
}

function showLoginScreen(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='none';
  let loginEl = document.getElementById('login-screen');
  if(!loginEl){
    loginEl = document.createElement('div');
    loginEl.id = 'login-screen';
    loginEl.className = 'login-screen';
    document.body.appendChild(loginEl);
  }
  loginEl.innerHTML = `
    <div class="login-box">
      <div class="login-logo">⚡ GESTAO ZAMBONINI</div>
      <div class="login-sub">Sistema de Gestao de Vendas</div>
      <div class="login-field">
        <label>Senha de acesso</label>
        <input type="password" id="login-pass" placeholder="Digite sua senha..." onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="login-btn" onclick="doLogin()">Entrar</button>
      <div class="login-err" id="login-err"></div>
      <div style="margin-top:20px;font-size:10px;color:var(--txd)">Sessao de 24 horas · Dados salvos no Supabase</div>
    </div>
  `;
  setTimeout(()=>{const i=document.getElementById('login-pass');if(i)i.focus();},100);
}

function doLogin(){
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  if(pass === getPassword()){
    saveSession();
    document.getElementById('login-screen').remove();
    document.getElementById('loading-screen').style.display='flex';
    if(checkSession()){loadAll();}else{showLoginScreen();}
  } else {
    err.textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
  }
}
async function loadAll(){
  document.getElementById('loading-msg').textContent='Carregando dados...';
  const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients'];
  for(const k of keys){
    const v=await dbGet(k);
    if(v!==null){
      if(k==='maqs'){
        state[k]=v.map(m=>{
          if(m.rates&&!m.rates.presencial){
            const p={},l={};
            for(let i=1;i<=18;i++){p[i]=m.rates[i]||0;l[i]=0;}
            return {...m,rates:{presencial:p,link:l}};
          }
          return m;
        });
      } else {
        state[k]=v;
      }
    }
  }
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}

// Motoboy breakdown for dashboard
function getMoboyStats(filtered){
  const motStats={};
  filtered.forEach(o=>{
    if(o.deliveryMethod!=='motoboy'&&o.deliveryMethod!=='entrega_propria')return;
    const k=o.motoboyId==='_avulso'||!o.motoboyId?(o.motoboyName||'Avulso'):o.motoboyId;
    const name=o.motoboyId&&o.motoboyId!=='_avulso'?(state.motoboys.find(m=>m.id===o.motoboyId)||{name:o.motoboyName||'Desconhecido'}).name:(o.motoboyName||'Avulso');
    if(!motStats[k])motStats[k]={name,entregas:0,total:0};
    motStats[k].entregas++;
    motStats[k].total+=Number(o.motoboyCost||0)+Number(o.fuelCost||0)+Number(o.tollCost||0);
  });
  return Object.values(motStats).sort((a,b)=>b.total-a.total);
}

      <td onclick="event.stopPropagation()"><div style="display:flex;gap:4px"><button class="btn bp sm" style="padding:3px 8px;font-size:10px" onclick="openTinyModal('${o.id}')">NF</button><button class="btn bd2 sm" onclick="deleteOrder('${o.id}')">×</button></div></td>
    </tr>`;
  });}
  return `
  <div class="sbar">${statusBtns}</div>
  <div class="fbar">
    <input placeholder="Buscar..." value="${esc(pedidoSearch)}" oninput="pedidoSearch=this.value;render()" style="flex:1;max-width:280px">
    <input type="date" value="${pedidoDe}" onchange="pedidoDe=this.value;render()" style="width:138px">
    <span style="color:var(--txd);font-size:11px">ate</span>
    <input type="date" value="${pedidoAte}" onchange="pedidoAte=this.value;render()" style="width:138px">
    ${pedidoSearch||pedidoDe||pedidoAte?`<button class="btn bg2 sm" onclick="pedidoSearch='';pedidoDe='';pedidoAte='';render()">×</button>`:''}
    <button class="btn bp" style="margin-left:auto" onclick="openNewOrder()">+ Novo Pedido</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="tw"><table><thead><tr><th>N</th><th>Data</th><th>Cliente</th><th>Cidade</th><th>Canal</th><th>Envio</th><th>Pgto</th><th>Total</th><th>Lucro</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    ${filtered.length>0?`<div class="tfoot"><span><span class="tfl">Pedidos: </span><strong>${filtered.length}</strong></span><span><span class="tfl">Faturamento: </span><span class="tfv">${fmtBRL(total)}</span></span></div>`:''}
  </div>`;
}

function changeStatus(id,s){state.orders=state.orders.map(o=>o.id===id?{...o,status:s}:o);save('orders');render();}
function deleteOrder(id){if(confirm('Remover pedido?')){state.orders=state.orders.filter(o=>o.id!==id);save('orders');render();}}

// ============ ORDER MODAL ============
let orderModalData=null;

function newOrderDefaults(){
  const fmq=state.maqs.length>0?state.maqs[0].id:'';
  const fch=state.channels.length>0?state.channels[0].id:'';
  return{date:new Date().toISOString().slice(0,10),clientName:'',cpfCnpj:'',phone:'',email:'',tipoPessoa:'fisica',contribuinte:'nao',street:'',streetNum:'',complement:'',bairro:'',cep:'',city:'',state:'',diffDeliveryAddr:false,deliveryStreet:'',deliveryStreetNum:'',deliveryComplement:'',deliveryBairro:'',deliveryCep:'',deliveryCity:'',deliveryState:'',productId:'',quantity:1,salePrice:'',discountType:'valor',discountVal:'',payments:[{id:uid(),type:'pix',maquininhaId:fmq,mode:'presencial',installments:1,amount:''}],deliveryMethod:'sedex',trackingCode:'',motoboyCost:'',correiosCost:'',motoboyId:'',motoboyName:'',fuelCost:'',tollCost:'',discount:'',channel:fch,isPresencial:false,status:'em_aberto',notes:'',internalNotes:'',upsells:[],postActions:{nf:false,sep:false,rastreio:false,entregue:false}};
}

function openNewOrder(){orderModalData={...newOrderDefaults(),_isNew:true};showOrderModal();}
function openEditOrder(id){const o=state.orders.find(x=>x.id===id);if(o)orderModalData={...newOrderDefaults(),...o,_isNew:false};showOrderModal();}


function renderItemsList(o){
  const items=o.items&&o.items.length>0?o.items:[{id:'main',productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||'',isGift:false}];
  let html='';
  items.forEach(function(item,idx){
    let allProdOpts='<option value="">-- Selecione --</option>';
    state.prods.forEach(function(p){allProdOpts+='<option value="'+p.id+'"'+(item.productId===p.id?' selected':'')+'>'+esc(p.name)+'</option>';});
    const cols='1fr 70px 120px 36px'+(items.length>1?' 36px':'');
    const bg=item.isGift?'rgba(34,197,94,.06)':'var(--sf3)';
    const border=item.isGift?'rgba(34,197,94,.3)':'var(--bd)';
    const lbl=item.isGift?'🎁 Brinde':'📦 Produto';
    const giftBorder=item.isGift?'rgba(34,197,94,.4)':'var(--bd)';
    const giftBg=item.isGift?'rgba(34,197,94,.15)':'transparent';
    const giftColor=item.isGift?'var(--gr)':'var(--txd)';
    const valorLbl=item.isGift?'Valor (0=gratis)':'Valor';
    html+='<div data-item-idx="'+idx+'" style="display:grid;grid-template-columns:'+cols+';gap:7px;align-items:end;padding:10px;background:'+bg+';border-radius:8px;border:1px solid '+border+';margin-bottom:7px">';
    html+='<div class="field"><label>'+lbl+'</label><select onchange="setItemField('+idx+',\"productId\",this.value);updateOrderSummary()">'+allProdOpts+'</select></div>';
    html+='<div class="field"><label>Qtd</label><input class="item-qty" type="number" min="1" value="'+(item.quantity||1)+'" oninput="setItemField('+idx+',\"quantity\",Number(this.value));updateOrderSummary()"></div>';
    html+='<div class="field"><label>'+valorLbl+'</label><div class="ip"><span class="ips">R$</span><input class="item-val" type="number" value="'+(item.salePrice||'')+'" oninput="setItemField('+idx+',\"salePrice\",this.value);updateOrderSummary()" placeholder="0,00"></div></div>';
    html+='<button onclick="toggleItemGift('+idx+')" style="padding:6px;border-radius:6px;cursor:pointer;border:1px solid '+giftBorder+';background:'+giftBg+';color:'+giftColor+';font-size:14px;height:36px;align-self:flex-end">🎁</button>';
    if(items.length>1)html+='<button class="btn bd2 sm" style="align-self:flex-end;padding:6px;height:36px" onclick="removeOrderItem('+idx+')">×</button>';
    html+='</div>';
  });
  return html;
}
function showOrderModal(){
  currentTab='order-form';
  const el=document.getElementById('main-content');
  if(el){el.innerHTML=renderOrderModal();}
  // preserve scroll
  setTimeout(()=>window.scrollTo(0,window._formScroll||0),0);
}

function renderOrderModal(){
  const o=orderModalData;const isNew=o._isNew;
  const prod=state.prods.find(p=>p.id===o.productId);
  const si=state.stock?state.stock.find(s=>s.productId===o.productId):null;
  const cp=getCost(prod,si);
  // Multi-item support
  const itemsTotal=(o.items&&o.items.length>0?o.items:[{productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||0,isGift:false}]).reduce((a,item)=>a+Number(item.salePrice||0)*Number(item.quantity||1),0);
  const st=itemsTotal;
  const ut=(o.upsells||[]).reduce((a,u)=>a+Number(u.price||0),0);
  const baseRev=st+ut;
  let discountAmt=0;
  if(o.discountType==='pct'&&o.discountVal){discountAmt=baseRev*(Number(o.discountVal)/100);}
  else{discountAmt=Number(o.discount||o.discountVal||0);}
  const rev=baseRev-discountAmt;
  const ctotal=cp*Number(o.quantity||1);
  const mot=Number(o.motoboyCost||0)+Number(o.fuelCost||0)+Number(o.tollCost||0);const cor=Number(o.correiosCost||0);
  const fee=(o.payments||[]).reduce((a,p)=>a+payFee(p,state.maqs),0);
  const td=ctotal+mot+cor+fee;const profit=rev-td;const roi=td>0?(profit/td)*100:0;

  let prodOptions=`<option value="">-- Selecione --</option>`;
  state.prods.forEach(p=>{prodOptions+=`<option value="${p.id}" ${o.productId===p.id?'selected':''}>${esc(p.name)}</option>`;});
  let channelOptions='';state.channels.forEach(c=>{channelOptions+=`<option value="${c.id}" ${o.channel===c.id?'selected':''}>${esc(c.label)}</option>`;});
  let statusOptions='';OS.forEach(s=>{statusOptions+=`<option value="${s.id}" ${o.status===s.id?'selected':''}>${s.label}</option>`;});
  let dlvOptions='';DLV.forEach(d=>{dlvOptions+=`<option value="${d.id}" ${o.deliveryMethod===d.id?'selected':''}>${d.icon} ${d.label}</option>`;});
  let upsellRows='';
  (o.upsells||[]).forEach(u=>{const up=state.prods.find(p=>p.id===u.productId);const nm=u.productId==='_c'?(u.customName||'Extra'):(up?up.name:'Extra');upsellRows+=`<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 8px;background:var(--sf2);border-radius:5px;margin-top:4px"><span>${esc(nm)}</span><span style="color:var(--gr)">${fmtBRL(u.price)}</span></div>`;});
  let upsellProds=`<option value="">Produto...</option><option value="_c">Digitar...</option>`;
  state.prods.forEach(p=>{upsellProds+=`<option value="${p.id}">${esc(p.name)}</option>`;});
  let paysHTML='';
  (o.payments||[]).forEach((pay,idx)=>{
    const m=state.maqs.find(x=>x.id===pay.maquininhaId);const md=pay.mode||'presencial';const inst=Number(pay.installments||1);
    const feeP=payFee(pay,state.maqs);
    let maqOpts='';state.maqs.forEach(x=>{maqOpts+=`<option value="${x.id}" ${pay.maquininhaId===x.id?'selected':''}>${x.name}</option>`;});
    let parcOpts='';for(let n=1;n<=18;n++){const r=m&&m.rates[md]?m.rates[md][n]||0:0;parcOpts+=`<option value="${n}" ${inst===n?'selected':''}>${n}x ${fmtPct(r)}</option>`;}
    paysHTML+=`<div style="display:grid;grid-template-columns:110px ${pay.type==='cartao'?'150px 90px 160px':''} 1fr ${(o.payments||[]).length>1?'32px':''};gap:8px;align-items:end;background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px;margin-bottom:7px">
      <div class="field"><label>Tipo</label><select onchange="changePayType(${idx},this.value)"><option value="dinheiro" ${pay.type==='dinheiro'?'selected':''}>Dinheiro</option><option value="pix" ${pay.type==='pix'?'selected':''}>PIX</option><option value="cartao" ${pay.type==='cartao'?'selected':''}>Cartao</option></select></div>
      ${pay.type==='cartao'?`<div class="field"><label>Maquininha</label><select onchange="changePayField(${idx},'maquininhaId',this.value)">${maqOpts}</select></div><div class="field"><label>Modo</label><div class="mtabs"><button class="mtab ${md==='presencial'?'mtab-p':''}" onclick="changePayField(${idx},'mode','presencial')">Pres.</button><button class="mtab ${md==='link'?'mtab-l':''}" onclick="changePayField(${idx},'mode','link')">Link</button></div></div><div class="field"><label>Parcelas ${feeP>0?'<span style=color:var(--rd)>-'+fmtBRL(feeP)+'</span>':''}</label><select onchange="changePayField(${idx},'installments',Number(this.value))">${parcOpts}</select></div>`:''}
      <div class="field"><label>Valor (R$)</label><div class="ip"><span class="ips">R$</span><input type="number" value="${pay.amount}" oninput="changePayField(${idx},'amount',this.value)" placeholder="0,00"></div></div>
      ${(o.payments||[]).length>1?`<button class="btn bd2 sm" style="align-self:flex-end;padding:7px 8px" onclick="removePay(${idx})">×</button>`:''}
    </div>`;
  });

  const acts=[{k:'nf',l:'Emitir NF',i:'🧾'},{k:'sep',l:'Enviar p/ Separacao',i:'📦'},{k:'rastreio',l:'Enviar Rastreio Email',i:'📧'},{k:'entregue',l:'Marcar Entregue',i:'✅'}];
  let actsHTML='';
  acts.forEach(a=>{const chk=(o.postActions||{})[a.k];actsHTML+=`<div class="ck-r ${chk?'on':''}" data-act="${a.k}" onclick="toggleAct('${a.k}')"><div class="ck-b ${chk?'on':''}">${chk?'v':''}</div><span class="ck-lbl" style="font-size:12px;color:${chk?'var(--or)':'var(--txm)'}">${a.i} ${a.l}</span></div>`;});

  return `<div style="max-width:900px;margin:0 auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:22px;font-weight:800;color:var(--or)">${isNew?'NOVO PEDIDO':'EDITAR PEDIDO #'+o.orderNum}</div>
        <div style="font-size:11px;color:var(--txm)">Cole os textos do WhatsApp e o sistema preenche automaticamente</div>
      </div>
      <button class="btn bg2" onclick="closeOrderModal()" style="font-size:13px">← Voltar</button>
    </div>

    <!-- PARSER WHATSAPP -->
    <div class="card" style="margin-bottom:16px;border-color:rgba(249,115,22,.2)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:18px">📱</span><div class="sl" style="margin:0">Colar do WhatsApp (opcional)</div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end">
        <div class="field"><label>Endereco / Cliente</label><textarea id="wa-text" rows="3" placeholder="Nome, telefone, CEP, rua..." style="resize:vertical;font-family:monospace;font-size:11px;background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:8px"></textarea></div>
        <div class="field"><label>Pedido</label><textarea id="wa-order" rows="3" placeholder="1x X11 Medio - Prata&#10;Total: R$297,00" style="resize:vertical;font-family:monospace;font-size:11px;background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:8px"></textarea></div>
        <button class="btn bp" style="padding:10px 18px;font-size:13px;font-weight:700;align-self:flex-end" id="parse-btn" onclick="parseWA()">Interpretar com IA</button>

            <div class="sl" style="margin:0">Cliente</div>

              <div id="client-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--sf2);border:1px solid var(--bdb);border-radius:7px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.5)"></div>
            </div>
          </div>
          <!-- Tipo de Pessoa -->
          <div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">
            <span style="font-size:11px;color:var(--txm);font-weight:600">Tipo de Pessoa:</span>
            ${['fisica','juridica'].map(t=>`<button onclick="setOrderField('tipoPessoa','${t}');showOrderModal()" style="padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid ${o.tipoPessoa===t?'var(--or)':'var(--bd)'};background:${o.tipoPessoa===t?'var(--or)':'transparent'};color:${o.tipoPessoa===t?'#fff':'var(--txm)'}">${t==='fisica'?'Pessoa Física':'Pessoa Jurídica'}</button>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px">
            <div class="field"><label>${o.tipoPessoa==='juridica'?'Razão Social':'Nome completo'}</label><input value="${esc(o.clientName)}" oninput="setOrderField('clientName',this.value)"></div>
            <div class="field"><label>${o.tipoPessoa==='juridica'?'CNPJ':'CPF'}</label><input value="${esc(o.cpfCnpj)}" oninput="setOrderField('cpfCnpj',this.value)"></div>
            <div class="field"><label>Celular</label><input value="${esc(o.phone||'')}" oninput="setOrderField('phone',this.value)"></div>

          </div>
          ${o.tipoPessoa==='juridica'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div class="field"><label>Contribuinte ICMS</label><select onchange="setOrderField('contribuinte',this.value)" style="background:var(--sf3)">

            <div class="field"><label>Inscrição Estadual</label><input value="${esc(o.inscEstadual||'')}" oninput="setOrderField('inscEstadual',this.value)" placeholder="Opcional"></div>

function refreshItemsList(){

function initOrderItems(){
  if(!orderModalData)return;
  // migrate legacy single-product to items array
  if(!orderModalData.items||orderModalData.items.length===0){
    orderModalData.items=[{id:uid(),productId:orderModalData.productId||'',quantity:Number(orderModalData.quantity||1),salePrice:orderModalData.salePrice||'',isGift:false}];
  }
}
function setItemField(idx,k,v){
  if(!orderModalData)return;
  initOrderItems();
  orderModalData.items[idx][k]=v;
  // auto-fill price when product is selected
  if(k==='productId'&&v){
    const p=state.prods.find(x=>x.id===v);
    if(p&&p.salePrice&&!orderModalData.items[idx].salePrice){
      orderModalData.items[idx].salePrice=p.salePrice;
      // update the price input in DOM directly
      const rows=document.querySelectorAll('[data-item-idx]');
      if(rows[idx]){const inp=rows[idx].querySelector('.item-val');if(inp)inp.value=p.salePrice;}
    }
  }
  // keep legacy fields in sync with first item
  if(idx===0){
    if(k==='productId')orderModalData.productId=v;
    if(k==='quantity')orderModalData.quantity=v;
    if(k==='salePrice')orderModalData.salePrice=v;
  }
  updateOrderSummary();
}
function addOrderItem(){
  if(!orderModalData)return;

  syncItemsFromDOM();

}
function removeOrderItem(idx){
  if(!orderModalData)return;

  orderModalData.items.splice(idx,1);

function searchClients(q){
  const dd=document.getElementById('client-dropdown');if(!dd)return;
  if(!q||q.length<2){dd.style.display='none';return;}
  const ql=q.toLowerCase();const seen=new Set();
  const matches=state.orders.filter(o=>{if(!o.clientName)return false;const m=o.clientName.toLowerCase().includes(ql)||(o.cpfCnpj||'').includes(ql);if(m&&!seen.has(o.clientName)){seen.add(o.clientName);return true;}return false;}).slice(0,5);
  if(!matches.length){dd.style.display='none';return;}
  dd.innerHTML=matches.map(o=>`<div style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--bd)" onmousedown="fillFromClient('${o.id}')"><div style="font-weight:600">${esc(o.clientName)}</div><div style="color:var(--txd);font-size:10px">${esc(o.cpfCnpj||'')}${o.city?' · '+esc(o.city):''}</div></div>`).join('');
  dd.style.display='';
}
function fillFromClient(id){
  const o=state.orders.find(x=>x.id===id);if(!o||!orderModalData)return;
  ['clientName','cpfCnpj','phone','email','street','streetNum','complement','bairro','cep','city','state'].forEach(k=>{if(o[k])orderModalData[k]=o[k];});
  showOrderModal();
}

function parseWA(){
  const wt=document.getElementById('wa-text').value;
  const wo=document.getElementById('wa-order').value;
  if(!wt&&!wo)return;
  const btn=document.getElementById('parse-btn');if(btn){btn.disabled=true;btn.textContent='Interpretando com IA...';}
  const prompt='Extraia dados de pedido smartwatch WhatsApp. Endereco: '+wt+' Pedido: '+wo+' Retorne APENAS JSON: {clientName,cpfCnpj,phone,email,street,streetNum,complement,bairro,cep,city,state,salePrice,quantity,paymentType,notes}. phone/cpfCnpj/cep so digitos. state 2 letras maiusculas. salePrice numero com ponto. paymentType: pix dinheiro ou cartao.';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})})
  .then(r=>r.json()).then(d=>{
    const blk=(d.content||[]).find(b=>b.type==='text');const text=blk?blk.text:'';
    const bk=String.fromCharCode(96);const clean=text.split(bk+bk+bk+'json').join('').split(bk+bk+bk).join('').trim();
    const p=JSON.parse(clean);
    if(!orderModalData)return;
    ['clientName','cpfCnpj','phone','email','street','streetNum','complement','bairro','cep','city','state','notes'].forEach(k=>{if(p[k])orderModalData[k]=p[k];});
    if(p.salePrice)orderModalData.salePrice=p.salePrice;
    if(p.quantity)orderModalData.quantity=p.quantity;
    if(p.paymentType){const fmq=state.maqs.length>0?state.maqs[0].id:'';orderModalData.payments=[{id:uid(),type:p.paymentType,maquininhaId:fmq,mode:'presencial',installments:1,amount:''}];}
    showOrderModal();showDadosTab();
  }).catch(()=>{if(btn){btn.disabled=false;btn.textContent='Interpretar e Preencher';}alert('Erro ao interpretar. Tente novamente.');});
}

function saveOrder(){
  if(!orderModalData)return;
  const o=orderModalData;
  if(!o.items||!o.items[0]||!o.items[0].productId)return alert('Selecione pelo menos um produto.');
  if(o._isNew){
    if(!o.items||o.items.length===0)o.items=[{id:uid(),productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||0,isGift:false}];
    const saved={...o,id:uid(),orderNum:state.orderSeq,createdAt:new Date().toISOString()};
    delete saved._isNew;
    state.stock=state.stock.map(s=>{if(s.productId===saved.productId){return {...s,quantity:Math.max(0,s.quantity-Number(saved.quantity||1))};}return s;});
    state.orders=[saved,...state.orders];
    state.orderSeq++;
    save('orderSeq');save('stock');
  } else {
    delete o._isNew;
    state.orders=state.orders.map(x=>x.id===o.id?o:x);
  }
  save('orders');orderModalData=null;currentTab='pedidos';document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));const np=document.getElementById('nav-pedidos');if(np)np.classList.add('active');render();
}

  const fields=[{k:'c',l:'Nome',v:o.clientName||''},{k:'cpf',l:'CPF/CNPJ',v:o.cpfCnpj||''},{k:'end',l:'Endereco',v:(o.street||'')+' '+(o.streetNum||'')},{k:'cid',l:'Cidade/UF',v:o.city?(o.city+(o.state?'/'+o.state:'')):''},{k:'cep',l:'CEP',v:o.cep||''},{k:'prod',l:'Produto',v:prod?prod.name:''},{k:'ncm',l:'NCM',v:prod?prod.ncm||'':''},{k:'qty',l:'Qtd',v:String(o.quantity||1)},{k:'preco',l:'Preco',v:fmtBRL(o.salePrice)},{k:'total',l:'Total',v:fmtBRL(m.rev)},{k:'nat',l:'Natureza',v:'Venda de Mercadoria'}];
  let fieldsHTML='';
  fields.forEach(f=>{fieldsHTML+=`<div class="tf2"><div><div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);margin-bottom:2px">${f.l}</div><div style="font-weight:500;font-size:12px">${esc(f.v)||'—'}</div></div><button class="cp-btn" onclick="copyField('${esc(f.v)}',this)">Copiar</button></div>`;});
  const overlay=document.createElement('div');
  overlay.className='overlay';
  overlay.innerHTML=`<div class="modal modal-sm"><div class="mt2">Gerar NF - Pedido #${o.orderNum}</div><div onclick="window.open('https://erp.tiny.com.br/notas-fiscais#incluir','_blank')" style="display:flex;align-items:center;gap:12px;background:var(--ordim2);border:1px solid var(--bdb);border-radius:8px;padding:12px 16px;margin-bottom:14px;cursor:pointer"><div style="width:34px;height:34px;border-radius:7px;background:#ff6b00;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff">Ti</div><div style="flex:1"><div style="font-weight:700">Abrir Tiny ERP</div><div style="font-size:11px;color:var(--txd)">Clique para emitir a NF</div></div></div>${fieldsHTML}<div class="mf"><button class="btn bp" onclick="this.closest('.overlay').remove()">Fechar</button></div></div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}
function copyField(text,btn){try{navigator.clipboard.writeText(text);}catch{}btn.textContent='Copiado!';setTimeout(()=>btn.textContent='Copiar',1500);}
</script>
<script>
// ============ NOTAS FISCAIS ============
let nfFilter='todos',nfSearch='';
function renderNotas(){
  let filtered=[...state.nfs].sort((a,b)=>Number(b.numero)-Number(a.numero));
  if(nfFilter!=='todos')filtered=filtered.filter(n=>n.status===nfFilter);
  if(nfSearch){const q=nfSearch.toLowerCase();filtered=filtered.filter(n=>(n.numero||'').includes(q)||(n.clientName||'').toLowerCase().includes(q));}
  const totFat=filtered.filter(n=>n.status==='emitida').reduce((a,n)=>a+Number(n.valor||0),0);
  let statusBtns=`<button class="spill" style="${nfFilter==='todos'?'background:var(--or);border-color:var(--or);color:#fff':''}" onclick="nfFilter='todos';render()">Todas<span class="cnt">${state.nfs.length}</span></button>`;
  NS.forEach(s=>{statusBtns+=`<button class="spill" style="${nfFilter===s.id?`background:${s.c};border-color:${s.c};color:#fff`:''}" onclick="nfFilter='${s.id}';render()"><span class="dot" style="background:${s.c}"></span>${s.label}<span class="cnt">${state.nfs.filter(n=>n.status===s.id).length}</span></button>`;});
  let rows='';
  if(filtered.length===0){rows='<tr><td colspan="8"><div class="empty"><div class="empty-ic">🧾</div><p>Nenhuma nota fiscal</p></div></td></tr>';}
  else{filtered.forEach(nf=>{
    const st=nfInfo(nf.status);const order=state.orders.find(o=>o.id===nf.orderId);
    rows+=`<tr class="cr" onclick="openNFModal('${nf.id}')"><td><span style="font-size:13px;font-weight:700;color:var(--bl)">${esc(nf.numero)}</span></td><td style="color:var(--txd);font-size:11px">${nf.serie}</td><td style="color:var(--txd);font-size:11px">${nf.dataEmissao}</td><td style="font-weight:500">${esc(nf.clientName||'—')}</td><td>${order?`<span class="onum">#${order.orderNum}</span>`:'—'}</td><td style="font-weight:600;color:var(--or)">${fmtBRL(nf.valor)}</td><td><span class="badge" style="background:${st.c}22;color:${st.c}">${st.label}</span></td><td onclick="event.stopPropagation()"><button class="btn bd2 sm" onclick="deleteNF('${nf.id}')">×</button></td></tr>`;
  });}
  return `<div class="sbar">${statusBtns}</div><div class="fbar"><input placeholder="Buscar..." value="${esc(nfSearch)}" oninput="nfSearch=this.value;render()" style="flex:1;max-width:280px"><button class="btn bp" style="margin-left:auto" onclick="openNFModal(null)">+ Nova NF</button></div><div class="card" style="padding:0;overflow:hidden"><div class="tw"><table><thead><tr><th>N. NF</th><th>Serie</th><th>Emissao</th><th>Cliente</th><th>Pedido</th><th>Valor</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>${filtered.length>0?`<div class="tfoot"><span><span class="tfl">Emitidas: </span><strong>${filtered.filter(n=>n.status==='emitida').length}</strong></span><span><span class="tfl">Total: </span><span class="tfv">${fmtBRL(totFat)}</span></span></div>`:''}</div>`;
}
function deleteNF(id){if(confirm('Remover?')){state.nfs=state.nfs.filter(n=>n.id!==id);save('nfs');render();}}
function openNFModal(id){
  const nf=id?state.nfs.find(n=>n.id===id):null;
  const def={numero:'',serie:'001',chave:'',clientName:'',cpfCnpj:'',orderId:'',valor:'',dataEmissao:new Date().toISOString().slice(0,10),status:'pendente',natureza:'Venda de Mercadoria'};
  const form=nf?{...def,...nf}:def;
  let orderOpts='<option value="">Sem vinculo</option>';
  [...state.orders].sort((a,b)=>b.orderNum-a.orderNum).forEach(o=>{orderOpts+=`<option value="${o.id}" ${form.orderId===o.id?'selected':''}>#${o.orderNum} ${esc(o.clientName||'')}</option>`;});
  let stOpts='';NS.forEach(s=>{stOpts+=`<option value="${s.id}" ${form.status===s.id?'selected':''}>${s.label}</option>`;});
  const overlay=document.createElement('div');overlay.className='overlay';
  overlay.innerHTML=`<div class="modal modal-sm"><div class="mt2">${nf?'Editar NF':'Nova Nota Fiscal'}</div><div class="fg"><div class="fr3"><div class="field"><label>Numero *</label><input id="nf-numero" value="${esc(form.numero)}"></div><div class="field"><label>Serie</label><input id="nf-serie" value="${esc(form.serie)}"></div><div class="field"><label>Data</label><input type="date" id="nf-data" value="${form.dataEmissao}"></div></div><div class="field"><label>Chave NFe</label><input id="nf-chave" value="${esc(form.chave)}" placeholder="44 digitos..."></div><div class="fr"><div class="field"><label>Cliente</label><input id="nf-cliente" value="${esc(form.clientName)}"></div><div class="field"><label>CPF/CNPJ</label><input id="nf-cpf" value="${esc(form.cpfCnpj)}"></div></div><div class="fr"><div class="field"><label>Valor</label><div class="ip"><span class="ips">R$</span><input type="number" id="nf-valor" value="${form.valor}"></div></div><div class="field"><label>Status</label><select id="nf-status">${stOpts}</select></div></div><div class="field"><label>Pedido vinculado</label><select id="nf-pedido" onchange="nfLinkOrder(this.value)">${orderOpts}</select></div></div><div class="mf"><button class="btn bg2" onclick="this.closest('.overlay').remove()">Cancelar</button><button class="btn bp" onclick="saveNF('${nf?nf.id:''}')">Salvar</button></div></div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};document.body.appendChild(overlay);
}
function nfLinkOrder(id){const o=state.orders.find(x=>x.id===id);if(!o)return;const c=document.getElementById('nf-cliente');const cpf=document.getElementById('nf-cpf');if(c&&o.clientName)c.value=o.clientName;if(cpf&&o.cpfCnpj)cpf.value=o.cpfCnpj;}
function saveNF(existingId){
  const num=document.getElementById('nf-numero').value;if(!num)return;
  const nf={id:existingId||uid(),numero:num,serie:document.getElementById('nf-serie').value,chave:document.getElementById('nf-chave').value,dataEmissao:document.getElementById('nf-data').value,clientName:document.getElementById('nf-cliente').value,cpfCnpj:document.getElementById('nf-cpf').value,valor:document.getElementById('nf-valor').value,status:document.getElementById('nf-status').value,orderId:document.getElementById('nf-pedido').value,natureza:'Venda de Mercadoria',createdAt:existingId?(state.nfs.find(n=>n.id===existingId)||{}).createdAt||new Date().toISOString():new Date().toISOString()};
  if(existingId){state.nfs=state.nfs.map(n=>n.id===existingId?nf:n);}else{state.nfs=[nf,...state.nfs];}
  save('nfs');document.querySelector('.overlay').remove();render();
}

// ============ ESTOQUE ============
let estoqueTab='estoque';
function renderEstoque(){
  const sl=state.prods.map(p=>{const s=state.stock.find(x=>x.productId===p.id)||{productId:p.id,quantity:0,avgCost:0,movements:[]};return {...p,...s};});
  const totEst=sl.reduce((a,p)=>{const c=p.costMode==='avg'&&p.avgCost>0?p.avgCost:Number(p.costPrice||0);return a+p.quantity*c;},0);
  let rows='';
  sl.forEach(p=>{const c=p.costMode==='avg'&&p.avgCost>0?p.avgCost:Number(p.costPrice||0);rows+=`<tr><td style="font-weight:600">${esc(p.name)}</td><td><span class="${p.quantity>5?'s-ok':p.quantity>0?'s-low':'s-zero'}">${p.quantity} un.</span></td><td style="color:var(--txm)">${fmtBRL(p.costPrice)}</td><td style="color:${p.avgCost>0?'var(--or)':'var(--txd)'};font-weight:${p.avgCost>0?600:400}">${p.avgCost>0?fmtBRL(p.avgCost):'—'}</td><td><span class="${p.costMode==='avg'?'badge b-gr':'badge b-bl'}">${p.costMode==='avg'?'Auto':'Manual'}</span></td><td>${fmtBRL(p.quantity*c)}</td><td><button class="btn bg2 sm" onclick="openAdjModal('${p.id}')">Ajustar</button></td></tr>`;});
  let poRows='';
  if(estoqueTab==='compras'){if(!state.purchaseOrders.length){poRows='<tr><td colspan="6"><div class="empty"><div class="empty-ic">🛒</div><p>Nenhum pedido</p></div></td></tr>';}else{[...state.purchaseOrders].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).forEach(p=>{const sup=state.suppliers.find(s=>s.id===p.supplierId);const total=p.items.reduce((a,i)=>a+Number(i.qty||0)*Number(i.unitCost||0),0);const items=p.items.map(it=>{const prod=state.prods.find(x=>x.id===it.productId);return `<div style="font-size:11px;color:var(--txm)">${prod?esc(prod.name):'—'} x${it.qty}</div>`;}).join('');poRows+=`<tr><td style="color:var(--txd);font-size:11px">${p.date}</td><td style="font-weight:600">${esc(sup?sup.name:'—')}</td><td>${items}</td><td style="color:var(--or);font-weight:600">${fmtBRL(total)}</td><td><span class="${p.status==='recebido'?'badge b-gr':'badge b-or'}">${p.status==='recebido'?'Recebido':'Pendente'}</span></td><td>${p.status==='pendente'?`<button class="btn bgr2 sm" onclick="receivePO('${p.id}')">Receber</button>`:''}</td></tr>`;});}}
  return `<div style="display:flex;gap:8px;margin-bottom:16px"><button class="${estoqueTab==='estoque'?'btn bp':'btn bg2'}" onclick="estoqueTab='estoque';render()">Estoque</button><button class="${estoqueTab==='compras'?'btn bp':'btn bg2'}" onclick="estoqueTab='compras';render()">Pedidos de Compra</button><button class="btn bp" style="margin-left:auto" onclick="openPOModal()">+ Pedido de Compra</button></div>
  ${estoqueTab==='estoque'?`<div class="g3" style="margin-bottom:16px"><div class="card"><div class="ct">Valor em Estoque</div><div class="cv cv-or">${fmtBRL(totEst)}</div></div><div class="card"><div class="ct">Zerados</div><div class="cv cv-rd">${sl.filter(p=>p.quantity<=0).length}</div></div><div class="card"><div class="ct">Estoque Baixo</div><div class="cv" style="color:#f59e0b">${sl.filter(p=>p.quantity>0&&p.quantity<=5).length}</div></div></div><div class="card" style="padding:0;overflow:hidden"><div class="tw"><table><thead><tr><th>Produto</th><th>Estoque</th><th>Custo Manual</th><th>Custo Medio</th><th>Modo</th><th>Valor Total</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`:`<div class="card" style="padding:0;overflow:hidden"><div class="tw"><table><thead><tr><th>Data</th><th>Fornecedor</th><th>Itens</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody>${poRows}</tbody></table></div></div>`}`;
}
function openAdjModal(productId){
  const p=state.prods.find(x=>x.id===productId);const s=state.stock.find(x=>x.productId===productId)||{quantity:0,avgCost:0};
  const overlay=document.createElement('div');overlay.className='overlay';
  overlay.innerHTML=`<div class="modal modal-sm"><div class="mt2">Ajustar Estoque - ${esc(p?p.name:'')}</div><div class="fg"><div style="padding:8px 12px;background:var(--sf3);border-radius:7px;font-size:12px">Atual: <strong>${s.quantity} un.</strong> · C.Medio: <strong style="color:var(--or)">${fmtBRL(s.avgCost)}</strong></div><div class="fr"><div class="field"><label>Qtd (+ ou -)</label><input type="number" id="adj-qty" placeholder="Ex: 10 ou -3"></div><div class="field"><label>Custo unit.</label><div class="ip"><span class="ips">R$</span><input type="number" id="adj-cost" placeholder="0,00"></div></div></div><div class="field"><label>Motivo</label><input id="adj-note" placeholder="Inventario, devolucao..."></div></div><div class="mf"><button class="btn bg2" onclick="this.closest('.overlay').remove()">Cancelar</button><button class="btn bp" onclick="applyAdj('${productId}')">Aplicar</button></div></div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};document.body.appendChild(overlay);
}
function applyAdj(productId){
  const qty=Number(document.getElementById('adj-qty').value);const cost=Number(document.getElementById('adj-cost').value||0);const note=document.getElementById('adj-note').value;
  if(!qty)return;
  const idx=state.stock.findIndex(s=>s.productId===productId);
  const mvt={date:new Date().toISOString().slice(0,10),type:qty>0?'entrada':'saida',qty,cost,note};
  if(idx>=0){const cur=state.stock[idx];const nq=cur.quantity+qty;const na=qty>0&&cost>0?calcAvg(cur.quantity,cur.avgCost,qty,cost):cur.avgCost;state.stock[idx]={...cur,quantity:Math.max(0,nq),avgCost:na,movements:[mvt,...(cur.movements||[])]};}
  else{state.stock.push({productId,quantity:Math.max(0,qty),avgCost:cost,movements:[mvt]});}
  save('stock');document.querySelector('.overlay').remove();render();
}
function receivePO(pid){
  const order=state.purchaseOrders.find(p=>p.id===pid);if(!order)return;
  order.items.forEach(item=>{const idx=state.stock.findIndex(s=>s.productId===item.productId);const aq=Number(item.qty||0);const ac=Number(item.unitCost||0);const mvt={date:new Date().toISOString().slice(0,10),type:'entrada',qty:aq,cost:ac};
    if(idx>=0){const cur=state.stock[idx];state.stock[idx]={...cur,quantity:cur.quantity+aq,avgCost:calcAvg(cur.quantity,cur.avgCost,aq,ac),movements:[mvt,...(cur.movements||[])]};}
    else{state.stock.push({productId:item.productId,quantity:aq,avgCost:ac,movements:[mvt]});}
  });
  state.purchaseOrders=state.purchaseOrders.map(p=>p.id===pid?{...p,status:'recebido'}:p);
  save('stock');save('purchaseOrders');render();
}
function openPOModal(){
  let supOpts='<option value="">Selecione...</option>';state.suppliers.forEach(s=>{supOpts+=`<option value="${s.id}">${esc(s.name)}</option>`;});
  let prodOpts='<option value="">Selecione...</option>';state.prods.forEach(p=>{prodOpts+=`<option value="${p.id}">${esc(p.name)}</option>`;});
  const overlay=document.createElement('div');overlay.className='overlay';
  overlay.innerHTML=`<div class="modal modal-md"><div class="mt2">Novo Pedido de Compra</div><div class="fg"><div class="fr"><div class="field"><label>Fornecedor</label><select id="po-sup">${supOpts}</select></div><div class="field"><label>Data</label><input type="date" id="po-date" value="${new Date().toISOString().slice(0,10)}"></div></div><div id="po-items"><div class="po-item" style="display:grid;grid-template-columns:1fr 90px 110px;gap:8px;align-items:end;background:var(--sf3);border-radius:7px;padding:10px;margin-bottom:7px"><div class="field"><label>Produto</label><select class="po-prod">${prodOpts}</select></div><div class="field"><label>Qtd</label><input type="number" class="po-qty"></div><div class="field"><label>Custo Unit.</label><div class="ip"><span class="ips">R$</span><input type="number" class="po-cost"></div></div></div></div><button class="btn bg2" onclick="addPOItem()" style="margin-top:4px">+ Produto</button></div><div class="mf"><button class="btn bg2" onclick="this.closest('.overlay').remove()">Cancelar</button><button class="btn bp" onclick="savePO()">Salvar</button></div></div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};document.body.appendChild(overlay);
}
function addPOItem(){
  let prodOpts='<option value="">Selecione...</option>';state.prods.forEach(p=>{prodOpts+=`<option value="${p.id}">${esc(p.name)}</option>`;});
  const item=document.createElement('div');item.className='po-item';item.style.cssText='display:grid;grid-template-columns:1fr 90px 110px;gap:8px;align-items:end;background:var(--sf3);border-radius:7px;padding:10px;margin-bottom:7px';
  item.innerHTML=`<div class="field"><label>Produto</label><select class="po-prod">${prodOpts}</select></div><div class="field"><label>Qtd</label><input type="number" class="po-qty"></div><div class="field"><label>Custo Unit.</label><div class="ip"><span class="ips">R$</span><input type="number" class="po-cost"></div></div>`;
  document.getElementById('po-items').appendChild(item);
}
function savePO(){
  const items=[...document.querySelectorAll('.po-item')].map(el=>({productId:el.querySelector('.po-prod').value,qty:el.querySelector('.po-qty').value,unitCost:el.querySelector('.po-cost').value})).filter(i=>i.productId&&i.qty);
  if(!items.length)return;
  state.purchaseOrders=[{id:uid(),supplierId:document.getElementById('po-sup').value,date:document.getElementById('po-date').value,items,status:'pendente',createdAt:new Date().toISOString()},...state.purchaseOrders];
  save('purchaseOrders');document.querySelector('.overlay').remove();render();
}

// ============ FORNECEDORES ============
function renderFornecedores(){
  if(!state.suppliers.length)return `<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn bp" onclick="openSupModal(null)">+ Novo Fornecedor</button></div><div class="empty"><div class="empty-ic">🏭</div><p>Nenhum fornecedor</p></div>`;
  let cards='';state.suppliers.forEach(s=>{cards+=`<div class="su-c"><div style="display:flex;justify-content:space-between"><div><div style="font-weight:700;font-size:14px">${esc(s.name)}</div>${s.cnpj?`<div style="font-size:11px;color:var(--txd)">CNPJ: ${esc(s.cnpj)}</div>`:''}</div><div style="display:flex;gap:5px"><button class="btn bg2 sm" onclick="openSupModal('${s.id}')">Edit</button><button class="btn bd2 sm" onclick="deleteSup('${s.id}')">×</button></div></div><div style="height:1px;background:var(--bd);margin:8px 0"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${s.contact?`<div><div style="font-size:9px;color:var(--txd);text-transform:uppercase">Contato</div><div style="font-size:12px">${esc(s.contact)}</div></div>`:''} ${s.phone?`<div><div style="font-size:9px;color:var(--txd);text-transform:uppercase">Tel</div><div style="font-size:12px">${esc(s.phone)}</div></div>`:''} ${s.city?`<div><div style="font-size:9px;color:var(--txd);text-transform:uppercase">Cidade</div><div style="font-size:12px">${esc(s.city)}${s.state?'/'+esc(s.state):''}</div></div>`:''} ${s.paymentTerms?`<div><div style="font-size:9px;color:var(--txd);text-transform:uppercase">Pgto</div><div style="font-size:12px;color:var(--or)">${esc(s.paymentTerms)}</div></div>`:''}</div>${s.notes?`<div style="font-size:11px;color:var(--txd);font-style:italic;border-top:1px solid var(--bd);padding-top:6px;margin-top:6px">${esc(s.notes)}</div>`:''}</div>`;});
  return `<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn bp" onclick="openSupModal(null)">+ Novo Fornecedor</button></div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px">${cards}</div>`;
}
function deleteSup(id){if(confirm('Remover?')){state.suppliers=state.suppliers.filter(s=>s.id!==id);save('suppliers');render();}}
function openSupModal(id){
  const s=id?state.suppliers.find(x=>x.id===id):null;
  const f=s||{name:'',cnpj:'',phone:'',email:'',contact:'',city:'',state:'',paymentTerms:'',notes:''};
  const overlay=document.createElement('div');overlay.className='overlay';
  overlay.innerHTML=`<div class="modal modal-sm"><div class="mt2">${s?'Editar':'Novo Fornecedor'}</div><div class="fg"><div class="fr"><div class="field"><label>Nome *</label><input id="s-name" value="${esc(f.name)}"></div><div class="field"><label>CNPJ</label><input id="s-cnpj" value="${esc(f.cnpj)}"></div></div><div class="fr"><div class="field"><label>Contato</label><input id="s-contact" value="${esc(f.contact)}"></div><div class="field"><label>Tel</label><input id="s-phone" value="${esc(f.phone)}"></div></div><div class="fr3"><div class="field"><label>Cidade</label><input id="s-city" value="${esc(f.city)}"></div><div class="field"><label>UF</label><input id="s-state" value="${esc(f.state)}" maxlength="2"></div><div class="field"><label>Cond. Pgto</label><input id="s-pgto" value="${esc(f.paymentTerms)}"></div></div><div class="field"><label>Obs.</label><textarea id="s-notes" rows="2" style="resize:vertical">${esc(f.notes)}</textarea></div></div><div class="mf"><button class="btn bg2" onclick="this.closest('.overlay').remove()">Cancelar</button><button class="btn bp" onclick="saveSup('${s?s.id:''}')">Salvar</button></div></div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};document.body.appendChild(overlay);
}
function saveSup(existingId){
  const name=document.getElementById('s-name').value;if(!name)return;
  const sup={id:existingId||uid(),name,cnpj:document.getElementById('s-cnpj').value,contact:document.getElementById('s-contact').value,phone:document.getElementById('s-phone').value,city:document.getElementById('s-city').value,state:document.getElementById('s-state').value,paymentTerms:document.getElementById('s-pgto').value,notes:document.getElementById('s-notes').value,createdAt:existingId?(state.suppliers.find(s=>s.id===existingId)||{}).createdAt||new Date().toISOString():new Date().toISOString()};
  if(existingId){state.suppliers=state.suppliers.map(s=>s.id===existingId?sup:s);}else{state.suppliers=[...state.suppliers,sup];}
  save('suppliers');document.querySelector('.overlay').remove();render();
}

// ============ PRODUTOS ============
let prodSearch='';
function renderProdutos(){
  const filtered=state.prods.filter(p=>p.name.toLowerCase().includes(prodSearch.toLowerCase())||(p.sku||'').toLowerCase().includes(prodSearch.toLowerCase()));
  let rows='';
  filtered.forEach(p=>{const si=state.stock.find(s=>s.productId===p.id);const mg=p.salePrice>0?((p.salePrice-p.costPrice)/p.salePrice)*100:0;const qty=si?si.quantity:0;const tipoIcon=p.tipo==='variacao'?'🎨':p.tipo==='kit'?'🎁':'📦';const tipoLbl=p.tipo==='variacao'?'Variacao':p.tipo==='kit'?'Kit':'Simples';rows+=`<tr><td><div style="display:flex;align-items:center;gap:7px"><span style="font-size:14px">${tipoIcon}</span><div><div style="font-weight:600">${esc(p.name)}</div>${p.brand?`<div style="font-size:10px;color:var(--txd)">${esc(p.brand)}</div>`:''}
${p.tipo==='variacao'&&p.variacoes&&p.variacoes.length>0?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:2px">${p.variacoes.map(v=>`<span style="font-size:9px;padding:1px 5px;background:var(--ordim);border:1px solid var(--bdb);border-radius:10px;color:var(--or)">${esc(v.nome)}: ${(v.opcoes||[]).join(', ')}</span>`).join('')}</div>`:''}${p.tipo==='kit'&&p.kitItems&&p.kitItems.length>0?`<div style="font-size:10px;color:var(--txd);margin-top:2px">${p.kitItems.length} itens no kit</div>`:''}
</div></div></td><td><span class="badge b-bl">${esc(p.sku||'—')}</span></td><td style="font-size:10px;color:var(--txd)">${esc(p.ncm||'—')}</td><td style="color:var(--txm)">${fmtBRL(p.costPrice)}</td><td style="color:${si&&si.avgCost>0?'var(--or)':'var(--txd)'};font-weight:${si&&si.avgCost>0?600:400}">${si&&si.avgCost>0?fmtBRL(si.avgCost):'—'}</td><td style="color:var(--or);font-weight:600">${fmtBRL(p.salePrice)}</td><td><span class="${mg>=20?'badge b-gr':mg>0?'badge b-or':'badge b-rd'}">${fmtPct(mg)}</span></td><td><span class="${qty>5?'s-ok':qty>0?'s-low':'s-zero'}">${qty}</span></td><td><span class="badge b-or">${tipoLbl}</span></td><td><div style="display:flex;gap:5px"><button class="btn bg2 sm" onclick="openProdModal('${p.id}')">Edit</button><button class="btn bd2 sm" onclick="deleteProd('${p.id}')">×</button></div></td></tr>`;});
  return `<div style="display:flex;gap:10px;margin-bottom:16px"><input placeholder="Buscar..." value="${esc(prodSearch)}" oninput="prodSearch=this.value;render()" style="flex:1"><button class="btn bp" onclick="openProdModal(null)">+ Novo Produto</button></div><div class="card" style="padding:0;overflow:hidden">${filtered.length===0?'<div class="empty"><div class="empty-ic">📦</div><p>Nenhum produto</p></div>':`<div class="tw"><table><thead><tr><th>Produto</th><th>SKU</th><th>NCM</th><th>Custo</th><th>C.Medio</th><th>Venda</th><th>Margem</th><th>Estoque</th><th>Tipo</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`}</div>`;
}
function deleteProd(id){if(confirm('Remover?')){state.prods=state.prods.filter(p=>p.id!==id);save('prods');render();}}
// ============ PRODUCT MODAL STATE ============
let prodModalData = null;

function openProdModal(id){
  const p = id ? state.prods.find(x=>x.id===id) : null;
  prodModalData = p ? JSON.parse(JSON.stringify(p)) : {
    name:'',sku:'',ncm:'',brand:'',costPrice:'',salePrice:'',
    weight:'',weightLiq:'',length:'',width:'',height:'',costMode:'manual',gtin:'',cest:'',origemICMS:'0',unidMedida:'Un',tipoEmbalagem:'Pacote/Caixa',controlarEstoque:'sim',estoqueInicial:'',estoqueMin:'',estoqueMax:'',localizacao:'',diasPreparo:'',
    tipo:'simples', // simples | variacao | kit
    variacoes:[], // [{nome:'Cor', opcoes:['Prata','Preto','Dourado']}]
    kitItems:[] // [{productId:'', qty:1}]
  };
  if(!prodModalData.tipo) prodModalData.tipo = 'simples';
  if(!prodModalData.variacoes) prodModalData.variacoes = [];
  if(!prodModalData.kitItems) prodModalData.kitItems = [];
  renderProdModal();
}

function renderProdModal(){
  const f = prodModalData;
  const isEdit = !!f.id;

  // Cost mode buttons
  const cmBtns = ['manual','avg'].map(m =>
    `<button onclick="setProdField('costMode','${m}');renderProdModal()" style="flex:1;padding:7px;font-size:11px;cursor:pointer;border:none;background:${f.costMode===m?'var(--or)':'transparent'};color:${f.costMode===m?'#fff':'var(--txd)'}">${m==='manual'?'Manual':'Custo Medio Auto'}</button>`
  ).join('');

  // Tipo buttons
  const tipoBtns = [
    {id:'simples',l:'📦 Simples',d:'Produto único sem variação'},
    {id:'variacao',l:'🎨 Com Variação',d:'Ex: cor, tamanho, pulseira'},
    {id:'kit',l:'🎁 Kit / Combo',d:'Conjunto de produtos do catálogo'}
  ].map(t =>
    `<div onclick="setProdField('tipo','${t.id}');renderProdModal()" style="padding:10px 12px;border-radius:8px;cursor:pointer;border:2px solid ${f.tipo===t.id?'var(--or)':'var(--bd)'};background:${f.tipo===t.id?'var(--ordim2)':'var(--sf3)'};flex:1">
      <div style="font-weight:700;font-size:12px;color:${f.tipo===t.id?'var(--or)':'var(--tx)'}">${t.l}</div>
      <div style="font-size:10px;color:var(--txd);margin-top:2px">${t.d}</div>
    </div>`
  ).join('');

  // Variacoes section - each variacao has {nome, opcoes:[{valor, costPrice, salePrice, qty, sku}]}
  let varHTML = '';
  if(f.tipo === 'variacao'){
    // Compute all combinations from all variacoes
    function getCombinations(variacoes){
      if(!variacoes.length)return[[]];const [first,...rest]=variacoes;const restComb=getCombinations(rest);const result=[];(first.opcoes||[]).forEach(op=>{const v=typeof op==='object'?(op.valor||''):op;if(!v)return;restComb.forEach(c=>{result.push([{tipo:first.nome,valor:v},...c]);});});return result;}
    const combinations=f.variacoes.length>0?getCombinations(f.variacoes):[];
    // Build skuMap from existing skuData
    if(!f.skuData)f.skuData={};
    varHTML = `<div style="padding:14px;background:var(--sf3);border-radius:8px;border:1px solid var(--bd);margin-bottom:10px">
      <div class="sl" style="margin-bottom:10px">Tipos de Variação</div>
      <div style="font-size:11px;color:var(--txd);margin-bottom:12px">Defina os tipos e as opções de cada um. Os preços e estoque de cada combinação aparecem abaixo.</div>
      ${f.variacoes.map((v,vi) => {
        return `<div style="background:var(--sf2);border-radius:7px;padding:12px;margin-bottom:8px;border:1px solid var(--bd)">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
            <div class="field" style="flex:1"><label>Nome do tipo</label><input value="${esc(v.nome)}" oninput="prodModalData.variacoes[${vi}].nome=this.value" placeholder="Ex: Cor, Tamanho, Pulseira..."></div>
            <button class="btn bd2 sm" style="align-self:flex-end" onclick="removeVariacao(${vi})">× Remover</button>
          </div>
          <div class="sl" style="margin-bottom:6px;font-size:9px">Opções</div>
          <div id="ops-${vi}" style="display:flex;flex-direction:column;gap:5px">
            ${(v.opcoes||[]).map((op,oi)=>{const opVal=typeof op==='object'?(op.valor||''):op;return `<div style="display:flex;gap:6px;align-items:center">
              <input value="${esc(opVal)}" oninput="setVarOpcao(${vi},${oi},this.value)" placeholder="Ex: Prata" style="flex:1;max-width:180px">
              <button class="btn bd2 sm" onclick="prodModalData.variacoes[${vi}].opcoes.splice(${oi},1);renderProdModal()">×</button>
            </div>`;}).join('')}
          </div>
          <button class="btn bg2 sm" style="margin-top:7px" onclick="prodModalData.variacoes[${vi}].opcoes.push('');renderProdModal()">+ Opção</button>
        </div>`;
      }).join('')}
      <button class="btn bg2 sm" onclick="addVariacao()" style="width:100%;margin-top:4px">+ Adicionar Tipo de Variação</button>
      <button class="btn bp sm" onclick="renderProdModal()" style="width:100%;margin-top:6px">🔄 Atualizar Tabela de Variações</button>
    </div>
    ${combinations.length>0?`<div style="padding:14px;background:var(--sf3);border-radius:8px;border:1px solid var(--bdb)">
      <div class="sl" style="margin-bottom:4px">Preço, Custo e Estoque por Variação</div>

      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr>
          <th style="text-align:left;padding:8px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd)">Variação</th>
          <th style="text-align:left;padding:8px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd)">SKU</th>
          <th style="text-align:left;padding:8px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd)">Custo (R$)</th>
          <th style="text-align:left;padding:8px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd)">Venda (R$)</th>
          <th style="text-align:left;padding:8px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd)">Estoque</th>
          <th style="text-align:left;padding:8px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd)">Ativo</th>
        </tr></thead>
        <tbody>${combinations.map((combo,ci)=>{
          const key=combo.map(c=>c.valor).join('|');
          const sd=f.skuData[key]||{};
          const label=combo.map(c=>c.valor).join(' / ');
          return `<tr style="border-bottom:1px solid var(--bd)">
            <td style="padding:8px 10px;font-weight:600;white-space:nowrap">${esc(label)}</td>
