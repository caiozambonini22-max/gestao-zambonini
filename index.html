function parseWA(){
  const wt=(document.getElementById('wa-text')||{}).value||'';
  const wo=(document.getElementById('wa-order')||{}).value||'';
  if(!wt&&!wo){alert('Cole o endereço/cliente ou o pedido nos campos.');return;}
  if(!orderModalData)return;

  const txt=wt+'\n'+wo;
  const p={};

  // Helper: pega valor após um rótulo (Nome:, Endereço:, etc) na mesma linha
  function afterLabel(re){
    const m=txt.match(re);
    if(!m)return '';
    return (m[1]||'').replace(/^[\s:☑✔✓\-—•·.]+/,'').replace(/[☑✔✓]/g,'').trim();
  }
  // 1. EMAIL — qualquer coisa com @
  const em=txt.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
  if(em)p.email=em[0];
  // 2. CPF ou CNPJ — XXX.XXX.XXX-XX, XX.XXX.XXX/XXXX-XX, ou sequência longa de dígitos
  const cpfM=txt.match(/(\d{3}\.\d{3}\.\d{3}-?\d{2})/);
  const cnpjM=txt.match(/(\d{2}\.\d{3}\.\d{3}\/?\d{4}-?\d{2})/);
  if(cnpjM)p.cpfCnpj=cnpjM[1].replace(/\D/g,'');
  else if(cpfM)p.cpfCnpj=cpfM[1].replace(/\D/g,'');
  // 3. CEP — XXXXX-XXX ou 8 dígitos isolados perto de "CEP"
  const cepM=txt.match(/(?:CEP[:\s]*)?(\d{5}-?\d{3})\b/i);
  if(cepM)p.cep=cepM[1].replace(/\D/g,'');
  // 4. CELULAR — (XX) 9XXXX-XXXX ou variações
  const phM=txt.match(/(\(?\d{2}\)?\s*9?\d{4,5}[-.\s]?\d{4})/);
  if(phM){
    const dig=phM[1].replace(/\D/g,'');
    // Evita confundir com CPF/CNPJ/CEP
    if(dig.length===10||dig.length===11)p.phone=dig;
  }
  // 5. UF — duas letras maiúsculas isoladas (preferência: depois de "/" ou "Estado")
  const ufM=txt.match(/(?:Estado[:\s]*|\/\s*)([A-Z]{2})\b/)||txt.match(/\b([A-Z]{2})\b\s*(?:\d{5}|$|,)/m);
  if(ufM)p.state=ufM[1].toUpperCase();

  // 6. NOME — "Nome: X" ou primeira linha sem dígitos antes de uns outros campos
  p.clientName=afterLabel(/(?:^|\n)\s*(?:☑\ufe0f?|✔|✓)?\s*Nome[:\s]+([^\n]+)/i);
  // 7. ENDEREÇO / RUA — "Endereço: X" ou "Rua: X"
  let endereco=afterLabel(/(?:^|\n)\s*(?:☑\ufe0f?|✔|✓)?\s*(?:Endere[çc]o|Rua)[:\s]+([^\n]+)/i);
  if(endereco){
    // Tenta separar "Rua X, 123, complemento"
    const partes=endereco.split(',').map(s=>s.trim());
    p.street=partes[0]||'';
    // Procura número (1-6 dígitos no segundo pedaço)
    if(partes[1]){
      const numM=partes[1].match(/^(\d{1,6}[A-Za-z]?)/);
      if(numM){p.streetNum=numM[1];p.complement=partes[1].replace(numM[1],'').trim();}
      else p.complement=partes[1];
    }
    if(partes[2])p.complement=(p.complement?p.complement+' ':'')+partes[2];
  }
  // 8. NÚMERO (separado) — "Número: 123"
  const numLbl=afterLabel(/(?:^|\n)\s*(?:☑\ufe0f?|✔|✓)?\s*N[úu]mero[:\s]+([^\n]+)/i);
  if(numLbl)p.streetNum=numLbl;
  // 9. COMPLEMENTO / Ponto de referência
  const compLbl=afterLabel(/(?:^|\n)\s*(?:☑\ufe0f?|✔|✓)?\s*(?:Complemento|Ponto de refer[êe]ncia|Refer[êe]ncia)[:\s]+([^\n]+)/i);
  if(compLbl)p.complement=(p.complement?p.complement+' — ':'')+compLbl;
  // 10. BAIRRO
  p.bairro=afterLabel(/(?:^|\n)\s*(?:☑\ufe0f?|✔|✓)?\s*Bairro[:\s]+([^\n]+)/i);
  // 11. CIDADE
  p.city=afterLabel(/(?:^|\n)\s*(?:☑\ufe0f?|✔|✓)?\s*Cidade[:\s]+([^\n]+)/i);
  // 12. NOME alternativo (se não achou): primeira linha não vazia que tenha 2+ palavras de letras
  if(!p.clientName){
    const linhas=txt.split('\n').map(l=>l.trim()).filter(Boolean);
    for(const l of linhas){
      if(/^[A-Za-zÀ-ÿ\s]{4,}$/.test(l)&&l.split(/\s+/).length>=2){p.clientName=l;break;}
    }
  }
  // 13. FORMA DE PAGAMENTO
  const payL=afterLabel(/Forma de pagamento[:\s]+([^\n]+)/i).toLowerCase();
  if(payL){
    if(/pix/.test(payL))p.paymentType='pix';
    else if(/cart[ãa]o|cr[ée]dito|d[ée]bito/.test(payL))p.paymentType='cartao';
    else if(/dinheiro|esp[ée]cie/.test(payL))p.paymentType='dinheiro';
  }

  // ── Aplica no modal ──
  ['clientName','cpfCnpj','phone','email','street','streetNum','complement','bairro','cep','city','state'].forEach(k=>{if(p[k])orderModalData[k]=p[k];});
  if(p.paymentType){const fmq=state.maqs.length>0?state.maqs[0].id:'';orderModalData.payments=[{id:uid(),type:p.paymentType,maquininhaId:fmq,mode:'presencial',installments:1,amount:''}];}
  showOrderModal();showDadosTab();

  // Valida CEP no ViaCEP (grátis) e completa rua/bairro/cidade/UF que não vieram
  if(p.cep){validateAndFillCEP(p.cep);}

  // Feedback: quantos campos foram preenchidos
  const camposPreenchidos=Object.keys(p).filter(k=>p[k]).length;
  if(camposPreenchidos===0){
    showToast('Nenhum dado reconhecido. Cole o texto com rótulos como "Nome:", "CEP:", "Email:"...','rd');
  }else{
    showToast(`✅ ${camposPreenchidos} campos preenchidos${p.cep?' · validando CEP...':''}`,'gr');
  }
}

// Valida CEP no ViaCEP; completa rua/bairro/cidade/UF se vazios; mostra aviso se inválido.
function validateAndFillCEP(cep){
  if(!orderModalData)return;
  buscarCEP(cep,function(d){
    // Sucesso: preenche apenas campos vazios (não sobrescreve o que o IA já capturou)
    if(!orderModalData.street&&d.street)orderModalData.street=d.street;
    if(!orderModalData.bairro&&d.bairro)orderModalData.bairro=d.bairro;
    if(!orderModalData.city&&d.city)orderModalData.city=d.city;
    if(!orderModalData.state&&d.state)orderModalData.state=d.state;
    orderModalData.cep=d.cep;
    orderModalData._cepWarning=null;
    showOrderModal();
  },function(err){
    // Falha: registra aviso visível no topo, mas NÃO bloqueia o uso do form
    orderModalData._cepWarning=err;
    showOrderModal();
  });
}

// Helper: calcula total real do pedido somando todos os itens
function getOrderTotal(o){
  if(!o)return 0;
  const frete=Number(o.freteClient||0);
  const items=o.items&&o.items.length>0?o.items:null;
  if(items){
    const itemTotal=items.reduce((a,it)=>it.isGift?a:a+Number(it.salePrice||0)*Number(it.quantity||1),0);
    const upTotal=(o.upsells||[]).reduce((a,u)=>a+Number(u.price||0),0);
    return itemTotal+upTotal+frete-Number(o.discount||0);
  }
  return Number(o.salePrice||0)*Number(o.quantity||1)+(o.upsells||[]).reduce((a,u)=>a+Number(u.price||0),0)+frete-Number(o.discount||0);
}

function saveOrder(){
  if(!orderModalData)return;
  const o=orderModalData;
  if(!o.items||!o.items[0]||!o.items[0].productId)return alert('Selecione pelo menos um produto.');
  // Calcula e salva o total correto somando todos os itens
  o.salePrice=getOrderTotal(o);
  if(o._isNew){
    if(!o.items||o.items.length===0)o.items=[{id:uid(),productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||0,isGift:false}];
    const saved={...o,id:uid(),orderNum:state.orderSeq,createdAt:new Date().toISOString()};
    delete saved._isNew;

    // Debita estoque por item — respeita variação se selecionada
    saved.items.forEach(item=>{
      if(!item.productId||item.isGift)return;
      const qty=Number(item.quantity||1);
      const sIdx=state.stock.findIndex(s=>s.productId===item.productId);
      if(sIdx<0)return;
      if(item.variacaoId){
        // Debita da variação específica
        const vars=state.stock[sIdx].variations||[];
        const vIdx=vars.findIndex(v=>v.id===item.variacaoId);
        if(vIdx>=0){vars[vIdx].quantity=Math.max(0,Number(vars[vIdx].quantity||0)-qty);}
        state.stock[sIdx].variations=vars;
        state.stock[sIdx].quantity=vars.reduce((a,v)=>a+Number(v.quantity||0),0);
      } else {
        // Debita do total
        state.stock[sIdx].quantity=Math.max(0,state.stock[sIdx].quantity-qty);
      }
    });

    state.orders=[saved,...state.orders];
    state.orderSeq++;
    save('orderSeq');save('stock');
  } else {
    delete o._isNew;
    state.orders=state.orders.map(x=>x.id===o.id?o:x);
  }
  save('orders');orderModalData=null;currentTab='pedidos';document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));const np=document.getElementById('nav-pedidos');if(np)np.classList.add('active');render();
}

  const m=calcM(o);
  const fields=[{k:'c',l:'Nome',v:o.clientName||''},{k:'cpf',l:'CPF/CNPJ',v:o.cpfCnpj||''},{k:'end',l:'Endereco',v:(o.street||'')+' '+(o.streetNum||'')},{k:'cid',l:'Cidade/UF',v:o.city?(o.city+(o.state?'/'+o.state:'')):''},{k:'cep',l:'CEP',v:o.cep||''},{k:'prod',l:'Produto',v:prod?prod.name:''},{k:'ncm',l:'NCM',v:prod?prod.ncm||'':''},{k:'qty',l:'Qtd',v:String(o.quantity||1)},{k:'preco',l:'Preco',v:fmtBRL(o.salePrice)},{k:'total',l:'Total',v:fmtBRL(m.rev)},{k:'nat',l:'Natureza',v:'Venda de Mercadoria'}];
  let fieldsHTML='';
  fields.forEach(f=>{fieldsHTML+=`<div class="tf2"><div><div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);margin-bottom:2px">${f.l}</div><div style="font-weight:500;font-size:12px">${esc(f.v)||'—'}</div></div><button class="cp-btn" onclick="copyField('${esc(f.v)}',this)">Copiar</button></div>`;});
  const overlay=document.createElement('div');
  overlay.className='overlay';
  overlay.innerHTML=`<div class="modal modal-sm"><div class="mt2">Gerar NF - Pedido #${o.orderNum}</div><div onclick="window.open('https://erp.tiny.com.br/notas-fiscais#incluir','_blank')" style="display:flex;align-items:center;gap:12px;background:var(--ordim2);border:1px solid var(--bdb);border-radius:8px;padding:12px 16px;margin-bottom:14px;cursor:pointer"><div style="width:34px;height:34px;border-radius:7px;background:#ff6b00;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff">Ti</div><div style="flex:1"><div style="font-weight:700">Abrir Tiny ERP</div><div style="font-size:11px;color:var(--txd)">Clique para emitir a NF</div></div></div>${fieldsHTML}<div class="mf"><button class="btn bp" onclick="this.closest('.overlay').remove()">Fechar</button></div></div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}
function copyField(text,btn){try{navigator.clipboard.writeText(text);}catch{}btn.textContent='Copiado!';setTimeout(()=>btn.textContent='Copiar',1500);}

let estoqueChartInst=null;
function initEstoqueChart(){
  const canvas=document.getElementById('cat-chart');
  if(!canvas||typeof Chart==='undefined')return;
  const cats=state.categories||[];
  const sl=state.prods.map(p=>({...p,...getStockForProd(p)}));
  const data=cats.filter(c=>!c.parentId).map(cat=>{
    const subIds=[cat.id,...cats.filter(c=>c.parentId===cat.id).map(c=>c.id)];
    const prods=sl.filter(p=>subIds.includes(p.categoryId));
    return {name:(cat.name.length>12?cat.name.slice(0,12)+'…':cat.name),custo:Math.round(prods.reduce((a,p)=>a+p.quantity*p.cost,0)),venda:Math.round(prods.reduce((a,p)=>a+p.quantity*(Number(p.salePrice)||0),0))};

    type:'bar',
    data:{
      labels:data.map(d=>d.name),
      datasets:[
        {label:'Custo (R$)',data:data.map(d=>d.custo),backgroundColor:'rgba(249,115,22,.8)',hoverBackgroundColor:'rgba(249,115,22,1)',borderRadius:3,borderSkipped:false},

      plugins:{

        tooltip:{backgroundColor:'#1c1c1c',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#f0f0f0',bodyColor:'#888',callbacks:{label:ctx=>' R$ '+Number(ctx.raw).toLocaleString('pt-BR',{minimumFractionDigits:0})}}
      },
      scales:{

function toggleCat(id){if(catExpanded.has(id)){catExpanded.delete(id);}else{catExpanded.add(id);}render();}
function toggleSubCat(id){if(subCatExpanded.has(id)){subCatExpanded.delete(id);}else{subCatExpanded.add(id);}render();}

function getStockForProd(p){
  const sIdx=state.stock.findIndex(x=>x.productId===p.id);
  let s=sIdx>=0?{...state.stock[sIdx]}:{productId:p.id,quantity:0,avgCost:0,movements:[],variations:[]};
  const existingQty=Number(s.quantity||0);

  // Auto-sync variações do produto (tipo 'variacao') para o estoque
  if(p.tipo==='variacao'&&p.variacoes&&p.variacoes.length>0){
    const existingVars=[...(s.variations||[])];
    let changed=false;
    p.variacoes.forEach(attr=>{
      (attr.opcoes||[]).forEach(op=>{
        const label=p.variacoes.length>1?`${attr.nome}: ${op}`:op;
        if(!existingVars.find(v=>v.name===label)){
          existingVars.push({id:uid(),name:label,quantity:0});
          changed=true;
        }
      });
    });
    if(changed){
      if(sIdx>=0){state.stock[sIdx].variations=existingVars;}
      else{state.stock.push({productId:p.id,quantity:existingQty,avgCost:0,movements:[],variations:existingVars});}
      try{localStorage.setItem('zb_cache_stock',JSON.stringify(state.stock));}catch{}
      clearTimeout(saveTimers['stock_auto']);
      saveTimers['stock_auto']=setTimeout(()=>dbSet('stock',state.stock),2000);
    }
    s={...s,variations:existingVars};
  }

  const vars=s.variations||[];
  const varSum=vars.reduce((a,v)=>a+Number(v.quantity||0),0);
  // Preserva qty original se variações ainda não foram distribuídas (todas zeradas)
  const totalQty=vars.length>0?(varSum>0?varSum:existingQty):existingQty;
  const cost=p.costMode==='avg'&&Number(s.avgCost)>0?Number(s.avgCost):Number(p.costPrice||0);
  return {...s,variations:vars,quantity:totalQty,cost};
}

function saveVarQty(productId,varId,newQty){
  const idx=state.stock.findIndex(s=>s.productId===productId);
  if(idx<0)return;
  const vars=state.stock[idx].variations||[];
  const vIdx=vars.findIndex(v=>v.id===varId);
  if(vIdx<0)return;
  vars[vIdx].quantity=Math.max(0,Number(newQty)||0);
  state.stock[idx].variations=vars;
  state.stock[idx].quantity=vars.reduce((a,v)=>a+Number(v.quantity||0),0);
  save('stock');
}

function addRootCat(){
  const name=(document.getElementById('new-cat-name').value||'').trim();
  const icon=(document.getElementById('new-cat-icon').value||'📁').trim();
  if(!name)return;
  state.categories=[...(state.categories||[]),{id:uid(),name,icon,parentId:null}];
  save('categories');
  document.querySelector('.overlay').remove();
  openManageCats();
}

function addSubCat(parentId){
  const name=prompt('Nome da subcategoria:');
  if(!name)return;
  const icon=prompt('Emoji/ícone (opcional, ex: 📱):','📂')||'📂';
  state.categories=[...(state.categories||[]),{id:uid(),name:name.trim(),icon,parentId}];
  save('categories');
  document.querySelector('.overlay').remove();
  openManageCats();
}

function updateCat(id,field,value){
  state.categories=(state.categories||[]).map(c=>c.id===id?{...c,[field]:value}:c);
  save('categories');
}

function deleteCat(id){
  if(!confirm('Remover categoria? Os produtos atribuídos ficarão sem categoria.'))return;
  state.categories=(state.categories||[]).filter(c=>c.id!==id&&c.parentId!==id);
  state.prods=state.prods.map(p=>p.categoryId===id?{...p,categoryId:null}:p);
  save('categories');save('prods');
  document.querySelector('.overlay').remove();
  openManageCats();
}

function setProdCat(prodId,catId){
  state.prods=state.prods.map(p=>p.id===prodId?{...p,categoryId:catId||null}:p);
  save('prods');
}

function toggleExpand(productId){
  if(estoqueExpanded.has(productId)){estoqueExpanded.delete(productId);}
  else{estoqueExpanded.add(productId);}
  render();
}

function addVar(productId){
  const name=(document.getElementById('new-var-name').value||'').trim();
  const qty=Number(document.getElementById('new-var-qty').value||0);
  if(!name)return;
  const sIdx=state.stock.findIndex(x=>x.productId===productId);
  const newVar={id:uid(),name,quantity:qty};
  if(sIdx>=0){
    state.stock[sIdx].variations=[...(state.stock[sIdx].variations||[]),newVar];
    state.stock[sIdx].quantity=state.stock[sIdx].variations.reduce((a,v)=>a+Number(v.quantity||0),0);
  }else{
    state.stock.push({productId,quantity:qty,avgCost:0,movements:[],variations:[newVar]});
  }
  save('stock');
  document.querySelector('.overlay').remove();
  openManageVars(productId);
}

function removeVar(productId,varId){
  if(!confirm('Remover variação?'))return;
  const sIdx=state.stock.findIndex(x=>x.productId===productId);
  if(sIdx<0)return;
  state.stock[sIdx].variations=(state.stock[sIdx].variations||[]).filter(v=>v.id!==varId);
  state.stock[sIdx].quantity=state.stock[sIdx].variations.reduce((a,v)=>a+Number(v.quantity||0),0);
  save('stock');
  document.querySelector('.overlay').remove();
  estoqueExpanded.add(productId);
  render();
}

function applyAdj(productId,varId){
  const qty=Number(document.getElementById('adj-qty').value);
  const costEl=document.getElementById('adj-cost');
  const cost=costEl?Number(costEl.value||0):0;
  const note=document.getElementById('adj-note').value;
  if(!qty)return;

  const idx=state.stock.findIndex(s=>s.productId===productId);
  const mvt={date:new Date().toISOString().slice(0,10),type:qty>0?'entrada':'saida',qty,cost,note};

  if(varId){
    // Ajusta variação específica
    if(idx>=0){
      const vars=state.stock[idx].variations||[];
      const vIdx=vars.findIndex(v=>v.id===varId);
      if(vIdx>=0){vars[vIdx].quantity=Math.max(0,Number(vars[vIdx].quantity||0)+qty);}
      state.stock[idx].variations=vars;
      state.stock[idx].quantity=vars.reduce((a,v)=>a+Number(v.quantity||0),0);
      state.stock[idx].movements=[mvt,...(state.stock[idx].movements||[])];
    }
  }else{
    // Ajusta produto sem variações
    if(idx>=0){
      const cur=state.stock[idx];
      const nq=cur.quantity+qty;
      const na=qty>0&&cost>0?calcAvg(cur.quantity,cur.avgCost,qty,cost):cur.avgCost;
      state.stock[idx]={...cur,quantity:Math.max(0,nq),avgCost:na,movements:[mvt,...(cur.movements||[])]};
    }else{
      state.stock.push({productId,quantity:Math.max(0,qty),avgCost:cost,movements:[mvt],variations:[]});
    }
  }

  save('stock');
  document.querySelector('.overlay').remove();
  estoqueExpanded.add(productId);
  render();
}
function receivePO(pid){
  const order=state.purchaseOrders.find(p=>p.id===pid);if(!order)return;
  order.items.forEach(item=>{const idx=state.stock.findIndex(s=>s.productId===item.productId);const aq=Number(item.qty||0);const ac=Number(item.unitCost||0);const mvt={date:new Date().toISOString().slice(0,10),type:'entrada',qty:aq,cost:ac};
    if(idx>=0){const cur=state.stock[idx];state.stock[idx]={...cur,quantity:cur.quantity+aq,avgCost:calcAvg(cur.quantity,cur.avgCost,aq,ac),movements:[mvt,...(cur.movements||[])]};}
    else{state.stock.push({productId:item.productId,quantity:aq,avgCost:ac,movements:[mvt]});}
  });
  state.purchaseOrders=state.purchaseOrders.map(p=>p.id===pid?{...p,status:'recebido'}:p);
  save('stock');save('purchaseOrders');render();
}

function savePO(){

    productId:(el.querySelector('.prod-ss-wrap')||{}).getAttribute?el.querySelector('.prod-ss-wrap').getAttribute('data-prod-val'):'',

function duplicateProd(id){
  const p=state.prods.find(x=>x.id===id);
  if(!p)return;
  const clone={...JSON.parse(JSON.stringify(p)),id:uid(),name:'Cópia de '+p.name,sku:''};
  state.prods=[...state.prods,clone];
  save('prods');
  render();
  // Abre direto para edição
  setTimeout(()=>openProdModal(clone.id),100);
}

function setProdField(k,v){if(prodModalData)prodModalData[k]=v;}
function addVariacao(){if(!prodModalData)return;prodModalData.variacoes.push({nome:'',opcoes:[]});renderProdModal();}

function setVarOpcao(vi,oi,val){
  if(!prodModalData||!prodModalData.variacoes[vi])return;
  prodModalData.variacoes[vi].opcoes[oi]=val;
}
function setSkuData(key,field,val){if(!prodModalData)return;if(!prodModalData.skuData)prodModalData.skuData={};if(!prodModalData.skuData[key])prodModalData.skuData[key]={};prodModalData.skuData[key][field]=val;}
function removeVariacao(i){if(!prodModalData)return;prodModalData.variacoes.splice(i,1);renderProdModal();}
function addKitItem(){if(!prodModalData)return;prodModalData.kitItems.push({productId:'',qty:1});renderProdModal();}
function removeKitItem(i){if(!prodModalData)return;prodModalData.kitItems.splice(i,1);renderProdModal();}

function switchCostMode(mode){if(prodModalData)prodModalData.costMode=mode;renderProdModal();}

function saveProd(){
  if(!prodModalData)return;
  const f=prodModalData;
  if(!f.name)return alert('Informe o nome do produto.');
  const prod={
    id:f.id||uid(),name:f.name,brand:f.brand||'',sku:f.sku||'',ncm:f.ncm||'',
    costPrice:Number(f.costPrice||0),salePrice:Number(f.salePrice||0),
    weight:f.weight||'',length:f.length||'',width:f.width||'',height:f.height||'',
    costMode:f.costMode||'manual',gtin:f.gtin||'',cest:f.cest||'',origemICMS:f.origemICMS||'0',unidMedida:f.unidMedida||'Un',tipoEmbalagem:f.tipoEmbalagem||'Pacote/Caixa',controlarEstoque:f.controlarEstoque||'sim',estoqueInicial:f.estoqueInicial||0,estoqueMin:f.estoqueMin||0,estoqueMax:f.estoqueMax||0,localizacao:f.localizacao||'',diasPreparo:f.diasPreparo||0,weightLiq:f.weightLiq||'',descricao:f.descricao||'',obsInterna:f.obsInterna||'',tipo:f.tipo||'simples',
    variacoes:f.variacoes||[],kitItems:f.kitItems||[],skuData:f.skuData||{},
    kitDiscount:Number(f.kitDiscount||0),
    categoryId:f.categoryId||null,
    createdAt:f.createdAt||new Date().toISOString()
  };
  if(f.id){state.prods=state.prods.map(p=>p.id===f.id?prod:p);}
  else{state.prods=[...state.prods,prod];}
  save('prods');
  const ov=document.getElementById('prod-modal-overlay');if(ov)ov.remove();
  prodModalData=null;render();
}

function gerarComprovanteImagem(id){
  const o=getOrderById(id);if(!o)return;
  const canvas=document.createElement('canvas');
  canvas.width=600;canvas.height=800;
  const ctx=canvas.getContext('2d');
  // Background
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,600,800);
  // Header
  ctx.fillStyle='#f97316';ctx.font='bold 28px Arial';ctx.textAlign='center';ctx.fillText('⚡ ZAMBONINI IMPORTS',300,50);
  ctx.fillStyle='#888';ctx.font='14px Arial';ctx.fillText('Smartwatches & Acessórios',300,75);
  // Divider
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,95);ctx.lineTo(560,95);ctx.stroke();
  // Order info
  ctx.fillStyle='#f0f0f0';ctx.font='bold 16px Arial';ctx.textAlign='left';ctx.fillText('COMPROVANTE DE PEDIDO',40,125);
  ctx.fillStyle='#888';ctx.font='13px Arial';ctx.fillText(`Pedido #${o.orderNum||o.id||'—'} · ${o.date||''}`,40,148);
  // Client
  ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(40,165);ctx.lineTo(560,165);ctx.stroke();
  ctx.fillStyle='#f97316';ctx.font='bold 13px Arial';ctx.fillText('CLIENTE',40,185);
  ctx.fillStyle='#f0f0f0';ctx.font='14px Arial';ctx.fillText(o.clientName||'—',40,205);
  ctx.fillStyle='#888';ctx.font='12px Arial';ctx.fillText(o.phone||'',40,222);ctx.fillText(`${o.street||''}${o.streetNum?', '+o.streetNum:''} — ${o.city||''}/${o.state||''}`,40,238);
  // Divider
  ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(40,255);ctx.lineTo(560,255);ctx.stroke();
  // Items
  ctx.fillStyle='#f97316';ctx.font='bold 13px Arial';ctx.fillText('ITENS',40,275);
  const items=o.items||[{productId:o.productId,quantity:o.quantity,salePrice:o.salePrice}];
  let y=295;

let rkPeriod='month',rkDay=null,rkMonth=null,rkYear=null,rkCustomDe=null,rkCustomAte=null;
let rkSort='units',rkSortDir='desc'; // colunas: units, revenue, cost, profit, margin

function getRankingOrders(){
  // Inicializa defaults
  if(!rkDay)rkDay=localDate(0);
  if(rkMonth===null)rkMonth=new Date().getMonth();
  if(rkYear===null)rkYear=new Date().getFullYear();
  if(!rkCustomDe)rkCustomDe=localDate(-7);
  if(!rkCustomAte)rkCustomAte=localDate(0);
  return state.orders.filter(o=>{
    if(!o.date)return false;
    if(rkPeriod==='day')return o.date===rkDay;
    if(rkPeriod==='yesterday')return o.date===localDate(-1);
    if(rkPeriod==='7d'){const ini=localDate(-6);return o.date>=ini&&o.date<=localDate(0);}
    if(rkPeriod==='week'){const ini=localDate(-6);return o.date>=ini&&o.date<=localDate(0);}
    if(rkPeriod==='month'){const d=new Date(o.date);return d.getMonth()===rkMonth&&d.getFullYear()===rkYear;}
    if(rkPeriod==='year'){const d=new Date(o.date);return d.getFullYear()===rkYear;}
    if(rkPeriod==='custom'){
      let de=rkCustomDe,ate=rkCustomAte;
      if(de>ate){const t=de;de=ate;ate=t;}
      return o.date>=de&&o.date<=ate;
    }
    return false;
  });
}

function aggregateByProduct(orders){
  // Agrega vendas por productId, com breakdown por variação. Inclui itens E upsells.
  const agg={};
  // Resolve o nome da variação a partir do productId+variacaoId
  function varName(productId,variacaoId){
    if(!variacaoId)return '(sem variação)';
    const si=state.stock&&state.stock.find(s=>s.productId===productId);
    if(!si||!si.variations)return '(variação)';
    const v=si.variations.find(x=>x.id===variacaoId);
    return v?v.name:'(variação)';
  }
  function ensure(productId){
    if(!agg[productId])agg[productId]={productId,units:0,revenue:0,cost:0,giftUnits:0,vars:{}};
    return agg[productId];
  }
  function ensureVar(productId,varKey){
    const a=ensure(productId);
    if(!a.vars[varKey])a.vars[varKey]={name:varKey,units:0,revenue:0,cost:0,giftUnits:0};
    return a.vars[varKey];
  }
  function add(productId,variacaoKey,qty,salePrice,costUnit){
    if(!productId)return;
    const a=ensure(productId);
    a.units+=qty;a.revenue+=salePrice*qty;a.cost+=costUnit*qty;
    const v=ensureVar(productId,variacaoKey);
    v.units+=qty;v.revenue+=salePrice*qty;v.cost+=costUnit*qty;
  }
  function addGift(productId,variacaoKey,qty,costUnit){
    if(!productId)return;
    const a=ensure(productId);
    a.giftUnits+=qty;a.cost+=costUnit*qty;
    const v=ensureVar(productId,variacaoKey);
    v.giftUnits+=qty;v.cost+=costUnit*qty;
  }
  orders.forEach(o=>{
    const items=o.items&&o.items.length>0?o.items:[{productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||0,isGift:false}];
    items.forEach(it=>{
      const p=state.prods.find(x=>x.id===it.productId);
      if(!p)return;
      const si=state.stock?state.stock.find(s=>s.productId===it.productId):null;
      const cu=getCost(p,si);
      const qty=Number(it.quantity||1);
      const vKey=varName(it.productId,it.variacaoId);
      if(it.isGift)addGift(it.productId,vKey,qty,cu);
      else add(it.productId,vKey,qty,Number(it.salePrice||0),cu);
    });
    (o.upsells||[]).forEach(u=>{
      const p=state.prods.find(x=>x.id===u.productId);
      if(!p)return;
      const si=state.stock?state.stock.find(s=>s.productId===u.productId):null;
      const cu=getCost(p,si);
      // Upsell guarda o nome da variação no campo variacaoName
      const vKey=u.variacaoName||'(sem variação)';
      add(u.productId,vKey,Number(u.quantity||1),Number(u.price||0),cu);
    });
  });
  // Computa lucro e margem por produto e por variação
  return Object.values(agg).map(a=>{
    const profit=a.revenue-a.cost;
    const margin=a.revenue>0?(profit/a.revenue)*100:0;
    // Lista de variações ordenada por unidades vendidas (decrescente)
    const variations=Object.values(a.vars).map(v=>{
      const vp=v.revenue-v.cost;
      const vm=v.revenue>0?(vp/v.revenue)*100:0;
      return {...v,profit:vp,margin:vm};
    }).sort((x,y)=>y.units-x.units);
    return {productId:a.productId,units:a.units,revenue:a.revenue,cost:a.cost,giftUnits:a.giftUnits,profit,margin,variations};
  });
}

function rkPeriodLabel(){
  if(rkPeriod==='day')return rkDay===localDate(0)?'Hoje':rkDay===localDate(-1)?'Ontem':rkDay;

  if(rkPeriod==='week')return 'Esta semana';
  if(rkPeriod==='month')return MESES[rkMonth]+' '+rkYear;

function renderRankings(){
  const orders=getRankingOrders();
  const rows=aggregateByProduct(orders);
  // Ordena pela coluna selecionada
  rows.sort((a,b)=>{
    const va=a[rkSort]||0,vb=b[rkSort]||0;
    return rkSortDir==='desc'?vb-va:va-vb;
  });

  // Totais agregados do período
  const totUnits=rows.reduce((a,r)=>a+r.units,0);
  const totRev=rows.reduce((a,r)=>a+r.revenue,0);
  const totCost=rows.reduce((a,r)=>a+r.cost,0);
  const totProfit=totRev-totCost;
  const totMargin=totRev>0?(totProfit/totRev)*100:0;

  // Botões de período
  const periodBtns=[
    ['day','Hoje'],['yesterday','Ontem'],['7d','7 dias'],['week','Esta Semana'],
    ['month','Este Mês'],['year','Este Ano'],['custom','Personalizado']
  ].map(([p,l])=>`<button class="ptab ${rkPeriod===p?'active':''}" onclick="rkPeriod='${p}';render()">${l}</button>`).join('');

  // Cabeçalhos clicáveis pra sort

  const recOut=Number(dreExtras.outrosR||0);const recBruta=recRev+recUp+recOut;

  const taxasM=allM.reduce((a,m)=>a+m.fee,0);const totMot=allM.reduce((a,m)=>a+m.mot,0);const totCor=allM.reduce((a,m)=>a+m.cor,0);

  const totDesp=taxasM+totMot+totCor+dMktg+dAlug+dFolha+dFixas+dOut;const ebitda=lucroBruto-totDesp;
  const impostos=Number(dreExtras.impostos||0);const lucroLiq=ebitda-impostos;

  const margBruta=recBruta>0?(lucroBruto/recBruta)*100:0;const margE=recBruta>0?(ebitda/recBruta)*100:0;const margL=recBruta>0?(lucroLiq/recBruta)*100:0;

  let custoHTML='';[['CMV',cmv],['Taxas',taxasM],['Fretes',totMot+totCor],['Desp.Op.',dMktg+dAlug+dFolha+dFixas+dOut],['Impostos',impostos]].forEach(([l,v])=>{const p=recBruta>0?(v/recBruta)*100:0;custoHTML+=`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--txm)">${l}</span><span style="color:var(--rd)">${fmtBRL(v)} <span style="color:var(--txd)">${fmtPct(p)}</span></span></div><div style="background:var(--sf3);border-radius:3px;height:5px;overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--rd);width:${Math.min(100,p)}%"></div></div></div>`;});

  <div class="g4" style="margin-bottom:16px"><div class="card"><div class="ct">Receita Bruta</div><div class="cv cv-or">${fmtBRL(recBruta)}</div></div><div class="card"><div class="ct">Lucro Bruto</div><div class="cv cv-gr">${fmtBRL(lucroBruto)}</div><div class="cs">${fmtPct(margBruta)}</div></div><div class="card"><div class="ct">EBITDA</div><div class="cv ${ebitda>=0?'cv-bl':'cv-rd'}">${fmtBRL(ebitda)}</div><div class="cs">${fmtPct(margE)}</div></div><div class="card"><div class="ct">Lucro Liquido</div><div class="cv ${lucroLiq>=0?'cv-gr':'cv-rd'}">${fmtBRL(lucroLiq)}</div><div class="cs">${fmtPct(margL)}</div></div></div>
  <div class="g2" style="margin-bottom:16px"><div class="card"><div class="sl">Despesas e Ajustes</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${extraHTML}</div></div><div class="card"><div class="sl">Composicao de Custos</div>${custoHTML}</div></div>

  ${G('4. Impostos')}${R('Impostos / Simples',impostos,true,false,true)}
  <tr class="dre-t2 dre-hl"><td style="font-size:14px">LUCRO LIQUIDO</td><td style="text-align:right;font-size:14px;color:${lucroLiq>=0?'var(--gr)':'var(--rd)'}">${lucroLiq>=0?fmtBRL(lucroLiq):'('+fmtBRL(Math.abs(lucroLiq))+')'}</td><td style="text-align:right;color:${lucroLiq>=0?'var(--gr)':'var(--rd)'}">${fmtPct(Math.abs(margL))}</td></tr>
  </tbody></table></div></div>`;
}

function updateOrderSummary(){
  if(!orderModalData)return;
  const o=orderModalData;
  const items=o.items&&o.items.length>0?o.items:[{productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||0,isGift:false}];
  const ut=(o.upsells||[]).reduce((a,u)=>a+Number(u.price||0),0);
  // Receita: só itens pagos (não brindes) + upsell + frete cobrado − desconto
  const st=items.reduce((a,it)=>it.isGift?a:a+Number(it.salePrice||0)*Number(it.quantity||1),0);
  const freteClient=Number(o.freteClient||0);
  const rev=st+ut+freteClient-Number(o.discount||0);
  // Custo: TODOS os itens incluindo brindes
  const custoItens=items.map(it=>{
    const p=state.prods.find(x=>x.id===it.productId);
    const si=state.stock?state.stock.find(s=>s.productId===it.productId):null;
    return getCost(p,si)*Number(it.quantity||1);
  });
  const ctotal=custoItens.reduce((a,c)=>a+c,0);
  // Custo dos upsells (puxa do produto cadastrado)
  const custoUpsells=(o.upsells||[]).reduce((a,u)=>{
    const p=state.prods.find(x=>x.id===u.productId);
    const si=state.stock?state.stock.find(s=>s.productId===u.productId):null;
    return a+getCost(p,si)*Number(u.quantity||1);
  },0);
  // Custo só dos brindes (para destacar no resumo)
  const custoBrindes=items.reduce((a,it,i)=>it.isGift?a+custoItens[i]:a,0);
  // Custo de entrega: motoboy + correios + combustível + pedágio
  const entrega=Number(o.motoboyCost||0)+Number(o.correiosCost||0)+Number(o.fuelCost||0)+Number(o.tollCost||0);
  const mot=Number(o.motoboyCost||0);const cor=Number(o.correiosCost||0);
  // Subsídio de frete = quanto o cliente paga MENOS o que o motoboy custa (negativo se você banca)
  const subsidioFrete=freteClient-Number(o.motoboyCost||0);
  const fee=sumFees(o.payments,state.maqs,rev);
  const td=ctotal+custoUpsells+entrega+fee;const profit=rev-td;const roi=td>0?(profit/td)*100:0;
  const s=document.getElementById('order-summary');
  if(!s)return;
  // Mostra custo por item
  const itemLines=items.map((it,i)=>{
    const p=state.prods.find(x=>x.id===it.productId);
    const c=custoItens[i];
    if(!p)return'';

// ============ METRICAS ============
function renderMetricas(){
  const now = new Date();
  const thisMonth = state.orders.filter(o=>{const d=new Date(o.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const allTime = state.orders;

  // 1. TAXA DE CONVERSAO (leads vs pedidos)
  const leads = Number(state.config.leadsTotal||0);
  const vendas = allTime.length;
  const txConv = leads>0?((vendas/leads)*100).toFixed(1):0;
  const leadsHoje = Number(state.config.leadsHoje||0);
  const vendasHoje = state.orders.filter(o=>o.date===now.toISOString().slice(0,10)).length;
  const txConvHoje = leadsHoje>0?((vendasHoje/leadsHoje)*100).toFixed(1):0;

  // 2. PRODUTOS MAIS LUCRATIVOS vs MAIS VENDIDOS
  const prodStats = {};
  allTime.forEach(o=>{
    const m = calcM(o);const prod = state.prods.find(p=>p.id===o.productId);if(!prod)return;
    if(!prodStats[o.productId])prodStats[o.productId]={name:prod.name,vendas:0,receita:0,lucro:0,upsells:0};
    prodStats[o.productId].vendas+=Number(o.quantity||1);
    prodStats[o.productId].receita+=m.rev;
    prodStats[o.productId].lucro+=m.profit;
    prodStats[o.productId].upsells+=(o.upsells||[]).length;
  });
  const prodList = Object.values(prodStats).sort((a,b)=>b.lucro-a.lucro);
  const prodByVendas = [...prodList].sort((a,b)=>b.vendas-a.vendas);
  const maxLucro = prodList.length>0?prodList[0].lucro:1;
  const maxVendas = prodByVendas.length>0?prodByVendas[0].vendas:1;

  // 3. RECOMPRA - clientes que compraram mais de 1x
  const clientMap = {};
  allTime.forEach(o=>{
    if(!o.clientName)return;
    const k=o.clientName.trim().toLowerCase();
    if(!clientMap[k])clientMap[k]={name:o.clientName,count:0,total:0};
    clientMap[k].count++;clientMap[k].total+=calcM(o).rev;
  });
  const clientList = Object.values(clientMap).sort((a,b)=>b.count-a.count);
  const recompradores = clientList.filter(c=>c.count>=2);
  const txRecompra = clientList.length>0?((recompradores.length/clientList.length)*100).toFixed(1):0;
  const receitaRecompra = recompradores.reduce((a,c)=>a+c.total,0);

  // 4. META ADS
  const adsData = state.config.adsData||{};
  const gastoHoje = Number(adsData.today||0);
  const gastoMes = Number(adsData.month||0);
  const impressoes = Number(adsData.impressions||0);
  const cliques = Number(adsData.clicks||0);
  const ctr = impressoes>0?((cliques/impressoes)*100).toFixed(2):0;
  const cpc = cliques>0?(gastoMes/cliques).toFixed(2):0;
  const recMes = thisMonth.reduce((a,o)=>a+calcM(o).rev,0);
  const roasMes = gastoMes>0?(recMes/gastoMes).toFixed(1):0;
  const cpl = leads>0?(gastoMes/leads).toFixed(2):0;
  const cac = vendas>0?(gastoMes/vendas).toFixed(2):0;
  const lastSync = state.config.adsLastSync?new Date(state.config.adsLastSync).toLocaleString('pt-BR'):'Nunca';

  // Produtos HTML
  let prodLucroHTML='';
  prodList.slice(0,8).forEach((p,i)=>{
    const pct=maxLucro>0?(p.lucro/maxLucro)*100:0;
    const margem=p.receita>0?((p.lucro/p.receita)*100).toFixed(1):0;
    prodLucroHTML+=`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px">
        <span style="font-weight:${i===0?700:500};color:${i===0?'var(--or)':'var(--tx)'}">${i===0?'🏆 ':''}${esc(p.name)}</span>
        <div style="display:flex;gap:12px">
          <span style="color:var(--txd)">${p.vendas} vendas</span>
          <span style="color:var(--gr);font-weight:600">${fmtBRL(p.lucro)}</span>
          <span style="color:var(--txd);font-size:10px">${margem}% margem</span>
        </div>
      </div>
      <div style="background:var(--sf3);border-radius:3px;height:8px;overflow:hidden"><div style="height:100%;border-radius:3px;background:${i===0?'var(--or)':'var(--sf4)'};width:${pct}%;border:1px solid ${i===0?'var(--or)':'rgba(249,115,22,.2)'}"></div></div>
    </div>`;
  });

  // Recompradores HTML
  let recompHTML='';
  recompradores.slice(0,8).forEach(c=>{
    recompHTML+=`<tr><td style="font-weight:600">${esc(c.name)}</td><td style="color:var(--or);font-weight:700;text-align:center">${c.count}x</td><td style="color:var(--gr);font-weight:600">${fmtBRL(c.total)}</td></tr>`;

        <div style="font-size:10px;color:var(--txd);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Atualize os leads recebidos</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

        <div><div style="color:var(--txd);margin-bottom:2px">Melhor margem</div><div style="color:var(--gr);font-weight:700">${prodList.length>0?esc([...prodList].sort((a,b)=>(b.receita>0?b.lucro/b.receita:0)-(a.receita>0?a.lucro/a.receita:0))[0].name):'—'}</div></div>

async function syncMetaAds(){
  const token=state.config.metaToken;let account=state.config.metaAdAccount;
  if(!token||!account){alert('Configure o token e Ad Account ID primeiro.');return;}
  // Garante o prefixo act_
  if(!account.startsWith('act_'))account='act_'+account;
  setSyncStatus('syncing');
  showToast('⏳ Sincronizando Meta Ads...','or');
  try{
    if(!window._adsPer)window._adsPer='hoje';
  const per=window._adsPer;

  // Datas no fuso local (Brasília) — evita virar dia antes da hora
  const todayD=localDate(0);
  const yesterdayD=localDate(-1);
  const since7=localDate(-6);
  const since30=localDate(-29);
  const firstDayD=new Date(new Date().getFullYear(),new Date().getMonth(),1).toLocaleDateString('fr-CA');

  let sinceD,untilD;
  if(per==='hoje'){sinceD=todayD;untilD=todayD;}
  else if(per==='ontem'){sinceD=yesterdayD;untilD=yesterdayD;}
  else if(per==='7d'){sinceD=since7;untilD=todayD;}
  else if(per==='30d'){sinceD=since30;untilD=todayD;}
  else if(per==='mes'){sinceD=firstDayD;untilD=todayD;}
  else{sinceD=window._adsSince||todayD;untilD=window._adsUntil||todayD;}

  const trStr=`{"since":"${sinceD}","until":"${untilD}"}`;
  const trParam=encodeURIComponent(trStr);

  const fields='spend,impressions,clicks,reach,cpm,cpc,actions,action_values,cost_per_action_type';
  const urlHoje=`https://graph.facebook.com/v19.0/${account}/insights?fields=${fields}&time_range=${trParam}&access_token=${token}`;
  const urlMes=urlHoje; // mesmo período para ambos agora
  const campFields=`name,status,insights.time_range(${trStr}){spend,impressions,clicks,reach,actions,action_values,cost_per_action_type,cpm,ctr,frequency}`;
  const adsetFields=`name,status,campaign_id,insights.time_range(${trStr}){spend,impressions,clicks,reach,actions,cost_per_action_type,cpm,ctr,frequency}`;
  const adFields=`name,status,adset_id,campaign_id,creative{name,thumbnail_url},insights.time_range(${trStr}){spend,impressions,clicks,reach,actions,cost_per_action_type,cpm,ctr,frequency}`;
  const urlCamp=`https://graph.facebook.com/v19.0/${account}/campaigns?fields=${campFields}&limit=30&access_token=${token}`;
  const urlAdsets=`https://graph.facebook.com/v19.0/${account}/adsets?fields=${adsetFields}&limit=50&access_token=${token}`;
  const urlAds=`https://graph.facebook.com/v19.0/${account}/ads?fields=${adFields}&limit=100&access_token=${token}`;

    const [rHoje,rMes,rCamp,rAdsets,rAds]=await Promise.all([
      fetch(urlHoje).then(r=>r.json()),
      fetch(urlMes).then(r=>r.json()),
      fetch(urlCamp).then(r=>r.json()),
      fetch(urlAdsets).then(r=>r.json()),
      fetch(urlAds).then(r=>r.json())
    ]);

    const dHoje=(rHoje.data&&rHoje.data[0])||{};
    const dMes=(rMes.data&&rMes.data[0])||{};

    function getAction(actions,type){const a=(actions||[]).find(x=>x.action_type===type);return a?Number(a.value||0):0;}
    function getActionVal(action_values,type){const a=(action_values||[]).find(x=>x.action_type===type);return a?Number(a.value||0):0;}
    function getCPA(cost_per_action,type){const a=(cost_per_action||[]).find(x=>x.action_type===type);return a?Number(a.value||0):0;}

    const leadsHoje=getAction(dHoje.actions,'onsite_conversion.messaging_conversation_started_7d')||getAction(dHoje.actions,'lead');
    const vendasHoje=getAction(dHoje.actions,'purchase')||getAction(dHoje.actions,'omni_purchase');
    const valorVendasHoje=getActionVal(dHoje.action_values,'purchase')||getActionVal(dHoje.action_values,'omni_purchase');
    const leadsMes=getAction(dMes.actions,'onsite_conversion.messaging_conversation_started_7d')||getAction(dMes.actions,'lead');
    const vendasMes=getAction(dMes.actions,'purchase')||getAction(dMes.actions,'omni_purchase');
    const valorVendasMes=getActionVal(dMes.action_values,'purchase')||getActionVal(dMes.action_values,'omni_purchase');
    const cplMes=Number(dMes.spend||0)>0&&leadsMes>0?(Number(dMes.spend)/leadsMes).toFixed(2):0;
    const cplHoje=getCPA(dHoje.cost_per_action_type,'onsite_conversion.messaging_conversation_started_7d')||getCPA(dHoje.cost_per_action_type,'lead');
    // Seguidores via anúncio (instagram_profile_follow ou page_fan)
    function getFollows(actions){return getAction(actions,'instagram_profile_follow')||getAction(actions,'page_fan')||getAction(actions,'follow');}
    const followsHoje=getFollows(dHoje.actions);
    const followsMes=getFollows(dMes.actions);
    const cpfHoje=followsHoje>0&&Number(dHoje.spend||0)>0?(Number(dHoje.spend)/followsHoje).toFixed(2):0;
    const cpfMes=followsMes>0&&Number(dMes.spend||0)>0?(Number(dMes.spend)/followsMes).toFixed(2):0;

    function parseIns(ins){
      const i=ins||{};
      const leads=getAction(i.actions,'onsite_conversion.messaging_conversation_started_7d')||getAction(i.actions,'lead');
      const vendas=getAction(i.actions,'purchase')||getAction(i.actions,'omni_purchase');
      const follows=getFollows(i.actions);
      const cpl_raw=getCPA(i.cost_per_action_type,'onsite_conversion.messaging_conversation_started_7d')||getCPA(i.cost_per_action_type,'lead');
      const spend=Number(i.spend||0);
      const cpf=follows>0&&spend>0?(spend/follows):0;
      return {spend,impressions:Number(i.impressions||0),clicks:Number(i.clicks||0),reach:Number(i.reach||0),leads,vendas,follows,cpf,cpm:Number(i.cpm||0),ctr:Number(i.ctr||0),freq:Number(i.frequency||0),cpl:cpl_raw>0?cpl_raw:(leads>0?spend/leads:0)};
    }

    const campaigns=(rCamp.data||[]).map(c=>{
      const ins=(c.insights&&c.insights.data&&c.insights.data[0])||{};
      return {id:c.id,name:c.name,status:c.status,...parseIns(ins)};
    }).filter(c=>c.spend>0||c.status==='ACTIVE').sort((a,b)=>b.spend-a.spend);

    const adsets=(rAdsets.data||[]).map(s=>{
      const ins=(s.insights&&s.insights.data&&s.insights.data[0])||{};
      return {id:s.id,name:s.name,status:s.status,campaignId:s.campaign_id,...parseIns(ins)};
    }).filter(s=>s.spend>0||s.status==='ACTIVE');

    const ads=(rAds.data||[]).map(a=>{
      const ins=(a.insights&&a.insights.data&&a.insights.data[0])||{};
      const thumb=a.creative&&a.creative.thumbnail_url;
      const cname=a.creative&&a.creative.name;
      return {id:a.id,name:a.name||(cname||'Criativo'),status:a.status,adsetId:a.adset_id,campaignId:a.campaign_id,thumb,...parseIns(ins)};
    }).filter(a=>a.spend>0||a.status==='ACTIVE');

    // Busca seguidores do Instagram — usa histórico próprio (não precisa de instagram_manage_insights)
    let igFollowers=Number(state.config.igFollowers||0);
    let igHistory=state.config.igHistory||[];
    let followersByDay=state.config.adsData&&state.config.adsData.followersByDay||[];
    if(state.config.igUserId&&token){
      try{
        const rIg=await fetch(`https://graph.facebook.com/v19.0/${state.config.igUserId}?fields=followers_count&access_token=${token}`).then(r=>r.json());
        if(rIg.followers_count){
          igFollowers=rIg.followers_count;
          state.config.igFollowers=igFollowers;
          // Salva histórico: {date, count} — máx 60 dias
          const todayKey=localDate(0);
          igHistory=igHistory.filter(x=>x.date!==todayKey);
          igHistory=[...igHistory,{date:todayKey,count:igFollowers}].sort((a,b)=>a.date.localeCompare(b.date)).slice(-60);
          state.config.igHistory=igHistory;
          // Calcula delta diário pela diferença entre registros consecutivos
          followersByDay=igHistory.map((entry,i)=>{
            if(i===0)return{date:entry.date,delta:0};
            return{date:entry.date,delta:entry.count-(igHistory[i-1].count||entry.count)};
          });
          showToast(`✅ Instagram: ${igFollowers.toLocaleString('pt-BR')} seguidores`,'gr');
        }
      }catch(e){console.warn('Instagram error:',e);}
    }

    state.config.adsData={
      today:Number(dHoje.spend||0),month:Number(dMes.spend||0),
      impressions:Number(dMes.impressions||0),clicks:Number(dMes.clicks||0),
      reach:Number(dMes.reach||0),cpm:Number(dMes.cpm||0),cpc:Number(dMes.cpc||0),
      todayImpressions:Number(dHoje.impressions||0),todayClicks:Number(dHoje.clicks||0),
      leadsHoje,vendasHoje,valorVendasHoje,cplHoje,
      leadsMes,vendasMes,valorVendasMes,cplMes:Number(cplMes),
      followsHoje,followsMes,cpfHoje:Number(cpfHoje),cpfMes:Number(cpfMes),
      campaigns,adsets,ads,followersByDay
    };
    state.config.adsLastSync=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    save('config');setSyncStatus('ok');render();
    showToast('✅ Meta Ads sincronizado!','gr');
  }catch(e){setSyncStatus('error');showToast('❌ Erro ao conectar com Meta Ads. Verifique o token.','rd');}
}

// ============ SNAPSHOT AUTOMÁTICO DE SEGUIDORES ============
// Grava {date, count} no igHistory. Idempotente: 1 registro por dia (sobrescreve o do dia).
// Independe da sincronização do Meta Ads — só precisa do token e do igUserId.
async function captureFollowerSnapshot(opts){
  opts=opts||{};
  const token=state.config.metaToken;
  const uid=state.config.igUserId;
  if(!token||!uid)return false;
  try{
    const r=await fetch(`https://graph.facebook.com/v19.0/${uid}?fields=followers_count&access_token=${token}`).then(r=>r.json());
    const count=Number(r&&r.followers_count);
    if(!count||isNaN(count))return false;
    const today=localDate(0);
    let hist=(state.config.igHistory||[]).filter(x=>x&&x.date!==today);
    hist=[...hist,{date:today,count}].sort((a,b)=>a.date.localeCompare(b.date)).slice(-90);
    state.config.igHistory=hist;
    state.config.igFollowers=count;
    // Mantém followersByDay (deltas consecutivos) coerente para telas legadas
    state.config.adsData=state.config.adsData||{};
    state.config.adsData.followersByDay=hist.map((e,i)=>i===0?{date:e.date,delta:0}:{date:e.date,delta:e.count-hist[i-1].count});
    save('config');
    if(opts.silent!==true)showToast(`✅ Seguidores: ${count.toLocaleString('pt-BR')}`,'gr');
    if(opts.render!==false)render();
    return true;
  }catch(e){console.warn('snapshot seguidores:',e);return false;}
}

// Garante que o snapshot de HOJE existe ao abrir o app, e agenda captura à meia-noite.
function scheduleFollowerSnapshot(){
  const haveToday=()=> (state.config.igHistory||[]).some(x=>x&&x.date===localDate(0));
  // Captura ao abrir, se ainda não houver registro de hoje
  if(!haveToday()){captureFollowerSnapshot({silent:true,render:false});}
  // Agenda a próxima captura logo após a virada do dia (00:01 local)
  const now=new Date();
  const next=new Date(now);
  next.setHours(24,1,0,0); // 00:01 do dia seguinte
  const ms=next-now;
  setTimeout(function tick(){
    captureFollowerSnapshot({silent:true});
    // reagenda para a próxima meia-noite (24h depois)
    setTimeout(tick,24*60*60*1000);
  },ms);
}

function changePassword(){
  const np = document.getElementById('new-pass').value;
  const cp = document.getElementById('conf-pass').value;
  const msg = document.getElementById('pass-msg');
  if(!np||np.length<4){msg.style.color='var(--rd)';msg.textContent='Senha deve ter pelo menos 4 caracteres.';return;}
  if(np!==cp){msg.style.color='var(--rd)';msg.textContent='Senhas nao coincidem.';return;}
  localStorage.setItem('zb_password',np);
  msg.style.color='var(--gr)';msg.textContent='Senha alterada com sucesso!';
  document.getElementById('new-pass').value='';
  document.getElementById('conf-pass').value='';
  setTimeout(()=>{if(msg)msg.textContent='';},3000);
}
// ============ FORÇAR SINCRONIZAÇÃO ============
async function forcSync(){
  const btn = [...document.querySelectorAll('button')].find(b=>b.textContent.includes('Sincronizar'));
  if(btn){ btn.textContent='⏳ Conectando...'; btn.disabled=true; }
  setSyncStatus('syncing');

  const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients','categories','fretes'];
  try{
    const results = await Promise.all(keys.map(async k=>{
      const v = await dbGet(k);
      return {k,v};
    }));

    results.forEach(({k,v})=>{
      if(v===null) return;
      if(k==='maqs'){
        state[k]=v.map(m=>{
          if(m.rates&&!m.rates.presencial){
            const p={},l={};
            for(let i=1;i<=18;i++){p[i]=m.rates[i]||0;l[i]=0;}
            return {...m,rates:{presencial:p,link:l}};
          }
          return m;
        });
      } else { state[k]=v; }
      try{ localStorage.setItem('zb_cache_'+k, JSON.stringify(state[k])); }catch{}
    });

    setSyncStatus('ok');
    render();
    showToast('✅ Dados sincronizados com sucesso!','gr');
  }catch(e){
    setSyncStatus('error');
    showToast('❌ Erro ao conectar. Tente novamente.','rd');
  }finally{
    if(btn){ btn.textContent='🔄 Sincronizar'; btn.disabled=false; }
  }
}

// ============ BACKUP & RESTORE ============
function exportBackup(){
  const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients','categories','fretes'];
  const backup={
    version: '2.0',
    exportedAt: new Date().toISOString(),
    exportedBy: 'Gestao Zambonini',
    data: {}
  };
  keys.forEach(k=>{ backup.data[k]=state[k]; });

  // Salva também no localStorage como backup automático
  try{ localStorage.setItem('zb_backup_auto', JSON.stringify({...backup, exportedAt: new Date().toISOString()})); }catch{}

  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
  a.href = url;
  a.download = `zambonini-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);

  // Mostra confirmação
  showToast('✅ Backup exportado com sucesso!', 'gr');
}

function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const backup = JSON.parse(e.target.result);
      if(!backup.data) throw new Error('Arquivo inválido');

      const confirm_import = confirm(
        `Importar backup de ${backup.exportedAt ? new Date(backup.exportedAt).toLocaleString('pt-BR') : 'data desconhecida'}?\n\n` +
        `Isso vai substituir TODOS os dados atuais.\n\n` +
        `Clique OK para confirmar.`
      );
      if(!confirm_import){ input.value=''; return; }

      const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients','categories','fretes'];
      keys.forEach(k=>{
        if(backup.data[k] !== undefined){
          state[k] = backup.data[k];
        }
      });

      // Salva tudo no Supabase
      setSyncStatus('syncing');
      await Promise.all(keys.map(k => dbSet(k, state[k])));
      setSyncStatus('ok');

      // Atualiza cache local
      keys.forEach(k=>{ try{ localStorage.setItem('zb_cache_'+k, JSON.stringify(state[k])); }catch{} });

      input.value='';
      render();
      showToast('✅ Backup importado com sucesso!', 'gr');
    }catch(err){
      alert('Erro ao importar: ' + err.message);
      input.value='';
    }
  };
  reader.readAsText(file);
}

function showToast(msg, type){
  const existing = document.getElementById('zb-toast');
  if(existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'zb-toast';
  toast.style.cssText = `position:fixed;bottom:24px;right:24px;background:${type==='gr'?'rgba(34,197,94,.15)':'rgba(239,68,68,.15)'};border:1px solid ${type==='gr'?'rgba(34,197,94,.4)':'rgba(239,68,68,.4)'};color:${type==='gr'?'#22c55e':'#ef4444'};padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4);`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(), 3500);
}

// Auto-backup no localStorage a cada 10 minutos
setInterval(()=>{
  if(state.orders && state.orders.length > 0){
    try{
      const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients','categories','fretes'];
      const backup={version:'2.0',exportedAt:new Date().toISOString(),data:{}};
      keys.forEach(k=>{backup.data[k]=state[k];});
      localStorage.setItem('zb_backup_auto', JSON.stringify(backup));
    }catch{}
  }
}, 10 * 60 * 1000);

// ============ INIT ============
if(checkSession()){loadAll();}else{showLoginScreen();}
</script>

function openFreteModal(id){
  const f=id?(state.fretes||[]).find(x=>x.id===id):null;

  const ov=document.createElement('div');ov.className='overlay';

        <div class="field"><label style="color:var(--gr)">Cobrado do cliente</label><div class="ip"><span class="ips">R$</span><input id="fr-cobrado" type="number" step="0.01" value="${f?Number(f.valorCobrado||0):''}" placeholder="25,00"></div></div>
      </div>
      <div style="background:var(--sf3);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--txd);line-height:1.5">💡 A diferenca entre o custo e o valor cobrado e seu <strong>subsidio</strong> (sai do seu lucro). Se o cobrado for maior que o custo, voce lucra no frete.</div>
    </div>
    <div class="modal-footer"><button class="btn bg2" onclick="this.closest('.overlay').remove()">Cancelar</button><button class="btn bp" onclick="saveFreteModal('${id||''}')">Salvar</button></div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{const i=document.getElementById('fr-cid');if(i)i.focus();},50);
}
function saveFreteModal(id){
  const cidade=document.getElementById('fr-cid').value.trim();
  if(!cidade){alert('Informe a cidade');return;}
  const uf=(document.getElementById('fr-uf').value||'').trim().toUpperCase().slice(0,2);
  const custoReal=Number(document.getElementById('fr-custo').value||0);
  const valorCobrado=Number(document.getElementById('fr-cobrado').value||0);
  state.fretes=state.fretes||[];
  // Evita duplicada (mesma cidade+uf)
  const dup=state.fretes.find(x=>x.id!==id&&x.cidade.toLowerCase().trim()===cidade.toLowerCase()&&(x.uf||'').toUpperCase()===uf);
  if(dup){alert('Ja existe um frete cadastrado para esta cidade.');return;}
  if(id){state.fretes=state.fretes.map(x=>x.id===id?{...x,cidade,uf,custoReal,valorCobrado}:x);}
  else{state.fretes.push({id:uid(),cidade,uf,custoReal,valorCobrado});}
  save('fretes');
  document.querySelector('.overlay').remove();
  render();
}
function deleteFrete(id){if(confirm('Remover esta cidade da tabela de fretes?')){state.fretes=(state.fretes||[]).filter(x=>x.id!==id);save('fretes');render();}}
// Busca frete cadastrado para uma cidade (case-insensitive, ignora acentos)
function findFreteByCity(cidade){
  if(!cidade)return null;
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  const target=norm(cidade);
  return (state.fretes||[]).find(f=>norm(f.cidade)===target)||null;
}
// Aplica frete da cidade no pedido em edição (sem sobrescrever valores já preenchidos manualmente)
function applyFreteFromCity(cidade,opts){
  if(!orderModalData)return;
  opts=opts||{};
  const f=findFreteByCity(cidade);
  if(!f)return;
  // Só preenche se estiver vazio (não sobrescreve edição manual), a menos que opts.force=true
  if(opts.force||!orderModalData.motoboyCost){orderModalData.motoboyCost=String(f.custoReal||0);}
  if(opts.force||!orderModalData.freteClient){orderModalData.freteClient=String(f.valorCobrado||0);}
}

<script>
// ============ MAQUININHAS PERSONALIZADAS ============
let maqModalData = null;

function openMaqModal(id){

    id: uid(), name:'', color:'#f97316',
    rates: {presencial:{}, link:{}}

  for(let i=1;i<=18;i++){
    if(!maqModalData.rates.presencial[i]) maqModalData.rates.presencial[i] = i===1?2.99:+(2.99+0.3*(i-1)).toFixed(2);
    if(!maqModalData.rates.link[i]) maqModalData.rates.link[i] = i===1?3.49:+(3.49+0.32*(i-1)).toFixed(2);
  }
  renderMaqModal();
}

function renderMaqModal(){
  const f = maqModalData;
  const isEdit = !!f.id && state.maqs.find(x=>x.id===f.id);

  let ratesHTML = '';
  for(let i=1;i<=18;i++){
    ratesHTML += `<div style="display:grid;grid-template-columns:40px 1fr 1fr;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd)">
      <div style="font-size:12px;font-weight:600;color:var(--txm)">${i}x</div>
      <div class="ip"><span class="ips" style="font-size:10px">%</span><input type="number" step="0.01" min="0" max="99" value="${f.rates.presencial[i]||0}" oninput="maqModalData.rates.presencial[${i}]=Number(this.value)" style="padding:5px 5px 5px 20px;font-size:11px"></div>
      <div class="ip"><span class="ips" style="font-size:10px">%</span><input type="number" step="0.01" min="0" max="99" value="${f.rates.link[i]||0}" oninput="maqModalData.rates.link[${i}]=Number(this.value)" style="padding:5px 5px 5px 20px;font-size:11px"></div>
    </div>`;
  }

  let existing = document.getElementById('maq-modal-overlay');
  if(!existing){
    existing = document.createElement('div');
    existing.id = 'maq-modal-overlay';
    existing.className = 'overlay';
    existing.onclick = e => { if(e.target===existing){existing.remove();maqModalData=null;} };
    document.body.appendChild(existing);
  }

  existing.innerHTML = `<div class="modal" style="width:560px">
    <div class="mt2">${isEdit?'Editar':'Nova'} Maquininha</div>
    <div class="fg">
      <div style="display:grid;grid-template-columns:1fr 1fr 80px;gap:8px">
        <div class="field"><label>Nome</label><input value="${esc(f.name)}" oninput="maqModalData.name=this.value" placeholder="Ex: Cielo, PagBank..."></div>
        <div class="field"><label>Cor</label><input type="color" value="${f.color||'#f97316'}" oninput="maqModalData.color=this.value" style="height:36px;padding:2px 4px;cursor:pointer"></div>
        <div style="display:flex;align-items:flex-end;padding-bottom:2px"><div style="width:44px;height:28px;border-radius:6px;background:${f.color};display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:12px">${(f.name||'').slice(0,2).toUpperCase()||'??'}</div></div>
      </div>
      <div style="background:var(--sf3);border-radius:8px;border:1px solid var(--bd);padding:12px">
        <div style="display:grid;grid-template-columns:40px 1fr 1fr;gap:6px;margin-bottom:8px">
          <div style="font-size:9px;color:var(--txd);text-transform:uppercase;letter-spacing:1px">Parc.</div>
          <div style="font-size:9px;color:var(--bl);text-transform:uppercase;letter-spacing:1px;text-align:center">Presencial %</div>
          <div style="font-size:9px;color:var(--or);text-transform:uppercase;letter-spacing:1px;text-align:center">Link / Online %</div>
        </div>
        <div style="max-height:380px;overflow-y:auto">${ratesHTML}</div>
      </div>
      <div style="padding:8px 12px;background:var(--ordim);border:1px solid var(--bdb);border-radius:7px;font-size:11px;color:var(--txm)">
        💡 Configure as taxas de cada parcela para presencial (maquininha física) e link de pagamento (cobrado online). Deixe 0% para desativar a parcela.
      </div>
    </div>
    <div class="mf">
      <button class="btn bg2" onclick="document.getElementById('maq-modal-overlay').remove();maqModalData=null">Cancelar</button>
      <button class="btn bd2" onclick="deleteMaqConfirm('${f.id}')" style="${isEdit?'':'display:none'}">Excluir</button>
      <button class="btn bp" onclick="saveMaqModal()">Salvar</button>
    </div>
  </div>`;
}

function deleteMaqConfirm(id){
  if(!confirm('Remover esta maquininha?'))return;
  state.maqs=state.maqs.filter(m=>m.id!==id);
  save('maqs');
  document.getElementById('maq-modal-overlay').remove();
  maqModalData=null;
  render();
}

function saveMaqModal(){
  if(!maqModalData||!maqModalData.name)return alert('Informe o nome.');
  const exists = state.maqs.find(m=>m.id===maqModalData.id);
  if(exists){state.maqs=state.maqs.map(m=>m.id===maqModalData.id?maqModalData:m);}
  else{state.maqs=[...state.maqs,maqModalData];}
  save('maqs');
  document.getElementById('maq-modal-overlay').remove();
  maqModalData=null;
  render();
}
</script>
