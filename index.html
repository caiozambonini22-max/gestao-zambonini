<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestao Zambonini</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d0d;--sf:#141414;--sf2:#1c1c1c;--sf3:#242424;--sf4:#2e2e2e;--bd:rgba(255,255,255,.07);--bdb:rgba(249,115,22,.4);--or:#f97316;--orl:#fb923c;--ordim:rgba(249,115,22,.1);--ordim2:rgba(249,115,22,.18);--tx:#f0f0f0;--txd:#555;--txm:#888;--gr:#22c55e;--rd:#ef4444;--bl:#3b82f6;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
.app{display:flex;flex-direction:column;min-height:100vh;}
.topnav{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;height:46px;position:sticky;top:0;z-index:20;overflow-x:auto;gap:0;}
.logo{font-weight:800;font-size:15px;color:var(--or);margin-right:16px;white-space:nowrap;letter-spacing:1px;}
.ni{padding:0 12px;height:46px;display:flex;align-items:center;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;border:none;background:transparent;}
.ni:hover{color:var(--tx);}.ni.active{color:var(--or);border-bottom-color:var(--or);}
.topnav-r{margin-left:auto;display:flex;align-items:center;gap:10px;padding-left:16px;flex-shrink:0;}
.main{flex:1;padding:20px 24px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;}
.ct{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txd);margin-bottom:8px;font-weight:600;}
.cv{font-size:22px;font-weight:700;}.cs{font-size:11px;color:var(--txm);margin-top:4px;}
.cv-or{color:var(--or);}.cv-gr{color:var(--gr);}.cv-rd{color:var(--rd);}.cv-bl{color:var(--bl);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:9px 12px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd);font-weight:500;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.cr:hover td{background:rgba(249,115,22,.05);cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.b-or{background:rgba(249,115,22,.15);color:var(--or);}
.b-gr{background:rgba(34,197,94,.12);color:var(--gr);}
.b-bl{background:rgba(59,130,246,.12);color:var(--bl);}
.b-rd{background:rgba(239,68,68,.12);color:var(--rd);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;}
.bp{background:var(--or);color:#fff;}.bp:hover{background:var(--orl);}
.bg2{background:transparent;color:var(--txm);border:1px solid var(--bd);}.bg2:hover{border-color:var(--or);color:var(--or);}
.bd2{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2);}
.bgr2{background:rgba(34,197,94,.1);color:var(--gr);border:1px solid rgba(34,197,94,.2);}
.sm{padding:4px 10px;font-size:11px;}
.fg{display:grid;gap:10px;}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
label{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--txm);text-transform:uppercase;}
input,select,textarea{background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:8px 11px;color:var(--tx);font-family:inherit;font-size:12px;outline:none;transition:border-color .15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--or);}
select option{background:var(--sf2);}
.ip{position:relative;}
.ips{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txd);font-size:12px;pointer-events:none;}
.ip input{padding-left:24px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--sf);border:1px solid var(--bdb);border-radius:12px;padding:24px;max-width:100%;max-height:94vh;overflow-y:auto;}
.modal-sm{width:560px;}.modal-md{width:760px;}.modal-xl{width:980px;}
.mt2{font-size:18px;font-weight:700;margin-bottom:16px;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--bd);}
.divider{height:1px;background:var(--bd);margin:10px 0;}
.sl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:8px;font-weight:700;}
.empty{text-align:center;padding:40px 20px;color:var(--txd);}
.empty-ic{font-size:32px;margin-bottom:10px;opacity:.3;}
.sbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;}
.spill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bd);color:var(--txm);transition:all .15s;background:transparent;}
.spill:hover{border-color:var(--or);color:var(--tx);}
.spill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.spill .cnt{font-size:9px;background:rgba(0,0,0,.3);padding:1px 5px;border-radius:10px;}
.fbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.tfoot{display:flex;justify-content:flex-end;gap:20px;padding:10px 12px;border-top:1px solid var(--bdb);background:var(--sf2);font-size:12px;}
.tfoot .tfl{color:var(--txd);}.tfoot .tfv{font-weight:700;color:var(--or);font-size:15px;}
.pf{display:flex;gap:6px;align-items:center;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:16px;flex-wrap:wrap;}
.ptab{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);color:var(--txm);background:transparent;transition:all .15s;}
.ptab.active{background:var(--or);color:#fff;border-color:var(--or);}
.hbar{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.hbar-lbl{font-size:11px;color:var(--txm);width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.hbar-bg{flex:1;background:var(--sf3);border-radius:3px;height:8px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:3px;background:var(--or);}
.hbar-val{font-size:11px;font-weight:600;color:var(--or);width:75px;text-align:right;flex-shrink:0;}
.np-wrap{display:grid;grid-template-columns:320px 1fr;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.np-left{background:var(--sf2);border-right:1px solid var(--bd);padding:18px;}
.np-right{padding:18px;overflow-y:auto;max-height:72vh;}
.wa-box{background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:10px;margin-bottom:10px;}
.wa-box textarea{background:transparent;border:none;resize:vertical;font-family:monospace;font-size:11px;color:var(--tx);width:100%;outline:none;}
.parse-btn{background:var(--or);color:#fff;border:none;border-radius:7px;padding:10px;width:100%;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.parse-btn:hover{background:var(--orl);}.parse-btn:disabled{opacity:.5;cursor:not-allowed;}
.nbadge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;background:var(--or);color:#fff;margin-left:8px;}
.ck-r{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);margin-bottom:5px;}
.ck-r.on{background:var(--ordim2);border-color:rgba(249,115,22,.4);}
.ck-b{width:16px;height:16px;border-radius:3px;background:var(--sf3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:#fff;font-weight:700;}
.ck-b.on{background:var(--or);border-color:var(--or);}
.ig-top{height:3px;background:linear-gradient(to right,#833ab4,#fd1d1d,#f97316);border-radius:8px 8px 0 0;margin:-16px -16px 12px;}
.roas-row{background:var(--sf3);border-radius:6px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.vl-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);}
.vl-num{width:22px;height:22px;border-radius:5px;background:var(--or);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ads-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--gr);font-size:10px;font-weight:600;}
.ads-dot{width:6px;height:6px;border-radius:50%;background:var(--gr);}
.s-ok{color:var(--gr);font-weight:600;}.s-low{color:#f59e0b;font-weight:600;}.s-zero{color:var(--rd);font-weight:600;}
.onum{font-size:13px;font-weight:700;color:var(--or);}
.pay-row{background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px;display:grid;gap:8px;grid-template-columns:100px 140px 90px 160px 1fr auto;align-items:end;margin-bottom:7px;}
.mtabs{display:flex;border:1px solid var(--bd);border-radius:6px;overflow:hidden;}
.mtab{flex:1;padding:6px 0;text-align:center;font-size:11px;font-weight:600;cursor:pointer;color:var(--txm);background:transparent;border:none;}
.mtab-p{background:var(--bl);color:#fff;}.mtab-l{background:var(--or);color:#fff;}
.dre-t{width:100%;border-collapse:collapse;}
.dre-t tr td{padding:8px 14px;font-size:12px;border-bottom:1px solid var(--bd);}
.dre-t tr:last-child td{border-bottom:none;}
.dre-g{background:var(--sf2);}.dre-g td{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);font-weight:700;}
.dre-i td:first-child{padding-left:24px;color:var(--txm);}
.dre-t2{background:var(--sf3);}.dre-t2 td{font-weight:700;font-size:13px;}
.dre-hl{background:rgba(249,115,22,.08)!important;}.dre-hl td{font-size:14px!important;}
.tf2{background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.cp-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:3px 9px;font-size:10px;cursor:pointer;color:var(--txd);}
.cp-btn:hover{border-color:var(--or);color:var(--or);}
.su-c{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);display:inline-block;}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite;}
.sync-dot.error{background:var(--rd);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
#loading-screen{position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
#loading-screen .logo-l{font-size:28px;font-weight:800;color:#f97316;letter-spacing:2px;}
#loading-screen .sub-l{font-size:12px;color:#555;}

.login-screen{position:fixed;inset:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:var(--sf);border:1px solid var(--bdb);border-radius:16px;padding:40px;width:380px;text-align:center;}
.login-logo{font-size:22px;font-weight:800;color:var(--or);letter-spacing:2px;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--txd);margin-bottom:32px;letter-spacing:1px;}
.login-field{text-align:left;margin-bottom:14px;}
.login-field label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--txm);text-transform:uppercase;display:block;margin-bottom:5px;}
.login-field input{width:100%;background:var(--sf3);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.login-field input:focus{border-color:var(--or);}
.login-btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s;}
.login-btn:hover{background:var(--orl);}
.login-err{color:var(--rd);font-size:12px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo-l">GESTAO ZAMBONINI</div>
  <div class="sub-l" id="loading-msg">Iniciando...</div>
</div>

<div class="app" id="app" style="display:none;">
  <nav class="topnav">
    <div class="logo">⚡ GESTAO ZAMBONINI</div>
    <button class="ni active" onclick="setTab('dashboard')" id="nav-dashboard">Dashboard</button>
    <button class="ni" onclick="setTab('pedidos')" id="nav-pedidos">Pedidos</button>
    <button class="ni" onclick="setTab('notas')" id="nav-notas">Notas Fiscais</button>
    <button class="ni" onclick="setTab('estoque')" id="nav-estoque">Estoque <span id="stock-badge" style="display:none;margin-left:4px;background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;"></span></button>
    <button class="ni" onclick="setTab('fornecedores')" id="nav-fornecedores">Fornecedores</button>
    <button class="ni" onclick="setTab('produtos')" id="nav-produtos">Produtos</button>
    <button class="ni" onclick="setTab('dre')" id="nav-dre">DRE</button>
    <button class="ni" onclick="setTab('cadastros')" id="nav-cadastros">👥 Cadastros</button>
    <button class="ni" onclick="setTab('metricas')" id="nav-metricas">📊 Metricas</button>
    <button class="ni" onclick="setTab('config')" id="nav-config">Config</button>
    <div class="topnav-r">
      <button class="btn bg2 sm" onclick="forcSync()" title="Forçar sincronização com Supabase" style="font-size:11px;padding:4px 10px">🔄 Sincronizar</button>
      <button class="btn bg2 sm" onclick="document.getElementById('import-input').click()" title="Importar backup" style="font-size:11px;padding:4px 10px">📂 Importar</button>
      <input id="import-input" type="file" accept=".json" style="display:none" onchange="importBackup(this)">
      <button class="btn bg2 sm" onclick="logout()" style="font-size:11px;padding:4px 10px">Sair</button>
      <span id="sync-status" style="font-size:11px;color:var(--txd);display:flex;align-items:center;gap:5px;"><span class="sync-dot" id="sync-dot"></span><span id="sync-txt">Sincronizado</span></span>
    </div>
  </nav>
  <main class="main" id="main-content"></main>
</div>

<script>
// ============ CONFIG SUPABASE ============
const SUPA_URL = 'https://oxtxvfzeowonjsgxkcsn.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94dHh2Znplb3dvbmpzZ3hrY3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODYwMDUsImV4cCI6MjA5MDk2MjAwNX0.oLYb0w3VKRptmmgp7bIONOi2g8A20uAzNs0tz9cYdqE';
// ========================================

const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// ============ CONSTANTS ============
function buildRates(b,s1,s2,s3,lb,ls1,ls2,ls3){const r={presencial:{},link:{}};for(let i=1;i<=18;i++){if(i===1){r.presencial[i]=b;r.link[i]=lb;}else if(i<=6){r.presencial[i]=+(b+s1*(i-1)).toFixed(2);r.link[i]=+(lb+ls1*(i-1)).toFixed(2);}else if(i<=12){r.presencial[i]=+(b+s1*5+s2*(i-6)).toFixed(2);r.link[i]=+(lb+ls1*5+ls2*(i-6)).toFixed(2);}else{r.presencial[i]=+(b+s1*5+s2*6+s3*(i-12)).toFixed(2);r.link[i]=+(lb+ls1*5+ls2*6+ls3*(i-12)).toFixed(2);}}return r;}

const DEF_MAQ=[{id:'cielo',name:'Cielo',color:'#0051A5',rates:buildRates(2.99,.30,.20,.10,3.49,.32,.22,.12)},{id:'infinitepay',name:'Infinite Pay',color:'#00B4A2',rates:buildRates(2.49,.28,.18,.09,2.99,.30,.20,.10)},{id:'mercadopago',name:'Mercado Pago',color:'#009EE3',rates:buildRates(2.89,.29,.19,.10,3.39,.31,.21,.11)},{id:'pagbank',name:'PagBank',color:'#F5A800',rates:buildRates(2.99,.30,.20,.10,3.49,.32,.22,.12)}];
const DEF_CH=[{id:'instagram',label:'Instagram'},{id:'whatsapp',label:'WhatsApp'},{id:'loja',label:'Loja Fisica'},{id:'site',label:'Site'},{id:'outro',label:'Outro'}];
const OS=[{id:'em_aberto',label:'Em Aberto',c:'#f97316'},{id:'aprovado',label:'Aprovado',c:'#22c55e'},{id:'preparando',label:'Preparando',c:'#3b82f6'},{id:'faturado',label:'Faturado',c:'#8b5cf6'},{id:'pronto',label:'Pronto Envio',c:'#f59e0b'},{id:'enviado',label:'Enviado',c:'#06b6d4'},{id:'entregue',label:'Entregue',c:'#22c55e'},{id:'cancelado',label:'Cancelado',c:'#ef4444'}];
const NS=[{id:'pendente',label:'Pendente',c:'#f97316'},{id:'emitida',label:'Emitida',c:'#22c55e'},{id:'cancelada',label:'Cancelada',c:'#ef4444'},{id:'denegada',label:'Denegada',c:'#8b5cf6'}];
const DLV=[{id:'retirada',label:'Retirada',icon:'🏪'},{id:'sedex',label:'SEDEX',icon:'📦'},{id:'sedex10',label:'SEDEX 10',icon:'📦'},{id:'pac',label:'PAC',icon:'📬'},{id:'pac_mini',label:'PAC Mini',icon:'📬'},{id:'motoboy',label:'Motoboy',icon:'🛵'},{id:'jadlog',label:'Jadlog',icon:'🚚'},{id:'transportadora',label:'Transportadora',icon:'🚛'},{id:'outro',label:'Outro',icon:'📮'}];

// ============ STATE ============
let state = {
  tab: 'dashboard',
  prods: [], orders: [], maqs: JSON.parse(JSON.stringify(DEF_MAQ)),
  channels: JSON.parse(JSON.stringify(DEF_CH)), nfs: [], stock: [],
  suppliers: [], purchaseOrders: [], orderSeq: 1001,
  deliveryCities: [], motoboys: [], clients: [],
  categories: [],
  config: {gastoAnuncios:'',igFollowers:'',igF7:'',igF30:'',valores:['Venda e Energia!','Atendimento Humanizado!','Foco no Cliente!','Quanto mais voce posta, mais voce vende!','Simples e bem feito resolve!']}
};
let saveTimers = {};
let currentTab = 'dashboard';

// ============ UTILS ============
const fmtBRL = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtPct = v => Number(v||0).toFixed(2)+'%';
const uid = () => Math.random().toString(36).slice(2,10);
const stInfo = id => OS.find(s=>s.id===id)||OS[0];
const nfInfo = id => NS.find(s=>s.id===id)||NS[0];
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function payFee(pay,maqs){
  if(!pay||pay.type==='dinheiro'||pay.type==='pix')return 0;
  const m=maqs.find(x=>x.id===pay.maquininhaId);if(!m)return 0;
  const md=pay.mode||'presencial';const inst=Number(pay.installments||1);
  return(Number(pay.amount||0)*(m.rates[md]&&m.rates[md][inst]?m.rates[md][inst]:0))/100;
}
function getCost(prod,si){if(!prod)return 0;if(prod.costMode==='avg'&&si&&Number(si.avgCost)>0)return Number(si.avgCost);return Number(prod.costPrice||0);}
function calcM(order){
  const prod=state.prods.find(p=>p.id===order.productId);
  const si=state.stock.find(s=>s.productId===order.productId);
  const cp=getCost(prod,si);const sp=Number(order.salePrice||0);const qty=Number(order.quantity||1);
  const mot=Number(order.motoboyCost||0);const cor=Number(order.correiosCost||0);
  const fee=(order.payments||[]).reduce((a,p)=>a+payFee(p,state.maqs),0);
  const upsell=(order.upsells||[]).reduce((s,u)=>s+Number(u.price||0),0);
  const rev=sp*qty+upsell-Number(order.discount||0);
  const cost=cp*qty;const total=cost+mot+cor+fee;
  const profit=rev-total;const roi=total>0?(profit/total)*100:0;
  return{fee,rev,profit,roi,mot,cor,upsell,cost};
}
function calcAvg(cq,ca,aq,ac){const t=cq+aq;return t>0?((cq*ca)+(aq*ac))/t:0;}

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  if(!dot||!txt)return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  if(s==='syncing') txt.textContent='Salvando...';
  else if(s==='error') txt.innerHTML='⚠ Salvo local · <span style="color:var(--rd)">Erro na nuvem</span> <button onclick="retrySyncAll()" style="background:var(--sf3);border:1px solid var(--bd);border-radius:4px;color:var(--txm);cursor:pointer;font-size:10px;padding:1px 6px;margin-left:4px">↻ Tentar</button>';
  else txt.textContent='✓ Salvo';
}

async function dbGet(key){
  try{
    const {data,error}=await sb.from('zambonini_data').select('value').eq('key',key).single();
    if(error||!data)return null;
    return data.value;
  }catch{return null;}
}

async function dbSet(key,value){
  // Limita dados grandes antes de salvar
  let dataToSave=value;
  if(key==='config'&&value&&value.adsData){
    // Mantém só últimos 30 dias de followersByDay
    dataToSave={...value,adsData:{...value.adsData,followersByDay:(value.adsData.followersByDay||[]).slice(-30)}};
  }
  // Tenta 2 vezes com intervalo (Supabase às vezes está dormindo)
  for(let attempt=0;attempt<2;attempt++){
    try{
      const {error}=await sb.from('zambonini_data').upsert(
        {key, value:dataToSave, updated_at:new Date().toISOString()},
        {onConflict:'key'}
      );
      if(!error)return true;
      console.warn('Supabase save error:',error.message,error.code);
      if(attempt===0)await new Promise(r=>setTimeout(r,3000)); // aguarda 3s e tenta de novo
    }catch(e){
      if(attempt===0)await new Promise(r=>setTimeout(r,3000));
    }
  }
  return false;
}

const _saveStatus={};
function save(key){
  // 1. Salva no localStorage IMEDIATAMENTE
  try{
    localStorage.setItem('zb_cache_'+key, JSON.stringify(state[key]));
    localStorage.setItem('zb_save_time', new Date().toISOString());
  }catch{}

  // 2. Sincroniza com Supabase em background
  setSyncStatus('syncing');
  clearTimeout(saveTimers[key]);
  saveTimers[key]=setTimeout(async()=>{
    const ok=await dbSet(key, state[key]);
    _saveStatus[key]=ok;
    const anyFail=Object.values(_saveStatus).some(v=>v===false);
    if(anyFail)setSyncStatus('error');
    else setSyncStatus('ok');
  }, 800);
}

async function retrySyncAll(){
  setSyncStatus('syncing');
  const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients','categories'];
  let allOk=true;
  for(const k of keys){
    const ok=await dbSet(k,state[k]);
    if(!ok)allOk=false;
  }
  setSyncStatus(allOk?'ok':'error');
  if(allOk)showToast('✅ Sincronizado com a nuvem!','gr');
}

async function buscarCEP(cep, callback){
  const c=cep.replace(/\D/g,'');
  if(c.length!==8)return;
  try{
    const r=await fetch('https://viacep.com.br/ws/'+c+'/json/');

const SESSION_KEY = 'zb_session';
const SESSION_HOURS = 24;
const DEFAULT_PASS = 'zambonini123';

function checkSession(){
  try{
    const s = localStorage.getItem(SESSION_KEY);
    if(!s)return false;
    const d = JSON.parse(s);
    if(!d.ts)return false;
    const hours = (Date.now()-d.ts)/(1000*60*60);
    return hours < SESSION_HOURS;
  }catch{return false;}
}

function saveSession(){
  localStorage.setItem(SESSION_KEY, JSON.stringify({ts:Date.now()}));
}

function logout(){
  localStorage.removeItem(SESSION_KEY);
  showLoginScreen();
}

function getPassword(){
  return localStorage.getItem('zb_password')||DEFAULT_PASS;
}

function showLoginScreen(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='none';
  let loginEl = document.getElementById('login-screen');
  if(!loginEl){
    loginEl = document.createElement('div');

    loginEl.className = 'login-screen';

  }
  loginEl.innerHTML = `
    <div class="login-box">

function doLogin(){
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  if(pass === getPassword()){
    saveSession();
    document.getElementById('login-screen').remove();
    document.getElementById('loading-screen').style.display='flex';
    if(checkSession()){loadAll();}else{showLoginScreen();}
  } else {
    err.textContent = 'Senha incorreta. Tente novamente.';
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
  }
}
async function loadAll(){
  document.getElementById('loading-msg').textContent='Carregando dados...';
  setTimeout(()=>{
    const el=document.getElementById('loading-msg');
    if(el&&document.getElementById('loading-screen').style.display!=='none'){
      el.textContent='Conectando ao servidor... (pode levar até 30s na primeira vez)';
    }
  }, 4000);
  const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients','categories'];

  // ── PASSO 1: Carrega localStorage IMEDIATAMENTE (fonte primária) ──
  keys.forEach(k=>{
    try{
      const cached=localStorage.getItem('zb_cache_'+k);
      if(cached){
        const v=JSON.parse(cached);
        if(k==='maqs'){
          state[k]=v.map(m=>{
            if(m.rates&&!m.rates.presencial){const p={},l={};for(let i=1;i<=18;i++){p[i]=m.rates[i]||0;l[i]=0;}return {...m,rates:{presencial:p,link:l}};}
            return m;
          });
        }else{state[k]=v;}
      }
    }catch{}
  });

  // Mostra o app com dados locais imediatamente
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  render();

  // ── PASSO 2: Sincroniza com Supabase em background ──
  // REGRA: só sobrescreve se Supabase tiver MAIS dados (ex: mais pedidos)
  // Nunca sobrescreve dados locais com dados vazios do Supabase
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),30000));
    const fetchAll=Promise.all(keys.map(async k=>{
      const v=await dbGet(k);
      return {k,v};
    }));
    const results=await Promise.race([fetchAll,timeout]);
    let updated=false;
    results.forEach(({k,v})=>{
      if(v===null||v===undefined)return;
      // Supabase é a fonte de verdade — mas só sobrescreve se tiver dados
      // Para arrays: só usa Supabase se retornou algo (array não vazio ou igual ao local)
      const local=state[k];
      const supEmpty=Array.isArray(v)&&v.length===0&&Array.isArray(local)&&local.length>0;
      if(supEmpty){
        // Supabase está vazio mas local tem dados — faz upload pro Supabase (recuperação)
        dbSet(k,state[k]);
        return;
      }
      if(k==='maqs'){state[k]=v.map(m=>{if(m.rates&&!m.rates.presencial){const p={},l={};for(let i=1;i<=18;i++){p[i]=m.rates[i]||0;l[i]=0;}return {...m,rates:{presencial:p,link:l}};}return m;});}
      else{state[k]=v;}
      try{localStorage.setItem('zb_cache_'+k,JSON.stringify(state[k]));}catch{}
      updated=true;
    });
    if(updated)render();
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
  }
}

function getMoboyStats(filtered){
  const motStats={};
  filtered.forEach(o=>{

    const k=o.motoboyId==='_avulso'||!o.motoboyId?(o.motoboyName||'Avulso'):o.motoboyId;
    const name=o.motoboyId&&o.motoboyId!=='_avulso'?(state.motoboys.find(m=>m.id===o.motoboyId)||{name:o.motoboyName||'Desconhecido'}).name:(o.motoboyName||'Avulso');

    motStats[k].entregas++;
    motStats[k].total+=Number(o.motoboyCost||0)+Number(o.fuelCost||0)+Number(o.tollCost||0);

  return Object.values(motStats).sort((a,b)=>b.total-a.total);

    <div style="display:flex;flex-direction:column;gap:14px">
  <div class="card"><div class="ct">Frete e Entrega</div><div style="margin-top:8px">${dlvHTML}</div><div style="margin-top:10px;padding:8px 10px;background:var(--sf3);border-radius:6px;font-size:12px;display:flex;justify-content:space-between"><span style="color:var(--txm)">Total frete</span><span style="color:var(--rd);font-weight:600">${fmtBRL(totalMot+totalCor)}</span></div></div>
  ${(()=>{const mbStats=getMoboyStats(filtered);if(!mbStats.length)return'';let mbHTML='';mbStats.forEach(m=>{mbHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;align-items:center;gap:8px"><span>🛵</span><div><div style="font-weight:600;font-size:12px">${esc(m.name)}</div><div style="font-size:10px;color:var(--txd)">${m.entregas} ${m.entregas===1?'entrega':'entregas'}</div></div></div><div style="color:var(--rd);font-weight:700">${fmtBRL(m.total)}</div></div>`;});return`<div class="card"><div class="ct">Gasto por Motoboy</div><div style="margin-top:6px">${mbHTML}</div></div>`;})()}
</div>
  </div>`;
}

function setDashPeriod(p){dashPeriod=p;render();}

function addValor(){state.config.valores=[...(state.config.valores||[]),'Novo valor...'];save('config');render();}

</script>
<script>
// ============ PEDIDOS ============
let pedidoFilter='todos', pedidoSearch='', pedidoDe='', pedidoAte='';

function renderPedidos(){
  let filtered=[...state.orders].sort((a,b)=>b.orderNum-a.orderNum);
  if(pedidoFilter!=='todos')filtered=filtered.filter(o=>o.status===pedidoFilter);
  if(pedidoSearch){const q=pedidoSearch.toLowerCase();filtered=filtered.filter(o=>(o.clientName||'').toLowerCase().includes(q)||String(o.orderNum).includes(q)||(o.city||'').toLowerCase().includes(q));}
  if(pedidoDe)filtered=filtered.filter(o=>o.date>=pedidoDe);
  if(pedidoAte)filtered=filtered.filter(o=>o.date<=pedidoAte);
  const total=filtered.reduce((a,o)=>a+calcM(o).rev,0);
  const cntBy=sid=>state.orders.filter(o=>o.status===sid).length;
  let statusBtns=`<button class="spill ${pedidoFilter==='todos'?'':''}\" style="${pedidoFilter==='todos'?'background:var(--or);border-color:var(--or);color:#fff':''}" onclick="pedidoFilter='todos';render()">Todos<span class="cnt">${state.orders.length}</span></button>`;
  OS.forEach(s=>{statusBtns+=`<button class="spill" style="${pedidoFilter===s.id?`background:${s.c};border-color:${s.c};color:#fff`:''}" onclick="pedidoFilter='${s.id}';render()"><span class="dot" style="background:${s.c}"></span>${s.label}<span class="cnt">${cntBy(s.id)}</span></button>`;});
  let rows='';
  if(filtered.length===0){rows='<tr><td colspan="11"><div class="empty"><div class="empty-ic">📋</div><p>Nenhum pedido</p></div></td></tr>';}
  else{filtered.forEach(o=>{
    const m=calcM(o);const st=stInfo(o.status);const ch=state.channels.find(c=>c.id===o.channel);const dlv=DLV.find(d=>d.id===o.deliveryMethod);
    rows+=`<tr class="cr" onclick="openEditOrder('${o.id}')">
      <td><span class="onum">#${o.orderNum}</span></td>
      <td style="color:var(--txd);font-size:11px">${o.date}</td>
      <td style="font-weight:600">${esc(o.clientName||'—')}</td>
      <td style="color:var(--txm)">${esc(o.city?o.city+(o.state?'/'+o.state:''):'—')}</td>
      <td>${ch?`<span class="badge b-bl">${esc(ch.label)}</span>`:'—'}</td>
      <td style="font-size:11px">${dlv?dlv.icon+' '+dlv.label:'—'}</td>
      <td style="font-size:11px;color:var(--txm)">${(o.payments||[]).slice(0,1).map(p=>p.type==='pix'?'PIX':p.type==='dinheiro'?'Dinheiro':'Cartao').join('')}</td>
      <td style="font-weight:700;color:var(--or)">${fmtBRL(m.rev)}</td>
      <td style="color:${m.profit>=0?'var(--gr)':'var(--rd)'};font-weight:600">${fmtBRL(m.profit)}</td>
      <td onclick="event.stopPropagation()"><select onchange="changeStatus('${o.id}',this.value)" onclick="event.stopPropagation()" style="padding:3px 6px;font-size:10px;border:1px solid ${st.c}55;color:${st.c};background:${st.c}15;width:auto;min-width:95px">${OS.map(s=>`<option value="${s.id}" ${o.status===s.id?'selected':''}>${s.label}</option>`).join('')}</select></td>
      <td onclick="event.stopPropagation()"><div style="display:flex;gap:4px"><button class="btn bp sm" style="padding:3px 8px;font-size:10px" onclick="openTinyModal('${o.id}')">NF</button><button class="btn bd2 sm" onclick="deleteOrder('${o.id}')">×</button></div></td>
    </tr>`;
  });}
  return `
  <div class="sbar">${statusBtns}</div>
  <div class="fbar">
    <input placeholder="Buscar..." value="${esc(pedidoSearch)}" oninput="pedidoSearch=this.value;render()" style="flex:1;max-width:280px">
    <input type="date" value="${pedidoDe}" onchange="pedidoDe=this.value;render()" style="width:138px">
    <span style="color:var(--txd);font-size:11px">ate</span>
    <input type="date" value="${pedidoAte}" onchange="pedidoAte=this.value;render()" style="width:138px">
    ${pedidoSearch||pedidoDe||pedidoAte?`<button class="btn bg2 sm" onclick="pedidoSearch='';pedidoDe='';pedidoAte='';render()">×</button>`:''}
    <button class="btn bp" style="margin-left:auto" onclick="openNewOrder()">+ Novo Pedido</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="tw"><table><thead><tr><th>N</th><th>Data</th><th>Cliente</th><th>Cidade</th><th>Canal</th><th>Envio</th><th>Pgto</th><th>Total</th><th>Lucro</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    ${filtered.length>0?`<div class="tfoot"><span><span class="tfl">Pedidos: </span><strong>${filtered.length}</strong></span><span><span class="tfl">Faturamento: </span><span class="tfv">${fmtBRL(total)}</span></span></div>`:''}
  </div>`;
}

function changeStatus(id,s){state.orders=state.orders.map(o=>o.id===id?{...o,status:s}:o);save('orders');render();}
function deleteOrder(id){if(confirm('Remover pedido?')){state.orders=state.orders.filter(o=>o.id!==id);save('orders');render();}}

// ============ ORDER MODAL ============
let orderModalData=null;

function newOrderDefaults(){
  const fmq=state.maqs.length>0?state.maqs[0].id:'';
  const fch=state.channels.length>0?state.channels[0].id:'';
  return{date:new Date().toISOString().slice(0,10),clientName:'',cpfCnpj:'',phone:'',email:'',tipoPessoa:'fisica',contribuinte:'nao',street:'',streetNum:'',complement:'',bairro:'',cep:'',city:'',state:'',diffDeliveryAddr:false,deliveryStreet:'',deliveryStreetNum:'',deliveryComplement:'',deliveryBairro:'',deliveryCep:'',deliveryCity:'',deliveryState:'',productId:'',quantity:1,salePrice:'',discountType:'valor',discountVal:'',payments:[{id:uid(),type:'pix',maquininhaId:fmq,mode:'presencial',installments:1,amount:''}],deliveryMethod:'sedex',trackingCode:'',motoboyCost:'',correiosCost:'',motoboyId:'',motoboyName:'',fuelCost:'',tollCost:'',discount:'',channel:fch,isPresencial:false,status:'em_aberto',notes:'',internalNotes:'',upsells:[],postActions:{nf:false,sep:false,rastreio:false,entregue:false}};
}

function openNewOrder(){orderModalData={...newOrderDefaults(),_isNew:true};showOrderModal();}
function openEditOrder(id){const o=state.orders.find(x=>x.id===id);if(o)orderModalData={...newOrderDefaults(),...o,_isNew:false};showOrderModal();}


function renderItemsList(o){
  const items=o.items&&o.items.length>0?o.items:[{id:'main',productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||'',isGift:false}];
  let html='';
  items.forEach(function(item,idx){
    const selProd=state.prods.find(p=>p.id===item.productId);
    const selStock=selProd?getStockForProd(selProd):null;
    const hasVars=selStock&&selStock.variations&&selStock.variations.length>0;

    let allProdOpts='<option value="">-- Selecione --</option>';
    state.prods.forEach(function(p){allProdOpts+='<option value="'+p.id+'"'+(item.productId===p.id?' selected':'')+'>'+esc(p.name)+'</option>';});

    let varOpts='';
    if(hasVars){
      varOpts='<option value="">— Cor/Tamanho —</option>';
      selStock.variations.forEach(function(v){
        const qty=Number(v.quantity||0);
        varOpts+='<option value="'+v.id+'"'+(item.variacaoId===v.id?' selected':'')+' '+(qty===0?'style="color:#ef4444"':'')+'>'+esc(v.name)+' ('+qty+' un.)</option>';
      });
    }

    const cols=(hasVars?'1fr 140px':'1fr')+' 70px 120px 36px'+(items.length>1?' 36px':'');
    const bg=item.isGift?'rgba(34,197,94,.06)':'var(--sf3)';
    const border=item.isGift?'rgba(34,197,94,.3)':'var(--bd)';
    const lbl=item.isGift?'🎁 Brinde':'📦 Produto';
    const giftBorder=item.isGift?'rgba(34,197,94,.4)':'var(--bd)';
    const giftBg=item.isGift?'rgba(34,197,94,.15)':'transparent';
    const giftColor=item.isGift?'var(--gr)':'var(--txd)';
    const valorLbl=item.isGift?'Valor (0=gratis)':'Valor';

    html+='<div data-item-idx="'+idx+'" style="display:grid;grid-template-columns:'+cols+';gap:7px;align-items:end;padding:10px;background:'+bg+';border-radius:8px;border:1px solid '+border+';margin-bottom:7px">';
    const ssOpts=[{v:'',l:''},...state.prods.map(p=>({v:p.id,l:p.name}))];
    const onProdSelect=`setItemField(${idx},'productId',__VAL__);setItemField(${idx},'variacaoId','');const _sp=state.prods.find(p=>p.id===__VAL__);if(_sp)setItemField(${idx},'salePrice',_sp.salePrice);updateOrderSummary();document.getElementById('order-items-list').innerHTML=renderItemsList(orderModalData);`;

    html+='<div class="field"><label>'+lbl+'</label>'+makeSearchSelect('item-prod-'+idx,item.productId,ssOpts,onProdSelect)+'</div>';
    if(hasVars){
      html+='<div class="field"><label>Variação</label><select onchange="setItemField('+idx+',\'variacaoId\',this.value)">'+varOpts+'</select></div>';
    }
    html+='<div class="field"><label>Qtd</label><input class="item-qty" type="number" min="1" value="'+(item.quantity||1)+'" oninput="setItemField('+idx+',\'quantity\',Number(this.value));updateOrderSummary()"></div>';
    html+='<div class="field"><label>'+valorLbl+'</label><div class="ip"><span class="ips">R$</span><input class="item-val" type="number" value="'+(item.salePrice||'')+'" oninput="setItemField('+idx+',\'salePrice\',this.value);updateOrderSummary()" placeholder="0,00"></div></div>';
    html+='<button onclick="toggleItemGift('+idx+')" style="padding:6px;border-radius:6px;cursor:pointer;border:1px solid '+giftBorder+';background:'+giftBg+';color:'+giftColor+';font-size:14px;height:36px;align-self:flex-end">🎁</button>';
    if(items.length>1)html+='<button class="btn bd2 sm" style="align-self:flex-end;padding:6px;height:36px" onclick="removeOrderItem('+idx+')">×</button>';
    html+='</div>';
  });
  return html;
}
function showOrderModal(){
  currentTab='order-form';
  const el=document.getElementById('main-content');
  window._formScroll=window.scrollY||window.pageYOffset||0;
  if(el){el.innerHTML=renderOrderModal();}
  setTimeout(()=>{window.scrollTo(0,window._formScroll||0);initCityAutocompletes();},0);
}

function renderOrderModal(){
  const o=orderModalData;const isNew=o._isNew;
  const prod=state.prods.find(p=>p.id===o.productId);
  const si=state.stock?state.stock.find(s=>s.productId===o.productId):null;
  const cp=getCost(prod,si);
  // Multi-item support
  const itemsTotal=(o.items&&o.items.length>0?o.items:[{productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||0,isGift:false}]).reduce((a,item)=>a+Number(item.salePrice||0)*Number(item.quantity||1),0);
  const st=itemsTotal;
  const ut=(o.upsells||[]).reduce((a,u)=>a+Number(u.price||0),0);
  const baseRev=st+ut;
  let discountAmt=0;
  if(o.discountType==='pct'&&o.discountVal){discountAmt=baseRev*(Number(o.discountVal)/100);}
  else{discountAmt=Number(o.discount||o.discountVal||0);}
  const rev=baseRev-discountAmt;
  const ctotal=cp*Number(o.quantity||1);
  const mot=Number(o.motoboyCost||0)+Number(o.fuelCost||0)+Number(o.tollCost||0);const cor=Number(o.correiosCost||0);
  const fee=(o.payments||[]).reduce((a,p)=>a+payFee(p,state.maqs),0);
  const td=ctotal+mot+cor+fee;const profit=rev-td;const roi=td>0?(profit/td)*100:0;

  let prodOptions=`<option value="">-- Selecione --</option>`;
  state.prods.forEach(p=>{prodOptions+=`<option value="${p.id}" ${o.productId===p.id?'selected':''}>${esc(p.name)}</option>`;});
  let channelOptions='';state.channels.forEach(c=>{channelOptions+=`<option value="${c.id}" ${o.channel===c.id?'selected':''}>${esc(c.label)}</option>`;});
  let statusOptions='';OS.forEach(s=>{statusOptions+=`<option value="${s.id}" ${o.status===s.id?'selected':''}>${s.label}</option>`;});
  let dlvOptions='';DLV.forEach(d=>{dlvOptions+=`<option value="${d.id}" ${o.deliveryMethod===d.id?'selected':''}>${d.icon} ${d.label}</option>`;});
  let upsellRows='';
  (o.upsells||[]).forEach(u=>{const up=state.prods.find(p=>p.id===u.productId);const nm=u.productId==='_c'?(u.customName||'Extra'):(up?up.name:'Extra');upsellRows+=`<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 8px;background:var(--sf2);border-radius:5px;margin-top:4px"><span>${esc(nm)}</span><span style="color:var(--gr)">${fmtBRL(u.price)}</span></div>`;});
  const usSSOpts=[{v:'',l:''},{v:'_c',l:'✏️ Digitar produto...'},...state.prods.map(p=>({v:p.id,l:p.name}))];
  const usOnSelect=`ufProdChange(__VAL__);`;
  let paysHTML='';
  (o.payments||[]).forEach((pay,idx)=>{
    const m=state.maqs.find(x=>x.id===pay.maquininhaId);const md=pay.mode||'presencial';const inst=Number(pay.installments||1);
    const feeP=payFee(pay,state.maqs);
    let maqOpts='';state.maqs.forEach(x=>{maqOpts+=`<option value="${x.id}" ${pay.maquininhaId===x.id?'selected':''}>${x.name}</option>`;});
    let parcOpts='';for(let n=1;n<=18;n++){const r=m&&m.rates[md]?m.rates[md][n]||0:0;parcOpts+=`<option value="${n}" ${inst===n?'selected':''}>${n}x ${fmtPct(r)}</option>`;}
    paysHTML+=`<div style="display:grid;grid-template-columns:110px ${pay.type==='cartao'?'150px 90px 160px':''} 1fr ${(o.payments||[]).length>1?'32px':''};gap:8px;align-items:end;background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px;margin-bottom:7px">
      <div class="field"><label>Tipo</label><select onchange="changePayType(${idx},this.value)"><option value="dinheiro" ${pay.type==='dinheiro'?'selected':''}>Dinheiro</option><option value="pix" ${pay.type==='pix'?'selected':''}>PIX</option><option value="cartao" ${pay.type==='cartao'?'selected':''}>Cartao</option></select></div>
      ${pay.type==='cartao'?`<div class="field"><label>Maquininha</label><select onchange="changePayField(${idx},'maquininhaId',this.value)">${maqOpts}</select></div><div class="field"><label>Modo</label><div class="mtabs"><button class="mtab ${md==='presencial'?'mtab-p':''}" onclick="changePayField(${idx},'mode','presencial')">Pres.</button><button class="mtab ${md==='link'?'mtab-l':''}" onclick="changePayField(${idx},'mode','link')">Link</button></div></div><div class="field"><label>Parcelas ${feeP>0?'<span style=color:var(--rd)>-'+fmtBRL(feeP)+'</span>':''}</label><select onchange="changePayField(${idx},'installments',Number(this.value))">${parcOpts}</select></div>`:''}
      <div class="field"><label>Valor (R$)</label><div class="ip"><span class="ips">R$</span><input type="number" value="${pay.amount}" oninput="changePayField(${idx},'amount',this.value)" placeholder="0,00"></div></div>
      ${(o.payments||[]).length>1?`<button class="btn bd2 sm" style="align-self:flex-end;padding:7px 8px" onclick="removePay(${idx})">×</button>`:''}
    </div>`;
  });

  const acts=[{k:'nf',l:'Emitir NF',i:'🧾'},{k:'sep',l:'Enviar p/ Separacao',i:'📦'},{k:'rastreio',l:'Enviar Rastreio Email',i:'📧'},{k:'entregue',l:'Marcar Entregue',i:'✅'}];
  let actsHTML='';
  acts.forEach(a=>{const chk=(o.postActions||{})[a.k];actsHTML+=`<div class="ck-r ${chk?'on':''}" data-act="${a.k}" onclick="toggleAct('${a.k}')"><div class="ck-b ${chk?'on':''}">${chk?'v':''}</div><span class="ck-lbl" style="font-size:12px;color:${chk?'var(--or)':'var(--txm)'}">${a.i} ${a.l}</span></div>`;});

  return `<div style="max-width:1400px;margin:0 auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:22px;font-weight:800;color:var(--or)">${isNew?'NOVO PEDIDO':'EDITAR PEDIDO #'+o.orderNum}</div>
        <div style="font-size:11px;color:var(--txm)">Cole os textos do WhatsApp e o sistema preenche automaticamente</div>
      </div>
      <button class="btn bg2" onclick="closeOrderModal()" style="font-size:13px">← Voltar</button>
    </div>

    <!-- PARSER WHATSAPP -->
    <div class="card" style="margin-bottom:16px;border-color:rgba(249,115,22,.2)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:18px">📱</span><div class="sl" style="margin:0">Colar do WhatsApp (opcional)</div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end">
        <div class="field"><label>Endereco / Cliente</label><textarea id="wa-text" rows="3" placeholder="Nome, telefone, CEP, rua..." style="resize:vertical;font-family:monospace;font-size:11px;background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:8px"></textarea></div>
        <div class="field"><label>Pedido</label><textarea id="wa-order" rows="3" placeholder="1x X11 Medio - Prata&#10;Total: R$297,00" style="resize:vertical;font-family:monospace;font-size:11px;background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:8px"></textarea></div>
        <button class="btn bp" style="padding:10px 18px;font-size:13px;font-weight:700;align-self:flex-end" id="parse-btn" onclick="parseWA()">Interpretar com IA</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:16px">
      <div>
        <!-- CLIENTE -->
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <div class="sl" style="margin:0">Cliente</div>
            <div style="position:relative;flex:1">
              <input id="client-search" placeholder="Buscar cliente na base..." oninput="searchClients(this.value)" style="font-size:11px;padding:4px 10px">

              ${(o.discountType||'valor')==='valor'?`<div class="field"><label>Valor do Desconto</label><div class="ip"><span class="ips">R$</span><input type="number" value="${o.discountVal||o.discount||''}" oninput="setOrderField('discountVal',this.value);setOrderField('discount',this.value);updateOrderSummary()" placeholder="0,00"></div></div>`:`<div class="field"><label>Porcentagem</label><div class="ip"><span class="ips">%</span><input type="number" value="${o.discountVal||''}" oninput="setOrderField('discountVal',this.value);updateOrderSummary()" placeholder="0" max="100"></div></div>`}
              <div style="font-size:12px;color:var(--txd)">Desconto calculado: <strong style="color:var(--rd)">${fmtBRL(discountAmt)}</strong></div>

          <!-- ENTREGA -->

function showWATab(){document.getElementById('wa-panel').style.display='';document.getElementById('dados-panel').style.display='none';}
function showDadosTab(){document.getElementById('wa-panel').style.display='none';document.getElementById('dados-panel').style.display='';}
function closeOrderModal(){orderModalData=null;currentTab='pedidos';document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));const np=document.getElementById('nav-pedidos');if(np)np.classList.add('active');render();}
function setOrderField(k,v){if(!orderModalData)return;orderModalData[k]=v;}
function selectProduct(id){
  if(!orderModalData)return;
  const p=state.prods.find(x=>x.id===id);
  orderModalData.productId=id;
  if(p&&p.salePrice){
    orderModalData.salePrice=p.salePrice;
    const saleinput=document.getElementById('order-saleprice');
    if(saleinput)saleinput.value=p.salePrice;
  }
  updateOrderSummary();
}


function syncItemsFromDOM(){
  // Read current values from DOM inputs before any re-render
  if(!orderModalData||!orderModalData.items)return;
  const rows=document.querySelectorAll('[data-item-idx]');
  rows.forEach(row=>{
    const idx=Number(row.getAttribute('data-item-idx'));
    if(!orderModalData.items[idx])return;
    const sel=row.querySelector('select');
    const qtd=row.querySelector('.item-qty');
    const val=row.querySelector('.item-val');
    if(sel)orderModalData.items[idx].productId=sel.value;
    if(qtd)orderModalData.items[idx].quantity=Number(qtd.value)||1;
    if(val)orderModalData.items[idx].salePrice=val.value;
  });
}

function refreshDelivery(){
  const sec=document.getElementById('delivery-section');
  if(sec&&orderModalData)sec.innerHTML=renderDeliverySection(orderModalData);
}

function renderDeliverySection(o){
  const dlvBtns=[
    {id:'sedex',l:'SEDEX',ic:'📦',c:'#3b82f6'},{id:'pac',l:'PAC',ic:'📬',c:'#8b5cf6'},
    {id:'pac_mini',l:'PAC Mini',ic:'📬',c:'#8b5cf6'},{id:'motoboy',l:'Motoboy',ic:'🛵',c:'#f97316'},
    {id:'onibus',l:'Onibus',ic:'🚌',c:'#22c55e'},{id:'retirada',l:'Retirada Loja',ic:'🏪',c:'#06b6d4'},
    {id:'entrega_propria',l:'Entrega Propria',ic:'🚗',c:'#f59e0b'},
    {id:'transportadora',l:'Transportadora',ic:'🚛',c:'#6b7280'},
    {id:'jadlog',l:'Jadlog',ic:'🚚',c:'#ef4444'},
    {id:'total_express',l:'Total Express',ic:'🚚',c:'#ef4444'},
    {id:'outro',l:'Outro',ic:'📮',c:'#6b7280'}
  ];
  let html='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">';
  dlvBtns.forEach(function(d){
    var active=o.deliveryMethod===d.id;
    html+='<button onclick="setOrderField(\'deliveryMethod\',\''+d.id+'\');refreshDelivery()" style="padding:6px 8px;border-radius:7px;font-size:11px;cursor:pointer;border:1px solid '+(active?d.c:'var(--bd)')+';background:'+(active?d.c+'22':'transparent')+';color:'+(active?d.c:'var(--txm)')+';text-align:center;font-weight:'+(active?700:400)+'">'+d.ic+' '+d.l+'</button>';
  });
  html+='</div>';

  if(o.deliveryMethod==='motoboy'){
    var mbOpts='<option value="">Selecione...</option>';
    state.motoboys.forEach(function(m){mbOpts+='<option value="'+m.id+'"'+(o.motoboyId===m.id?' selected':'')+'>'+esc(m.name)+'</option>';});
    mbOpts+='<option value="_avulso"'+(o.motoboyId==='_avulso'?' selected':'')+'>Avulso (digitar)</option>';
    var horarios=['','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h','Negociar','Sem prazo'];
    var horOpts=horarios.map(function(h){return'<option value="'+h+'"'+(o.deliveryUntil===h?' selected':'')+'>'+( h||'— Até que horas? —')+'</option>';}).join('');
    html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 100px 100px;gap:8px">';
    html+='<div class="field"><label>Motoboy</label><select onchange="setOrderField(\'motoboyId\',this.value);var mb=state.motoboys.find(x=>x.id===this.value);if(mb)setOrderField(\'motoboyName\',mb.name);refreshDelivery()">'+mbOpts+'</select></div>';
    html+=(o.motoboyId==='_avulso'?'<div class="field"><label>Nome</label><input value="'+esc(o.motoboyName||'')+'" oninput="setOrderField(\'motoboyName\',this.value)" placeholder="Nome do motoboy"></div>':'<div></div>');
    html+='<div class="field"><label>Valor Frete</label><div class="ip"><span class="ips">R$</span><input type="number" value="'+(o.motoboyCost||'')+'" oninput="setOrderField(\'motoboyCost\',this.value);updateOrderSummary()" placeholder="0,00"></div></div>';

function saveOrder(){
  if(!orderModalData)return;
  const o=orderModalData;
  if(!o.items||!o.items[0]||!o.items[0].productId)return alert('Selecione pelo menos um produto.');
  if(o._isNew){
    if(!o.items||o.items.length===0)o.items=[{id:uid(),productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||0,isGift:false}];
    const saved={...o,id:uid(),orderNum:state.orderSeq,createdAt:new Date().toISOString()};
    delete saved._isNew;

    // Debita estoque por item — respeita variação se selecionada
    saved.items.forEach(item=>{
      if(!item.productId||item.isGift)return;
      const qty=Number(item.quantity||1);
      const sIdx=state.stock.findIndex(s=>s.productId===item.productId);
      if(sIdx<0)return;
      if(item.variacaoId){
        // Debita da variação específica
        const vars=state.stock[sIdx].variations||[];
        const vIdx=vars.findIndex(v=>v.id===item.variacaoId);
        if(vIdx>=0){vars[vIdx].quantity=Math.max(0,Number(vars[vIdx].quantity||0)-qty);}
        state.stock[sIdx].variations=vars;
        state.stock[sIdx].quantity=vars.reduce((a,v)=>a+Number(v.quantity||0),0);
      } else {
        // Debita do total
        state.stock[sIdx].quantity=Math.max(0,state.stock[sIdx].quantity-qty);
      }
    });

    state.orders=[saved,...state.orders];
    state.orderSeq++;
    save('orderSeq');save('stock');
  } else {
    delete o._isNew;
    state.orders=state.orders.map(x=>x.id===o.id?o:x);
  }
  save('orders');orderModalData=null;currentTab='pedidos';document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));const np=document.getElementById('nav-pedidos');if(np)np.classList.add('active');render();
}

let estoqueChartInst=null;
function initEstoqueChart(){
  const canvas=document.getElementById('cat-chart');
  if(!canvas||typeof Chart==='undefined')return;
  const cats=state.categories||[];
  const sl=state.prods.map(p=>({...p,...getStockForProd(p)}));
  const data=cats.filter(c=>!c.parentId).map(cat=>{
    const subIds=[cat.id,...cats.filter(c=>c.parentId===cat.id).map(c=>c.id)];
    const prods=sl.filter(p=>subIds.includes(p.categoryId));
    return {name:(cat.name.length>12?cat.name.slice(0,12)+'…':cat.name),custo:Math.round(prods.reduce((a,p)=>a+p.quantity*p.cost,0)),venda:Math.round(prods.reduce((a,p)=>a+p.quantity*(Number(p.salePrice)||0),0))};
  }).filter(d=>d.custo>0||d.venda>0);
  if(!data.length)return;
  if(estoqueChartInst){estoqueChartInst.destroy();estoqueChartInst=null;}
  Chart.defaults.color='#666';
  estoqueChartInst=new Chart(canvas,{
    type:'bar',
    data:{

let estoqueTab='estoque';

function toggleExpand(productId){
  if(estoqueExpanded.has(productId)){estoqueExpanded.delete(productId);}
  else{estoqueExpanded.add(productId);}
  render();
}
function toggleCat(id){if(catExpanded.has(id)){catExpanded.delete(id);}else{catExpanded.add(id);}render();}
function toggleSubCat(id){if(subCatExpanded.has(id)){subCatExpanded.delete(id);}else{subCatExpanded.add(id);}render();}

function getStockForProd(p){
  const sIdx=state.stock.findIndex(x=>x.productId===p.id);
  let s=sIdx>=0?{...state.stock[sIdx]}:{productId:p.id,quantity:0,avgCost:0,movements:[],variations:[]};
  const existingQty=Number(s.quantity||0);

  // Auto-sync variações do produto (tipo 'variacao') para o estoque
  if(p.tipo==='variacao'&&p.variacoes&&p.variacoes.length>0){
    const existingVars=[...(s.variations||[])];
    let changed=false;
    p.variacoes.forEach(attr=>{
      (attr.opcoes||[]).forEach(op=>{
        const label=p.variacoes.length>1?`${attr.nome}: ${op}`:op;
        if(!existingVars.find(v=>v.name===label)){
          existingVars.push({id:uid(),name:label,quantity:0});
          changed=true;
        }
      });
    });
    if(changed){
      if(sIdx>=0){state.stock[sIdx].variations=existingVars;}
      else{state.stock.push({productId:p.id,quantity:existingQty,avgCost:0,movements:[],variations:existingVars});}
      try{localStorage.setItem('zb_cache_stock',JSON.stringify(state.stock));}catch{}
      clearTimeout(saveTimers['stock_auto']);
      saveTimers['stock_auto']=setTimeout(()=>dbSet('stock',state.stock),2000);
    }
    s={...s,variations:existingVars};
  }

  const vars=s.variations||[];
  const varSum=vars.reduce((a,v)=>a+Number(v.quantity||0),0);
  // Preserva qty original se variações ainda não foram distribuídas (todas zeradas)
  const totalQty=vars.length>0?(varSum>0?varSum:existingQty):existingQty;
  const cost=p.costMode==='avg'&&Number(s.avgCost)>0?Number(s.avgCost):Number(p.costPrice||0);
  return {...s,variations:vars,quantity:totalQty,cost};
}

function saveVarQty(productId,varId,newQty){
  const idx=state.stock.findIndex(s=>s.productId===productId);
  if(idx<0)return;
  const vars=state.stock[idx].variations||[];
  const vIdx=vars.findIndex(v=>v.id===varId);
  if(vIdx<0)return;
  vars[vIdx].quantity=Math.max(0,Number(newQty)||0);
  state.stock[idx].variations=vars;
  state.stock[idx].quantity=vars.reduce((a,v)=>a+Number(v.quantity||0),0);
  save('stock');
}

function addRootCat(){
  const name=(document.getElementById('new-cat-name').value||'').trim();
  const icon=(document.getElementById('new-cat-icon').value||'📁').trim();
  if(!name)return;
  state.categories=[...(state.categories||[]),{id:uid(),name,icon,parentId:null}];
  save('categories');
  document.querySelector('.overlay').remove();
  openManageCats();
}

function addSubCat(parentId){
  const name=prompt('Nome da subcategoria:');
  if(!name)return;
  const icon=prompt('Emoji/ícone (opcional, ex: 📱):','📂')||'📂';
  state.categories=[...(state.categories||[]),{id:uid(),name:name.trim(),icon,parentId}];
  save('categories');
  document.querySelector('.overlay').remove();
  openManageCats();
}

function updateCat(id,field,value){
  state.categories=(state.categories||[]).map(c=>c.id===id?{...c,[field]:value}:c);
  save('categories');
}

function deleteCat(id){
  if(!confirm('Remover categoria? Os produtos atribuídos ficarão sem categoria.'))return;
  state.categories=(state.categories||[]).filter(c=>c.id!==id&&c.parentId!==id);
  state.prods=state.prods.map(p=>p.categoryId===id?{...p,categoryId:null}:p);
  save('categories');save('prods');
  document.querySelector('.overlay').remove();
  openManageCats();
}

function setProdCat(prodId,catId){
  state.prods=state.prods.map(p=>p.id===prodId?{...p,categoryId:catId||null}:p);
  save('prods');
}

function toggleExpand(productId){
  if(estoqueExpanded.has(productId)){estoqueExpanded.delete(productId);}
  else{estoqueExpanded.add(productId);}
  render();
}

function addVar(productId){
  const name=(document.getElementById('new-var-name').value||'').trim();
  const qty=Number(document.getElementById('new-var-qty').value||0);
  if(!name)return;
  const sIdx=state.stock.findIndex(x=>x.productId===productId);
  const newVar={id:uid(),name,quantity:qty};
  if(sIdx>=0){
    state.stock[sIdx].variations=[...(state.stock[sIdx].variations||[]),newVar];
    state.stock[sIdx].quantity=state.stock[sIdx].variations.reduce((a,v)=>a+Number(v.quantity||0),0);
  }else{
    state.stock.push({productId,quantity:qty,avgCost:0,movements:[],variations:[newVar]});
  }
  save('stock');
  document.querySelector('.overlay').remove();
  openManageVars(productId);
}

function removeVar(productId,varId){
  if(!confirm('Remover variação?'))return;
  const sIdx=state.stock.findIndex(x=>x.productId===productId);
  if(sIdx<0)return;
  state.stock[sIdx].variations=(state.stock[sIdx].variations||[]).filter(v=>v.id!==varId);
  state.stock[sIdx].quantity=state.stock[sIdx].variations.reduce((a,v)=>a+Number(v.quantity||0),0);
  save('stock');
  document.querySelector('.overlay').remove();
  estoqueExpanded.add(productId);
  render();
}

function applyAdj(productId,varId){
  const qty=Number(document.getElementById('adj-qty').value);
  const costEl=document.getElementById('adj-cost');
  const cost=costEl?Number(costEl.value||0):0;
  const note=document.getElementById('adj-note').value;
  if(!qty)return;

  const idx=state.stock.findIndex(s=>s.productId===productId);
  const mvt={date:new Date().toISOString().slice(0,10),type:qty>0?'entrada':'saida',qty,cost,note};

  if(varId){
    // Ajusta variação específica
    if(idx>=0){
      const vars=state.stock[idx].variations||[];
      const vIdx=vars.findIndex(v=>v.id===varId);
      if(vIdx>=0){vars[vIdx].quantity=Math.max(0,Number(vars[vIdx].quantity||0)+qty);}
      state.stock[idx].variations=vars;
      state.stock[idx].quantity=vars.reduce((a,v)=>a+Number(v.quantity||0),0);
      state.stock[idx].movements=[mvt,...(state.stock[idx].movements||[])];
    }
  }else{
    // Ajusta produto sem variações
    if(idx>=0){
      const cur=state.stock[idx];
      const nq=cur.quantity+qty;
      const na=qty>0&&cost>0?calcAvg(cur.quantity,cur.avgCost,qty,cost):cur.avgCost;
      state.stock[idx]={...cur,quantity:Math.max(0,nq),avgCost:na,movements:[mvt,...(cur.movements||[])]};
    }else{
      state.stock.push({productId,quantity:Math.max(0,qty),avgCost:cost,movements:[mvt],variations:[]});
    }
  }

  save('stock');
  document.querySelector('.overlay').remove();
  estoqueExpanded.add(productId);
  render();
}
function receivePO(pid){
  const order=state.purchaseOrders.find(p=>p.id===pid);if(!order)return;
  order.items.forEach(item=>{const idx=state.stock.findIndex(s=>s.productId===item.productId);const aq=Number(item.qty||0);const ac=Number(item.unitCost||0);const mvt={date:new Date().toISOString().slice(0,10),type:'entrada',qty:aq,cost:ac};
    if(idx>=0){const cur=state.stock[idx];state.stock[idx]={...cur,quantity:cur.quantity+aq,avgCost:calcAvg(cur.quantity,cur.avgCost,aq,ac),movements:[mvt,...(cur.movements||[])]};}
    else{state.stock.push({productId:item.productId,quantity:aq,avgCost:ac,movements:[mvt]});}
  });
  state.purchaseOrders=state.purchaseOrders.map(p=>p.id===pid?{...p,status:'recebido'}:p);
  save('stock');save('purchaseOrders');render();
}

function setProdField(k,v){if(prodModalData)prodModalData[k]=v;}
function addVariacao(){if(!prodModalData)return;prodModalData.variacoes.push({nome:'',opcoes:[]});renderProdModal();}

function setVarOpcao(vi,oi,val){
  if(!prodModalData||!prodModalData.variacoes[vi])return;
  prodModalData.variacoes[vi].opcoes[oi]=val;
}
function setSkuData(key,field,val){if(!prodModalData)return;if(!prodModalData.skuData)prodModalData.skuData={};if(!prodModalData.skuData[key])prodModalData.skuData[key]={};prodModalData.skuData[key][field]=val;}
function removeVariacao(i){if(!prodModalData)return;prodModalData.variacoes.splice(i,1);renderProdModal();}
function addKitItem(){if(!prodModalData)return;prodModalData.kitItems.push({productId:'',qty:1});renderProdModal();}
function removeKitItem(i){if(!prodModalData)return;prodModalData.kitItems.splice(i,1);renderProdModal();}

function switchCostMode(mode){if(prodModalData)prodModalData.costMode=mode;renderProdModal();}

function saveProd(){
  if(!prodModalData)return;
  const f=prodModalData;
  if(!f.name)return alert('Informe o nome do produto.');
  const prod={
    id:f.id||uid(),name:f.name,brand:f.brand||'',sku:f.sku||'',ncm:f.ncm||'',
    costPrice:Number(f.costPrice||0),salePrice:Number(f.salePrice||0),
    weight:f.weight||'',length:f.length||'',width:f.width||'',height:f.height||'',
    costMode:f.costMode||'manual',gtin:f.gtin||'',cest:f.cest||'',origemICMS:f.origemICMS||'0',unidMedida:f.unidMedida||'Un',tipoEmbalagem:f.tipoEmbalagem||'Pacote/Caixa',controlarEstoque:f.controlarEstoque||'sim',estoqueInicial:f.estoqueInicial||0,estoqueMin:f.estoqueMin||0,estoqueMax:f.estoqueMax||0,localizacao:f.localizacao||'',diasPreparo:f.diasPreparo||0,weightLiq:f.weightLiq||'',descricao:f.descricao||'',obsInterna:f.obsInterna||'',tipo:f.tipo||'simples',
    variacoes:f.variacoes||[],kitItems:f.kitItems||[],skuData:f.skuData||{},
    kitDiscount:Number(f.kitDiscount||0),
    categoryId:f.categoryId||null,
    createdAt:f.createdAt||new Date().toISOString()
  };
  if(f.id){state.prods=state.prods.map(p=>p.id===f.id?prod:p);}
  else{state.prods=[...state.prods,prod];}
  save('prods');
  const ov=document.getElementById('prod-modal-overlay');if(ov)ov.remove();
  prodModalData=null;render();
}

    :(o.street||'')+(o.streetNum?', '+o.streetNum:'')+(o.complement?' — '+o.complement:'')+'\n    '+(o.bairro||'')+' · '+(o.city||'')+'/'+(o.state||'')+'\n    CEP: '+(o.cep||'—');

👤 ${o.clientName||'—'}
📞 ${o.phone||'—'}

📍 ${addr}
━━━━━━━━━━━━━━━━━━━━
💰 ${fmtBRL(o.salePrice||0)} — ${payLabel}
${pagStatus}${o.deliveryUntil?'\n🕐 Entregar até: '+o.deliveryUntil:''}${o.numSacolas?'\n🛍 '+o.numSacolas+' sacola'+(o.numSacolas==='1'?'':'s'):''}`;

${o.trackingCode?`📮 Rastreio: *${o.trackingCode}*\n`:''}Qualquer dúvida, é só chamar! 🙏`;

function gerarComprovanteImagem(id){
  const o=getOrderById(id);if(!o)return;
  const canvas=document.createElement('canvas');
  canvas.width=600;canvas.height=800;
  const ctx=canvas.getContext('2d');
  // Background
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,600,800);
  // Header
  ctx.fillStyle='#f97316';ctx.font='bold 28px Arial';ctx.textAlign='center';ctx.fillText('⚡ ZAMBONINI IMPORTS',300,50);
  ctx.fillStyle='#888';ctx.font='14px Arial';ctx.fillText('Smartwatches & Acessórios',300,75);
  // Divider
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(40,95);ctx.lineTo(560,95);ctx.stroke();
  // Order info
  ctx.fillStyle='#f0f0f0';ctx.font='bold 16px Arial';ctx.textAlign='left';ctx.fillText('COMPROVANTE DE PEDIDO',40,125);
  ctx.fillStyle='#888';ctx.font='13px Arial';ctx.fillText(`Pedido #${o.orderNum||o.id||'—'} · ${o.date||''}`,40,148);
  // Client
  ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(40,165);ctx.lineTo(560,165);ctx.stroke();
  ctx.fillStyle='#f97316';ctx.font='bold 13px Arial';ctx.fillText('CLIENTE',40,185);
  ctx.fillStyle='#f0f0f0';ctx.font='14px Arial';ctx.fillText(o.clientName||'—',40,205);
  ctx.fillStyle='#888';ctx.font='12px Arial';ctx.fillText(o.phone||'',40,222);ctx.fillText(`${o.street||''}${o.streetNum?', '+o.streetNum:''} — ${o.city||''}/${o.state||''}`,40,238);

let dreMes=new Date().getMonth(), dreAno=new Date().getFullYear();
let dreExtras={outrosR:'',mktg:'',aluguel:'',folha:'',fixas:'',outros:'',impostos:''};

function renderDRE(){
  const fs=state.orders.filter(o=>{const d=new Date(o.date);return d.getMonth()===dreMes&&d.getFullYear()===dreAno;});
  const allM=fs.map(o=>calcM(o));
  const recRev=allM.reduce((a,m)=>a+(m.rev-m.upsell),0);
  const recUp=allM.reduce((a,m)=>a+m.upsell,0);
  const recOut=Number(dreExtras.outrosR||0);const recBruta=recRev+recUp+recOut;
  const cmv=allM.reduce((a,m)=>a+m.cost,0);const lucroBruto=recBruta-cmv;
  const taxasM=allM.reduce((a,m)=>a+m.fee,0);const totMot=allM.reduce((a,m)=>a+m.mot,0);const totCor=allM.reduce((a,m)=>a+m.cor,0);
  const dMktg=Number(dreExtras.mktg||0),dAlug=Number(dreExtras.aluguel||0),dFolha=Number(dreExtras.folha||0),dFixas=Number(dreExtras.fixas||0),dOut=Number(dreExtras.outros||0);
  const totDesp=taxasM+totMot+totCor+dMktg+dAlug+dFolha+dFixas+dOut;const ebitda=lucroBruto-totDesp;
  const impostos=Number(dreExtras.impostos||0);const lucroLiq=ebitda-impostos;
  const pct=v=>recBruta>0?fmtPct(Math.abs((v/recBruta)*100)):'—';
  const margBruta=recBruta>0?(lucroBruto/recBruta)*100:0;const margE=recBruta>0?(ebitda/recBruta)*100:0;const margL=recBruta>0?(lucroLiq/recBruta)*100:0;
  function R(label,value,indent,highlight,neg,isTot){
    const cls=highlight?'dre-hl':isTot?'dre-t2':'dre-i';let color='var(--txm)';if(highlight)color=value>=0?'var(--gr)':'var(--rd)';else if(neg)color='var(--rd)';else if(value>0)color='var(--gr)';
    return `<tr class="${cls}"><td style="${indent?'padding-left:24px':'padding-left:14px'}">${label}</td><td style="text-align:right;color:${color};font-weight:${highlight||isTot?600:400}">${neg&&value!==0?'('+fmtBRL(value)+')':fmtBRL(value)}</td><td style="text-align:right;color:var(--txd);font-size:10px">${pct(value)}</td></tr>`;
  }
  function G(label){return `<tr class="dre-g"><td colspan="3">${label}</td></tr>`;}
  const years=[2024,2025,2026,2027,2028];
  const extraFields=[['Marketing','mktg'],['Aluguel','aluguel'],['Folha','folha'],['Desp. Fixas','fixas'],['Outras Desp.','outros'],['Impostos','impostos'],['Outras Receitas','outrosR']];
  let extraHTML='';extraFields.forEach(([l,k])=>{extraHTML+=`<div class="field"><label>${l}</label><div class="ip"><span class="ips">R$</span><input type="number" value="${dreExtras[k]}" oninput="dreExtras['${k}']=this.value;render()" placeholder="0,00"></div></div>`;});
  let custoHTML='';[['CMV',cmv],['Taxas',taxasM],['Fretes',totMot+totCor],['Desp.Op.',dMktg+dAlug+dFolha+dFixas+dOut],['Impostos',impostos]].forEach(([l,v])=>{const p=recBruta>0?(v/recBruta)*100:0;custoHTML+=`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--txm)">${l}</span><span style="color:var(--rd)">${fmtBRL(v)} <span style="color:var(--txd)">${fmtPct(p)}</span></span></div><div style="background:var(--sf3);border-radius:3px;height:5px;overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--rd);width:${Math.min(100,p)}%"></div></div></div>`;});
  return `<div style="display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:8px"><label>Periodo:</label><select onchange="dreMes=Number(this.value);render()" style="width:120px">${MESES.map((m,i)=>`<option value="${i}" ${i===dreMes?'selected':''}>${m}</option>`).join('')}</select><select onchange="dreAno=Number(this.value);render()" style="width:82px">${years.map(y=>`<option ${y===dreAno?'selected':''}>${y}</option>`).join('')}</select></div><div style="margin-left:auto;font-size:11px;color:var(--txd)">${fs.length} pedidos em ${MESES[dreMes]} ${dreAno}</div></div>
  <div class="g4" style="margin-bottom:16px"><div class="card"><div class="ct">Receita Bruta</div><div class="cv cv-or">${fmtBRL(recBruta)}</div></div><div class="card"><div class="ct">Lucro Bruto</div><div class="cv cv-gr">${fmtBRL(lucroBruto)}</div><div class="cs">${fmtPct(margBruta)}</div></div><div class="card"><div class="ct">EBITDA</div><div class="cv ${ebitda>=0?'cv-bl':'cv-rd'}">${fmtBRL(ebitda)}</div><div class="cs">${fmtPct(margE)}</div></div><div class="card"><div class="ct">Lucro Liquido</div><div class="cv ${lucroLiq>=0?'cv-gr':'cv-rd'}">${fmtBRL(lucroLiq)}</div><div class="cs">${fmtPct(margL)}</div></div></div>
  <div class="g2" style="margin-bottom:16px"><div class="card"><div class="sl">Despesas e Ajustes</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${extraHTML}</div></div><div class="card"><div class="sl">Composicao de Custos</div>${custoHTML}</div></div>
  <div class="card"><div class="sl">DRE - ${MESES[dreMes]} ${dreAno}</div><div class="tw"><table class="dre-t"><thead><tr><th style="width:55%">Descricao</th><th style="text-align:right;width:25%">Valor</th><th style="text-align:right;width:20%">% Receita</th></tr></thead><tbody>
  ${G('1. Receita Bruta')}${R('Vendas de Produtos',recRev,true)}${recUp>0?R('Upsells',recUp,true):''}${recOut>0?R('Outras Receitas',recOut,true):''}${R('TOTAL RECEITA BRUTA',recBruta,false,false,false,true)}
  ${G('2. CMV')}${R('Custo dos Produtos',cmv,true,false,true)}${R('LUCRO BRUTO',lucroBruto,false,true)}
  ${G('3. Despesas Operacionais')}${R('Taxas de Maquina',taxasM,true,false,true)}${R('Frete Motoboy',totMot,true,false,true)}${R('Frete Correios',totCor,true,false,true)}${dMktg>0?R('Marketing',dMktg,true,false,true):''}${dAlug>0?R('Aluguel',dAlug,true,false,true):''}${dFolha>0?R('Folha',dFolha,true,false,true):''}${dFixas>0?R('Despesas Fixas',dFixas,true,false,true):''}${dOut>0?R('Outras Despesas',dOut,true,false,true):''}${R('EBITDA',ebitda,false,true)}
  ${G('4. Impostos')}${R('Impostos / Simples',impostos,true,false,true)}
  <tr class="dre-t2 dre-hl"><td style="font-size:14px">LUCRO LIQUIDO</td><td style="text-align:right;font-size:14px;color:${lucroLiq>=0?'var(--gr)':'var(--rd)'}">${lucroLiq>=0?fmtBRL(lucroLiq):'('+fmtBRL(Math.abs(lucroLiq))+')'}</td><td style="text-align:right;color:${lucroLiq>=0?'var(--gr)':'var(--rd)'}">${fmtPct(Math.abs(margL))}</td></tr>
  </tbody></table></div></div>`;
}

  let cityHTML='';(state.deliveryCities||[]).forEach(c=>{cityHTML+=`<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--gr);margin:3px">${esc(c.name)}<button style="background:none;border:none;cursor:pointer;color:var(--rd);font-size:13px" onclick="removeCity('${c.id}')">×</button></div>`;});
  let maqHTML='';state.maqs.forEach(maq=>{const r6=[1,2,3,6,12,18].map(n=>`<div style="background:var(--sf3);border:1px solid var(--bd);border-radius:4px;padding:2px 6px;font-size:10px"><span style="color:var(--txd)">${n}x </span><span style="color:var(--bl);font-weight:600">${fmtPct(maq.rates.presencial?maq.rates.presencial[n]||0:0)}</span></div>`).join('');maqHTML+=`<div style="border:1px solid var(--bd);border-radius:8px;padding:14px"><div style="height:3px;background:${maq.color};border-radius:3px 3px 0 0;margin:-14px -14px 10px"></div><div style="display:flex;align-items:center;gap:9px;margin-bottom:8px"><div style="width:32px;height:32px;border-radius:6px;background:${maq.color};display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:11px">${maq.name.slice(0,2).toUpperCase()}</div><div style="font-weight:700">${esc(maq.name)}</div></div><div style="font-size:10px;color:var(--txd);margin-bottom:4px">Presencial</div><div style="display:flex;gap:4px;flex-wrap:wrap">${r6}</div></div>`;});
  return `<div class="g2" style="margin-bottom:22px"><div class="card"><div class="sl">Origens de Venda</div><div style="display:flex;gap:8px;margin-bottom:10px"><input id="new-ch" placeholder="Nova origem..." value="${esc(newChLabel)}" oninput="newChLabel=this.value" onkeydown="if(event.key==='Enter')addCh()" style="flex:1"><button class="btn bp" onclick="addCh()">+Add</button></div><div style="display:flex;flex-wrap:wrap;gap:7px">${chHTML}</div></div><div class="card"><div class="sl">Cidades Entrega no Dia</div><div style="font-size:11px;color:var(--txd);margin-bottom:10px">Cidades com Motoboy. Aparece no Dashboard com destaque.</div><div style="display:flex;gap:8px;margin-bottom:10px"><input id="new-city" placeholder="Ex: Ribeirao Preto" value="${esc(newCityLabel)}" oninput="newCityLabel=this.value" onkeydown="if(event.key==='Enter')addCity()" style="flex:1"><button class="btn bp" onclick="addCity()">+Add</button></div><div>${cityHTML||'<span style="font-size:11px;color:var(--txd)">Nenhuma cidade.</span>'}</div></div></div><div class="card"><div class="sl">Maquininhas</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">${maqHTML}</div></div>`;
}
function addCh(){const lbl=(document.getElementById('new-ch')||{value:newChLabel}).value.trim();if(!lbl)return;state.channels=[...state.channels,{id:uid(),label:lbl}];newChLabel='';save('channels');render();}
function removeCh(id){if(state.channels.length<=1)return;state.channels=state.channels.filter(c=>c.id!==id);save('channels');render();}
function addCity(){const nm=(document.getElementById('new-city')||{value:newCityLabel}).value.trim();if(!nm)return;if((state.deliveryCities||[]).find(c=>c.name.toLowerCase()===nm.toLowerCase()))return;state.deliveryCities=[...(state.deliveryCities||[]),{id:uid(),name:nm}];newCityLabel='';save('deliveryCities');render();}
function removeCity(id){state.deliveryCities=(state.deliveryCities||[]).filter(c=>c.id!==id);save('deliveryCities');render();}


function updateOrderSummary(){
  if(!orderModalData)return;
  const o=orderModalData;
  const prod=state.prods.find(p=>p.id===o.productId);
  const si=state.stock?state.stock.find(s=>s.productId===o.productId):null;
  const cp=getCost(prod,si);
  const st=Number(o.salePrice||0)*Number(o.quantity||1);
  const ut=(o.upsells||[]).reduce((a,u)=>a+Number(u.price||0),0);
  const rev=st+ut-Number(o.discount||0);
  const ctotal=cp*Number(o.quantity||1);
  const mot=Number(o.motoboyCost||0);const cor=Number(o.correiosCost||0);
  const fee=(o.payments||[]).reduce((a,p)=>a+payFee(p,state.maqs),0);
  const td=ctotal+mot+cor+fee;const profit=rev-td;const roi=td>0?(profit/td)*100:0;
  const s=document.getElementById('order-summary');
  if(s){s.innerHTML='<div style="font-size:11px;line-height:1.9"><div>Receita: <strong style="color:var(--or)">'+fmtBRL(rev)+'</strong></div><div>Custo: <strong style="color:var(--rd)">'+fmtBRL(td)+'</strong></div><div>Lucro: <strong style="color:'+(profit>=0?'var(--gr)':'var(--rd)')+'">'+fmtBRL(profit)+'</strong></div><div>ROI: <strong style="color:'+(roi>=0?'var(--gr)':'var(--rd)')+'">'+fmtPct(roi)+'</strong></div></div>';}
}
