            <td style="padding:8px 6px"><div class="ip"><span class="ips" style="font-size:11px">R$</span><input type="number" value="${sd.costPrice||''}" oninput="setSkuData('${key}','costPrice',Number(this.value))" placeholder="${f.costPrice||'0'}" style="width:85px;padding:5px 7px 5px 22px;font-size:11px"></div></td>
            <td style="padding:8px 6px"><div class="ip"><span class="ips" style="font-size:11px">R$</span><input type="number" value="${sd.salePrice||''}" oninput="setSkuData('${key}','salePrice',Number(this.value))" placeholder="${f.salePrice||'0'}" style="width:85px;padding:5px 7px 5px 22px;font-size:11px"></div></td>
            <td style="padding:8px 6px"><input type="number" value="${sd.qty||''}" oninput="setSkuData('${key}','qty',Number(this.value))" placeholder="0" style="width:70px;padding:5px 7px;font-size:11px"></td>
            <td style="padding:8px 6px;text-align:center"><input type="checkbox" ${sd.disabled?'':'checked'} onchange="setSkuData('${key}','disabled',!this.checked)" style="width:16px;height:16px;accent-color:var(--or)"></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
      <div style="margin-top:10px;padding:8px 12px;background:var(--sf2);border-radius:6px;font-size:11px;color:var(--txd)">
        💡 Campos em branco herdam o preço/custo padrão do produto. Estoque zerado = sem estoque para essa variação.
      </div>
    </div>`:''}
    `;
  }

  // Kit section
  let kitHTML = '';
  if(f.tipo === 'kit'){
    let prodOpts = '<option value="">Selecione um produto...</option>';
    state.prods.filter(p=>p.id!==f.id&&p.tipo!=='kit').forEach(p=>{prodOpts+=`<option value="${p.id}">${esc(p.name)}</option>`;});
    kitHTML = `<div style="padding:14px;background:var(--sf3);border-radius:8px;border:1px solid var(--bd)">
      <div class="sl" style="margin-bottom:10px">Componentes do Kit</div>
      <div style="font-size:11px;color:var(--txd);margin-bottom:10px">Combine produtos do catálogo para formar este kit/combo.</div>
      ${f.kitItems.map((item,ki)=>{const kp=state.prods.find(p=>p.id===item.productId);return `<div style="display:grid;grid-template-columns:1fr 80px auto;gap:8px;align-items:end;margin-bottom:8px;background:var(--sf2);border-radius:7px;padding:10px;border:1px solid var(--bd)">
        <div class="field"><label>Produto</label><select onchange="prodModalData.kitItems[${ki}].productId=this.value;renderProdModal()">${prodOpts.replace(`value="${item.productId}"`,`value="${item.productId}" selected`)}</select></div>
        <div class="field"><label>Qtd</label><input type="number" min="1" value="${item.qty||1}" oninput="prodModalData.kitItems[${ki}].qty=Number(this.value)"></div>
        <button class="btn bd2 sm" style="align-self:flex-end" onclick="removeKitItem(${ki})">×</button>
      </div>`;}).join('')}
      ${f.kitItems.length>0?`<div style="padding:8px 12px;background:var(--sf2);border-radius:6px;font-size:12px;margin-bottom:8px">
        Custo total do kit: <strong style="color:var(--or)">${fmtBRL(f.kitItems.reduce((a,i)=>{const kp=state.prods.find(p=>p.id===i.productId);return a+(kp?Number(kp.costPrice||0)*(i.qty||1):0);},0))}</strong>
      </div>`:''}
      <button class="btn bg2 sm" onclick="addKitItem()" style="width:100%">+ Adicionar Produto ao Kit</button>
    </div>`;
  }

  let existing = document.getElementById('prod-modal-overlay');
  if(!existing){existing=document.createElement('div');existing.id='prod-modal-overlay';existing.className='overlay';existing.onclick=e=>{if(e.target===existing){existing.remove();prodModalData=null;}};document.body.appendChild(existing);}
  existing.innerHTML = `<div class="modal" style="width:680px">
    <div class="mt2">${isEdit?'Editar Produto':'Novo Produto'}</div>
    <div class="fg">
      <div class="fr">
        <div class="field"><label>Nome *</label><input id="p-name" value="${esc(f.name)}" oninput="prodModalData.name=this.value"></div>
        <div class="field"><label>Marca</label><input id="p-brand" value="${esc(f.brand||'')}" oninput="prodModalData.brand=this.value"></div>
      </div>
      <div class="fr">
        <div class="field"><label>SKU</label><input id="p-sku" value="${esc(f.sku||'')}" oninput="prodModalData.sku=this.value"></div>
        <div class="field"><label>NCM</label><input id="p-ncm" value="${esc(f.ncm||'')}" oninput="prodModalData.ncm=this.value" placeholder="8517.62.91"></div>
      </div>
      <div>
        <div class="sl" style="margin-bottom:8px">Tipo de Produto</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">${tipoBtns}</div>
      </div>
      ${varHTML}${kitHTML}
      ${f.tipo!=='kit'?`<div>
        <div class="sl" style="margin-bottom:6px">Precificação</div>
        <div style="display:flex;background:var(--sf3);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:8px">${cmBtns}</div>
        <div class="fr">
          <div class="field"><label>Custo (R$)</label><div class="ip"><span class="ips">R$</span><input type="number" id="p-cost" value="${f.costPrice||''}" oninput="prodModalData.costPrice=Number(this.value)" ${f.costMode==='avg'?'style="opacity:.4"':''}></div></div>
          <div class="field"><label>Venda (R$)</label><div class="ip"><span class="ips">R$</span><input type="number" id="p-sale" value="${f.salePrice||''}" oninput="prodModalData.salePrice=Number(this.value)"></div></div>
        </div>
      </div>`:`<div class="fr">
        <div class="field"><label>Preço de Venda do Kit (R$)</label><div class="ip"><span class="ips">R$</span><input type="number" value="${f.salePrice||''}" oninput="prodModalData.salePrice=Number(this.value)"></div></div>
        <div class="field"><label>Desconto do kit (%)</label><input type="number" value="${f.kitDiscount||''}" oninput="prodModalData.kitDiscount=Number(this.value)" placeholder="0"></div>
      </div>`}
      <!-- DADOS FISCAIS -->
      <div style="padding:12px;background:var(--sf3);border-radius:8px;border:1px solid var(--bd)">
        <div class="sl" style="margin-bottom:10px">Dados Fiscais (NF-e)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div class="field"><label>NCM</label><input value="${esc(f.ncm||'')}" oninput="prodModalData.ncm=this.value" placeholder="Ex: 8517.62.91"></div>
          <div class="field"><label>Código CEST</label><input value="${esc(f.cest||'')}" oninput="prodModalData.cest=this.value" placeholder="Ex: 01.003.00"></div>
          <div class="field"><label>GTIN / Cód. de Barras</label><input value="${esc(f.gtin||'')}" oninput="prodModalData.gtin=this.value" placeholder="EAN-13..."></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 80px 80px;gap:8px">
          <div class="field"><label>Origem ICMS</label><select oninput="prodModalData.origemICMS=this.value" style="font-size:11px">
            ${[['0','0 - Nacional, exceto indicadas nos cód. 3 a 5'],['1','1 - Estrangeira - Importação direta, exceto cód. 6'],['2','2 - Estrangeira - Adquirida no mercado interno, exceto cód. 7'],['3','3 - Nacional, Conteúdo de Importação > 40% e ≤ 70%'],['4','4 - Nacional, produção conforme processos produtivos básicos'],['5','5 - Nacional, Conteúdo de Importação ≤ 40%'],['6','6 - Estrangeira - Importação direta, sem similar nacional (CAMEX)'],['7','7 - Estrangeira - Adquirida mercado interno, sem similar (CAMEX)'],['8','8 - Nacional, Conteúdo de Importação > 70%']].map(([v,l])=>`<option value="${v}" ${(f.origemICMS||'0')===v?'selected':''}>${esc(l)}</option>`).join('')}
          </select></div>
          <div class="field"><label>Unid. Medida</label><select oninput="prodModalData.unidMedida=this.value">
            ${['Un','Kg','g','L','mL','m','cm','Cx','Pç','Par','Kit'].map(u=>`<option ${(f.unidMedida||'Un')===u?'selected':''}>${u}</option>`).join('')}
          </select></div>
          <div class="field"><label>Dias Preparo</label><input type="number" min="0" value="${f.diasPreparo||''}" oninput="prodModalData.diasPreparo=Number(this.value)" placeholder="0"></div>
        </div>
      </div>

      <!-- DIMENSÕES E PESO -->
      <div style="padding:12px;background:var(--sf3);border-radius:8px;border:1px solid var(--bd)">
        <div class="sl" style="margin-bottom:10px">Dimensões e Peso</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div class="field"><label>Peso Liq. (kg)</label><input type="number" step="0.001" value="${f.weightLiq||''}" oninput="prodModalData.weightLiq=this.value" placeholder="0.000"></div>

          <div class="field"><label>Alt (cm)</label><input type="number" step="0.1" value="${f.height||''}" oninput="prodModalData.height=this.value" placeholder="0.0"></div>
          <div class="field"><label>Comp (cm)</label><input type="number" step="0.1" value="${f.length||''}" oninput="prodModalData.length=this.value" placeholder="0.0"></div>
          <div class="field"><label>Embalagem</label><select oninput="prodModalData.tipoEmbalagem=this.value">
            ${['Pacote/Caixa','Envelope','Rolo','Outro'].map(e=>`<option ${(f.tipoEmbalagem||'Pacote/Caixa')===e?'selected':''}>${e}</option>`).join('')}
          </select></div>
        </div>
      </div>

      <!-- ESTOQUE -->
      <div style="padding:12px;background:var(--sf3);border-radius:8px;border:1px solid var(--bd)">
        <div class="sl" style="margin-bottom:10px">Estoque</div>
        <div style="display:grid;grid-template-columns:120px 1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div class="field"><label>Controlar Estoque</label><select oninput="prodModalData.controlarEstoque=this.value">

          <div class="field"><label>Estoque Inicial</label><input type="number" value="${f.estoqueInicial||''}" oninput="prodModalData.estoqueInicial=Number(this.value)" placeholder="0"></div>

      </div>
    </div>
      <!-- DESCRIÇÃO -->
      <div style="padding:12px;background:var(--sf3);border-radius:8px;border:1px solid var(--bd)">
        <div class="sl" style="margin-bottom:8px">Descrição do Produto</div>
        <div style="font-size:11px;color:var(--txd);margin-bottom:8px">Aparece em propostas, pedidos e catálogo. Descreva funcionalidades, compatibilidade, diferenciais.</div>
        <textarea id="p-desc" rows="5" oninput="prodModalData.descricao=this.value" style="resize:vertical;width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:10px;color:var(--tx);font-family:inherit;font-size:12px;line-height:1.6">${esc(f.descricao||'')}</textarea>
        <div style="margin-top:8px">
          <div class="sl" style="margin-bottom:6px;font-size:8px">Observação Interna</div>
          <input value="${esc(f.obsInterna||'')}" oninput="prodModalData.obsInterna=this.value" placeholder="Fornecedor, código interno, observações..." style="font-size:11px">
        </div>
      </div>
    <div class="mf">
      <button class="btn bg2" onclick="document.getElementById('prod-modal-overlay').remove();prodModalData=null">Cancelar</button>
      <button class="btn bp" onclick="saveProd()">Salvar Produto</button>
    </div>
  </div>`;
}

function setProdField(k,v){if(prodModalData)prodModalData[k]=v;}

function setVarOpcao(vi,oi,val){

}
function setSkuData(key,field,val){if(!prodModalData)return;if(!prodModalData.skuData)prodModalData.skuData={};if(!prodModalData.skuData[key])prodModalData.skuData[key]={};prodModalData.skuData[key][field]=val;}

function saveProd(){
  if(!prodModalData)return;
  const f=prodModalData;
  if(!f.name)return alert('Informe o nome do produto.');
  const prod={
    id:f.id||uid(),name:f.name,brand:f.brand||'',sku:f.sku||'',ncm:f.ncm||'',
    costPrice:Number(f.costPrice||0),salePrice:Number(f.salePrice||0),
    weight:f.weight||'',length:f.length||'',width:f.width||'',height:f.height||'',
    costMode:f.costMode||'manual',gtin:f.gtin||'',cest:f.cest||'',origemICMS:f.origemICMS||'0',unidMedida:f.unidMedida||'Un',tipoEmbalagem:f.tipoEmbalagem||'Pacote/Caixa',controlarEstoque:f.controlarEstoque||'sim',estoqueInicial:f.estoqueInicial||0,estoqueMin:f.estoqueMin||0,estoqueMax:f.estoqueMax||0,localizacao:f.localizacao||'',diasPreparo:f.diasPreparo||0,weightLiq:f.weightLiq||'',descricao:f.descricao||'',obsInterna:f.obsInterna||'',tipo:f.tipo||'simples',
    variacoes:f.variacoes||[],kitItems:f.kitItems||[],skuData:f.skuData||{},
    kitDiscount:Number(f.kitDiscount||0),
    createdAt:f.createdAt||new Date().toISOString()
  };
  if(f.id){state.prods=state.prods.map(p=>p.id===f.id?prod:p);}
  else{state.prods=[...state.prods,prod];}
  save('prods');
  const ov=document.getElementById('prod-modal-overlay');if(ov)ov.remove();
  prodModalData=null;render();
}

<script>
// ============ DRE ============
let dreMes=new Date().getMonth(), dreAno=new Date().getFullYear();
let dreExtras={outrosR:'',mktg:'',aluguel:'',folha:'',fixas:'',outros:'',impostos:''};

function renderDRE(){
  const fs=state.orders.filter(o=>{const d=new Date(o.date);return d.getMonth()===dreMes&&d.getFullYear()===dreAno;});
  const allM=fs.map(o=>calcM(o));
  const recRev=allM.reduce((a,m)=>a+(m.rev-m.upsell),0);
  const recUp=allM.reduce((a,m)=>a+m.upsell,0);
  const recOut=Number(dreExtras.outrosR||0);const recBruta=recRev+recUp+recOut;
  const cmv=allM.reduce((a,m)=>a+m.cost,0);const lucroBruto=recBruta-cmv;
  const taxasM=allM.reduce((a,m)=>a+m.fee,0);const totMot=allM.reduce((a,m)=>a+m.mot,0);const totCor=allM.reduce((a,m)=>a+m.cor,0);
  const dMktg=Number(dreExtras.mktg||0),dAlug=Number(dreExtras.aluguel||0),dFolha=Number(dreExtras.folha||0),dFixas=Number(dreExtras.fixas||0),dOut=Number(dreExtras.outros||0);
  const totDesp=taxasM+totMot+totCor+dMktg+dAlug+dFolha+dFixas+dOut;const ebitda=lucroBruto-totDesp;
  const impostos=Number(dreExtras.impostos||0);const lucroLiq=ebitda-impostos;
  const pct=v=>recBruta>0?fmtPct(Math.abs((v/recBruta)*100)):'—';
  const margBruta=recBruta>0?(lucroBruto/recBruta)*100:0;const margE=recBruta>0?(ebitda/recBruta)*100:0;const margL=recBruta>0?(lucroLiq/recBruta)*100:0;
  function R(label,value,indent,highlight,neg,isTot){
    const cls=highlight?'dre-hl':isTot?'dre-t2':'dre-i';let color='var(--txm)';if(highlight)color=value>=0?'var(--gr)':'var(--rd)';else if(neg)color='var(--rd)';else if(value>0)color='var(--gr)';
    return `<tr class="${cls}"><td style="${indent?'padding-left:24px':'padding-left:14px'}">${label}</td><td style="text-align:right;color:${color};font-weight:${highlight||isTot?600:400}">${neg&&value!==0?'('+fmtBRL(value)+')':fmtBRL(value)}</td><td style="text-align:right;color:var(--txd);font-size:10px">${pct(value)}</td></tr>`;
  }
  function G(label){return `<tr class="dre-g"><td colspan="3">${label}</td></tr>`;}
  const years=[2024,2025,2026,2027,2028];
  const extraFields=[['Marketing','mktg'],['Aluguel','aluguel'],['Folha','folha'],['Desp. Fixas','fixas'],['Outras Desp.','outros'],['Impostos','impostos'],['Outras Receitas','outrosR']];
  let extraHTML='';extraFields.forEach(([l,k])=>{extraHTML+=`<div class="field"><label>${l}</label><div class="ip"><span class="ips">R$</span><input type="number" value="${dreExtras[k]}" oninput="dreExtras['${k}']=this.value;render()" placeholder="0,00"></div></div>`;});
  let custoHTML='';[['CMV',cmv],['Taxas',taxasM],['Fretes',totMot+totCor],['Desp.Op.',dMktg+dAlug+dFolha+dFixas+dOut],['Impostos',impostos]].forEach(([l,v])=>{const p=recBruta>0?(v/recBruta)*100:0;custoHTML+=`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--txm)">${l}</span><span style="color:var(--rd)">${fmtBRL(v)} <span style="color:var(--txd)">${fmtPct(p)}</span></span></div><div style="background:var(--sf3);border-radius:3px;height:5px;overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--rd);width:${Math.min(100,p)}%"></div></div></div>`;});
  return `<div style="display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:8px"><label>Periodo:</label><select onchange="dreMes=Number(this.value);render()" style="width:120px">${MESES.map((m,i)=>`<option value="${i}" ${i===dreMes?'selected':''}>${m}</option>`).join('')}</select><select onchange="dreAno=Number(this.value);render()" style="width:82px">${years.map(y=>`<option ${y===dreAno?'selected':''}>${y}</option>`).join('')}</select></div><div style="margin-left:auto;font-size:11px;color:var(--txd)">${fs.length} pedidos em ${MESES[dreMes]} ${dreAno}</div></div>
  <div class="g4" style="margin-bottom:16px"><div class="card"><div class="ct">Receita Bruta</div><div class="cv cv-or">${fmtBRL(recBruta)}</div></div><div class="card"><div class="ct">Lucro Bruto</div><div class="cv cv-gr">${fmtBRL(lucroBruto)}</div><div class="cs">${fmtPct(margBruta)}</div></div><div class="card"><div class="ct">EBITDA</div><div class="cv ${ebitda>=0?'cv-bl':'cv-rd'}">${fmtBRL(ebitda)}</div><div class="cs">${fmtPct(margE)}</div></div><div class="card"><div class="ct">Lucro Liquido</div><div class="cv ${lucroLiq>=0?'cv-gr':'cv-rd'}">${fmtBRL(lucroLiq)}</div><div class="cs">${fmtPct(margL)}</div></div></div>
  <div class="g2" style="margin-bottom:16px"><div class="card"><div class="sl">Despesas e Ajustes</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${extraHTML}</div></div><div class="card"><div class="sl">Composicao de Custos</div>${custoHTML}</div></div>
  <div class="card"><div class="sl">DRE - ${MESES[dreMes]} ${dreAno}</div><div class="tw"><table class="dre-t"><thead><tr><th style="width:55%">Descricao</th><th style="text-align:right;width:25%">Valor</th><th style="text-align:right;width:20%">% Receita</th></tr></thead><tbody>
  ${G('1. Receita Bruta')}${R('Vendas de Produtos',recRev,true)}${recUp>0?R('Upsells',recUp,true):''}${recOut>0?R('Outras Receitas',recOut,true):''}${R('TOTAL RECEITA BRUTA',recBruta,false,false,false,true)}
  ${G('2. CMV')}${R('Custo dos Produtos',cmv,true,false,true)}${R('LUCRO BRUTO',lucroBruto,false,true)}
  ${G('3. Despesas Operacionais')}${R('Taxas de Maquina',taxasM,true,false,true)}${R('Frete Motoboy',totMot,true,false,true)}${R('Frete Correios',totCor,true,false,true)}${dMktg>0?R('Marketing',dMktg,true,false,true):''}${dAlug>0?R('Aluguel',dAlug,true,false,true):''}${dFolha>0?R('Folha',dFolha,true,false,true):''}${dFixas>0?R('Despesas Fixas',dFixas,true,false,true):''}${dOut>0?R('Outras Despesas',dOut,true,false,true):''}${R('EBITDA',ebitda,false,true)}
  ${G('4. Impostos')}${R('Impostos / Simples',impostos,true,false,true)}
  <tr class="dre-t2 dre-hl"><td style="font-size:14px">LUCRO LIQUIDO</td><td style="text-align:right;font-size:14px;color:${lucroLiq>=0?'var(--gr)':'var(--rd)'}">${lucroLiq>=0?fmtBRL(lucroLiq):'('+fmtBRL(Math.abs(lucroLiq))+')'}</td><td style="text-align:right;color:${lucroLiq>=0?'var(--gr)':'var(--rd)'}">${fmtPct(Math.abs(margL))}</td></tr>
  </tbody></table></div></div>`;
}

// ============ CONFIG ============
let newChLabel='', newCityLabel='';
function renderConfig(){
  let chHTML='';state.channels.forEach(c=>{chHTML+=`<div style="display:flex;align-items:center;gap:7px;background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:5px 11px;font-size:12px">${esc(c.label)}<button style="background:none;border:none;cursor:pointer;color:var(--rd);font-size:13px;margin-left:auto" onclick="removeCh('${c.id}')">×</button></div>`;});
  let cityHTML='';(state.deliveryCities||[]).forEach(c=>{cityHTML+=`<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--gr);margin:3px">${esc(c.name)}<button style="background:none;border:none;cursor:pointer;color:var(--rd);font-size:13px" onclick="removeCity('${c.id}')">×</button></div>`;});
  let maqHTML='';state.maqs.forEach(maq=>{const r6=[1,2,3,6,12,18].map(n=>`<div style="background:var(--sf3);border:1px solid var(--bd);border-radius:4px;padding:2px 6px;font-size:10px"><span style="color:var(--txd)">${n}x </span><span style="color:var(--bl);font-weight:600">${fmtPct(maq.rates.presencial?maq.rates.presencial[n]||0:0)}</span></div>`).join('');maqHTML+=`<div style="border:1px solid var(--bd);border-radius:8px;padding:14px"><div style="height:3px;background:${maq.color};border-radius:3px 3px 0 0;margin:-14px -14px 10px"></div><div style="display:flex;align-items:center;gap:9px;margin-bottom:8px"><div style="width:32px;height:32px;border-radius:6px;background:${maq.color};display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:11px">${maq.name.slice(0,2).toUpperCase()}</div><div style="font-weight:700">${esc(maq.name)}</div></div><div style="font-size:10px;color:var(--txd);margin-bottom:4px">Presencial</div><div style="display:flex;gap:4px;flex-wrap:wrap">${r6}</div></div>`;});
  return `<div class="g2" style="margin-bottom:22px"><div class="card"><div class="sl">Origens de Venda</div><div style="display:flex;gap:8px;margin-bottom:10px"><input id="new-ch" placeholder="Nova origem..." value="${esc(newChLabel)}" oninput="newChLabel=this.value" onkeydown="if(event.key==='Enter')addCh()" style="flex:1"><button class="btn bp" onclick="addCh()">+Add</button></div><div style="display:flex;flex-wrap:wrap;gap:7px">${chHTML}</div></div><div class="card"><div class="sl">Cidades Entrega no Dia</div><div style="font-size:11px;color:var(--txd);margin-bottom:10px">Cidades com Motoboy. Aparece no Dashboard com destaque.</div><div style="display:flex;gap:8px;margin-bottom:10px"><input id="new-city" placeholder="Ex: Ribeirao Preto" value="${esc(newCityLabel)}" oninput="newCityLabel=this.value" onkeydown="if(event.key==='Enter')addCity()" style="flex:1"><button class="btn bp" onclick="addCity()">+Add</button></div><div>${cityHTML||'<span style="font-size:11px;color:var(--txd)">Nenhuma cidade.</span>'}</div></div></div><div class="card"><div class="sl">Maquininhas</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">${maqHTML}</div></div>`;
}
function addCh(){const lbl=(document.getElementById('new-ch')||{value:newChLabel}).value.trim();if(!lbl)return;state.channels=[...state.channels,{id:uid(),label:lbl}];newChLabel='';save('channels');render();}
function removeCh(id){if(state.channels.length<=1)return;state.channels=state.channels.filter(c=>c.id!==id);save('channels');render();}
function addCity(){const nm=(document.getElementById('new-city')||{value:newCityLabel}).value.trim();if(!nm)return;if((state.deliveryCities||[]).find(c=>c.name.toLowerCase()===nm.toLowerCase()))return;state.deliveryCities=[...(state.deliveryCities||[]),{id:uid(),name:nm}];newCityLabel='';save('deliveryCities');render();}
function removeCity(id){state.deliveryCities=(state.deliveryCities||[]).filter(c=>c.id!==id);save('deliveryCities');render();}


function updateOrderSummary(){
  if(!orderModalData)return;
  const o=orderModalData;
  const prod=state.prods.find(p=>p.id===o.productId);
  const si=state.stock?state.stock.find(s=>s.productId===o.productId):null;
  const cp=getCost(prod,si);
  const st=Number(o.salePrice||0)*Number(o.quantity||1);
  const ut=(o.upsells||[]).reduce((a,u)=>a+Number(u.price||0),0);
  const rev=st+ut-Number(o.discount||0);
  const ctotal=cp*Number(o.quantity||1);
  const mot=Number(o.motoboyCost||0);const cor=Number(o.correiosCost||0);
  const fee=(o.payments||[]).reduce((a,p)=>a+payFee(p,state.maqs),0);
  const td=ctotal+mot+cor+fee;const profit=rev-td;const roi=td>0?(profit/td)*100:0;
  const s=document.getElementById('order-summary');
  if(s){s.innerHTML='<div style="font-size:11px;line-height:1.9"><div>Receita: <strong style="color:var(--or)">'+fmtBRL(rev)+'</strong></div><div>Custo: <strong style="color:var(--rd)">'+fmtBRL(td)+'</strong></div><div>Lucro: <strong style="color:'+(profit>=0?'var(--gr)':'var(--rd)')+'">'+fmtBRL(profit)+'</strong></div><div>ROI: <strong style="color:'+(roi>=0?'var(--gr)':'var(--rd)')+'">'+fmtPct(roi)+'</strong></div></div>';}
}

function bindEvents(){}
function bindOrderEvents(){}


// ============ METRICAS ============
function renderMetricas(){
  const now = new Date();
  const thisMonth = state.orders.filter(o=>{const d=new Date(o.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const allTime = state.orders;

  // 1. TAXA DE CONVERSAO (leads vs pedidos)
  const leads = Number(state.config.leadsTotal||0);
  const vendas = allTime.length;
  const txConv = leads>0?((vendas/leads)*100).toFixed(1):0;
  const leadsHoje = Number(state.config.leadsHoje||0);
  const vendasHoje = state.orders.filter(o=>o.date===now.toISOString().slice(0,10)).length;
  const txConvHoje = leadsHoje>0?((vendasHoje/leadsHoje)*100).toFixed(1):0;

  // 2. PRODUTOS MAIS LUCRATIVOS vs MAIS VENDIDOS
  const prodStats = {};
  allTime.forEach(o=>{
    const m = calcM(o);const prod = state.prods.find(p=>p.id===o.productId);if(!prod)return;
    if(!prodStats[o.productId])prodStats[o.productId]={name:prod.name,vendas:0,receita:0,lucro:0,upsells:0};
    prodStats[o.productId].vendas+=Number(o.quantity||1);
    prodStats[o.productId].receita+=m.rev;
    prodStats[o.productId].lucro+=m.profit;
    prodStats[o.productId].upsells+=(o.upsells||[]).length;
  });
  const prodList = Object.values(prodStats).sort((a,b)=>b.lucro-a.lucro);
  const prodByVendas = [...prodList].sort((a,b)=>b.vendas-a.vendas);
  const maxLucro = prodList.length>0?prodList[0].lucro:1;
  const maxVendas = prodByVendas.length>0?prodByVendas[0].vendas:1;

  // 3. RECOMPRA - clientes que compraram mais de 1x
  const clientMap = {};
  allTime.forEach(o=>{
    if(!o.clientName)return;
    const k=o.clientName.trim().toLowerCase();
    if(!clientMap[k])clientMap[k]={name:o.clientName,count:0,total:0};
    clientMap[k].count++;clientMap[k].total+=calcM(o).rev;
  });
  const clientList = Object.values(clientMap).sort((a,b)=>b.count-a.count);
  const recompradores = clientList.filter(c=>c.count>=2);
  const txRecompra = clientList.length>0?((recompradores.length/clientList.length)*100).toFixed(1):0;
  const receitaRecompra = recompradores.reduce((a,c)=>a+c.total,0);

  // 4. META ADS
  const adsData = state.config.adsData||{};
  const gastoHoje = Number(adsData.today||0);
  const gastoMes = Number(adsData.month||0);
  const impressoes = Number(adsData.impressions||0);
  const cliques = Number(adsData.clicks||0);
  const ctr = impressoes>0?((cliques/impressoes)*100).toFixed(2):0;
  const cpc = cliques>0?(gastoMes/cliques).toFixed(2):0;
  const recMes = thisMonth.reduce((a,o)=>a+calcM(o).rev,0);
  const roasMes = gastoMes>0?(recMes/gastoMes).toFixed(1):0;
  const cpl = leads>0?(gastoMes/leads).toFixed(2):0;
  const cac = vendas>0?(gastoMes/vendas).toFixed(2):0;
  const lastSync = state.config.adsLastSync?new Date(state.config.adsLastSync).toLocaleString('pt-BR'):'Nunca';

  // Produtos HTML
  let prodLucroHTML='';
  prodList.slice(0,8).forEach((p,i)=>{
    const pct=maxLucro>0?(p.lucro/maxLucro)*100:0;
    const margem=p.receita>0?((p.lucro/p.receita)*100).toFixed(1):0;
    prodLucroHTML+=`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px">
        <span style="font-weight:${i===0?700:500};color:${i===0?'var(--or)':'var(--tx)'}">${i===0?'🏆 ':''}${esc(p.name)}</span>
        <div style="display:flex;gap:12px">
          <span style="color:var(--txd)">${p.vendas} vendas</span>
          <span style="color:var(--gr);font-weight:600">${fmtBRL(p.lucro)}</span>
          <span style="color:var(--txd);font-size:10px">${margem}% margem</span>
        </div>
      </div>
      <div style="background:var(--sf3);border-radius:3px;height:8px;overflow:hidden"><div style="height:100%;border-radius:3px;background:${i===0?'var(--or)':'var(--sf4)'};width:${pct}%;border:1px solid ${i===0?'var(--or)':'rgba(249,115,22,.2)'}"></div></div>
    </div>`;
  });

  // Recompradores HTML
  let recompHTML='';
  recompradores.slice(0,8).forEach(c=>{
    recompHTML+=`<tr><td style="font-weight:600">${esc(c.name)}</td><td style="color:var(--or);font-weight:700;text-align:center">${c.count}x</td><td style="color:var(--gr);font-weight:600">${fmtBRL(c.total)}</td></tr>`;
  });

  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
    <div class="card" style="border-color:rgba(249,115,22,.25)">
      <div class="ct">Taxa de Conversao</div>
      <div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:4px">
        <div class="cv cv-or">${txConv}%</div>
        <div style="font-size:12px;color:var(--txm);margin-bottom:4px">de leads viram venda</div>
      </div>
      <div style="background:var(--sf3);border-radius:6px;padding:10px 12px;margin-top:10px">
        <div style="font-size:10px;color:var(--txd);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Atualize os leads recebidos</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="field"><label>Leads Hoje</label><input type="number" value="${state.config.leadsHoje||''}" oninput="updateConfig('leadsHoje',Number(this.value))" placeholder="0"></div>
          <div class="field"><label>Total Leads</label><input type="number" value="${state.config.leadsTotal||''}" oninput="updateConfig('leadsTotal',Number(this.value))" placeholder="0"></div>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--txm)">
          Hoje: <strong style="color:var(--or)">${txConvHoje}%</strong> (${vendasHoje} vendas / ${leadsHoje} leads)
        </div>
      </div>
      <div style="margin-top:10px;padding:8px;background:var(--sf3);border-radius:6px;font-size:11px;color:var(--txm)">
        💡 Abaixo de 20% = rever precos ou atendimento. Acima de 40% = excelente.
      </div>
    </div>
    <div class="card">
      <div class="ct">Clientes que Voltaram (Recompra)</div>
      <div style="display:flex;gap:16px;align-items:flex-end;margin-bottom:12px">
        <div><div class="cv cv-gr">${txRecompra}%</div><div class="cs">dos clientes compraram 2x+</div></div>

      <div style="background:var(--sf3);border-radius:7px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--txd);margin-bottom:4px">CAC (custo por cliente)</div><div style="font-size:18px;font-weight:700;color:var(--rd)">R$ ${cac}</div></div>
    </div>

function openAdsConfig(){
  const overlay=document.createElement('div');overlay.className='overlay';
  overlay.innerHTML=`<div class="modal modal-sm">
    <div class="mt2">Configurar Meta Ads API</div>
    <div class="fg">
      <div style="padding:12px;background:var(--ordim);border:1px solid var(--bdb);border-radius:7px;font-size:12px;line-height:1.7;color:var(--txm)">
        <strong style="color:var(--or)">Como pegar o Access Token:</strong><br>
        1. Acesse <strong>business.facebook.com</strong><br>
        2. Va em Configuracoes → API de Marketing<br>
        3. Gere um token com permissao <strong>ads_read</strong><br>
        4. Copie o Ad Account ID (comeca com act_)
      </div>
      <div class="field"><label>Ad Account ID</label><input id="ads-account" value="${state.config.metaAdAccount||''}" placeholder="act_123456789"></div>
      <div class="field"><label>Access Token</label><textarea id="ads-token" rows="3" style="resize:vertical;font-family:monospace;font-size:10px">${state.config.metaToken||''}</textarea></div>
    </div>
    <div class="mf"><button class="btn bg2" onclick="this.closest('.overlay').remove()">Cancelar</button><button class="btn bp" onclick="saveAdsConfig()">Salvar e Testar</button></div>
  </div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};document.body.appendChild(overlay);
}

function saveAdsConfig(){
  state.config.metaAdAccount=document.getElementById('ads-account').value.trim();
  state.config.metaToken=document.getElementById('ads-token').value.trim();
  save('config');document.querySelector('.overlay').remove();syncMetaAds();
}

async function syncMetaAds(){
  const token=state.config.metaToken;const account=state.config.metaAdAccount;
  if(!token||!account){alert('Configure o token e Ad Account ID primeiro.');return;}
  setSyncStatus('syncing');
  try{
    const today=new Date().toISOString().slice(0,10);
    const firstDay=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
    const fields='spend,impressions,clicks';
    const urlHoje=`https://graph.facebook.com/v19.0/${account}/insights?fields=${fields}&time_range={"since":"${today}","until":"${today}"}&access_token=${token}`;
    const urlMes=`https://graph.facebook.com/v19.0/${account}/insights?fields=${fields}&time_range={"since":"${firstDay}","until":"${today}"}&access_token=${token}`;
    const [rHoje,rMes]=await Promise.all([fetch(urlHoje).then(r=>r.json()),fetch(urlMes).then(r=>r.json())]);
    const dHoje=(rHoje.data&&rHoje.data[0])||{};const dMes=(rMes.data&&rMes.data[0])||{};
    state.config.adsData={today:Number(dHoje.spend||0),month:Number(dMes.spend||0),impressions:Number(dMes.impressions||0),clicks:Number(dMes.clicks||0)};
    state.config.adsLastSync=new Date().toISOString();
    save('config');setSyncStatus('ok');render();
  }catch(e){setSyncStatus('error');alert('Erro ao conectar com Meta Ads. Verifique o token.');}
}


function changePassword(){
  const np = document.getElementById('new-pass').value;
  const cp = document.getElementById('conf-pass').value;
  const msg = document.getElementById('pass-msg');
  if(!np||np.length<4){msg.style.color='var(--rd)';msg.textContent='Senha deve ter pelo menos 4 caracteres.';return;}
  if(np!==cp){msg.style.color='var(--rd)';msg.textContent='Senhas nao coincidem.';return;}
  localStorage.setItem('zb_password',np);
  msg.style.color='var(--gr)';msg.textContent='Senha alterada com sucesso!';
  document.getElementById('new-pass').value='';
  document.getElementById('conf-pass').value='';
  setTimeout(()=>{if(msg)msg.textContent='';},3000);
}
// ============ INIT ============
loadAll();
</script>

function openClientModal(id){
  const c=id?state.clients.find(x=>x.id===id):null;const f=c||{name:'',cpfCnpj:'',phone:'',email:'',city:'',state:'',notes:''};

function saveClient(existingId){
  const name=document.getElementById('cl-name').value;if(!name)return;
  const cepEl=document.getElementById('cl-cep');
  const c={id:existingId||uid(),name,cpfCnpj:document.getElementById('cl-cpf').value,phone:document.getElementById('cl-phone').value,email:document.getElementById('cl-email').value,cep:cepEl?cepEl.value:'',city:document.getElementById('cl-city').value,state:document.getElementById('cl-state').value,notes:document.getElementById('cl-notes').value,createdAt:existingId?(state.clients.find(x=>x.id===existingId)||{}).createdAt||new Date().toISOString():new Date().toISOString()};

<script>
// ============ MAQUININHAS PERSONALIZADAS ============
let maqModalData = null;

function openMaqModal(id){
  const m = id ? state.maqs.find(x=>x.id===id) : null;
  maqModalData = m ? JSON.parse(JSON.stringify(m)) : {
    id: uid(), name:'', color:'#f97316',
    rates: {presencial:{}, link:{}}
  };
  // ensure all 18 parcelas exist
  for(let i=1;i<=18;i++){
    if(!maqModalData.rates.presencial[i]) maqModalData.rates.presencial[i] = i===1?2.99:+(2.99+0.3*(i-1)).toFixed(2);
    if(!maqModalData.rates.link[i]) maqModalData.rates.link[i] = i===1?3.49:+(3.49+0.32*(i-1)).toFixed(2);
  }
  renderMaqModal();
}

function renderMaqModal(){
  const f = maqModalData;
  const isEdit = !!f.id && state.maqs.find(x=>x.id===f.id);

  let ratesHTML = '';
  for(let i=1;i<=18;i++){
    ratesHTML += `<div style="display:grid;grid-template-columns:40px 1fr 1fr;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd)">
      <div style="font-size:12px;font-weight:600;color:var(--txm)">${i}x</div>
      <div class="ip"><span class="ips" style="font-size:10px">%</span><input type="number" step="0.01" min="0" max="99" value="${f.rates.presencial[i]||0}" oninput="maqModalData.rates.presencial[${i}]=Number(this.value)" style="padding:5px 5px 5px 20px;font-size:11px"></div>
      <div class="ip"><span class="ips" style="font-size:10px">%</span><input type="number" step="0.01" min="0" max="99" value="${f.rates.link[i]||0}" oninput="maqModalData.rates.link[${i}]=Number(this.value)" style="padding:5px 5px 5px 20px;font-size:11px"></div>
    </div>`;
  }

  let existing = document.getElementById('maq-modal-overlay');
  if(!existing){
    existing = document.createElement('div');
    existing.id = 'maq-modal-overlay';
    existing.className = 'overlay';
    existing.onclick = e => { if(e.target===existing){existing.remove();maqModalData=null;} };
    document.body.appendChild(existing);
  }

  existing.innerHTML = `<div class="modal" style="width:560px">
    <div class="mt2">${isEdit?'Editar':'Nova'} Maquininha</div>
    <div class="fg">
      <div style="display:grid;grid-template-columns:1fr 1fr 80px;gap:8px">
        <div class="field"><label>Nome</label><input value="${esc(f.name)}" oninput="maqModalData.name=this.value" placeholder="Ex: Cielo, PagBank..."></div>
        <div class="field"><label>Cor</label><input type="color" value="${f.color||'#f97316'}" oninput="maqModalData.color=this.value" style="height:36px;padding:2px 4px;cursor:pointer"></div>
        <div style="display:flex;align-items:flex-end;padding-bottom:2px"><div style="width:44px;height:28px;border-radius:6px;background:${f.color};display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:12px">${(f.name||'').slice(0,2).toUpperCase()||'??'}</div></div>
      </div>
      <div style="background:var(--sf3);border-radius:8px;border:1px solid var(--bd);padding:12px">
        <div style="display:grid;grid-template-columns:40px 1fr 1fr;gap:6px;margin-bottom:8px">
          <div style="font-size:9px;color:var(--txd);text-transform:uppercase;letter-spacing:1px">Parc.</div>
          <div style="font-size:9px;color:var(--bl);text-transform:uppercase;letter-spacing:1px;text-align:center">Presencial %</div>
          <div style="font-size:9px;color:var(--or);text-transform:uppercase;letter-spacing:1px;text-align:center">Link / Online %</div>
        </div>
        <div style="max-height:380px;overflow-y:auto">${ratesHTML}</div>
      </div>
      <div style="padding:8px 12px;background:var(--ordim);border:1px solid var(--bdb);border-radius:7px;font-size:11px;color:var(--txm)">
        💡 Configure as taxas de cada parcela para presencial (maquininha física) e link de pagamento (cobrado online). Deixe 0% para desativar a parcela.
      </div>
    </div>
    <div class="mf">
      <button class="btn bg2" onclick="document.getElementById('maq-modal-overlay').remove();maqModalData=null">Cancelar</button>
      <button class="btn bd2" onclick="deleteMaqConfirm('${f.id}')" style="${isEdit?'':'display:none'}">Excluir</button>
      <button class="btn bp" onclick="saveMaqModal()">Salvar</button>
    </div>
  </div>`;
}

function deleteMaqConfirm(id){
  if(!confirm('Remover esta maquininha?'))return;
  state.maqs=state.maqs.filter(m=>m.id!==id);
  save('maqs');
  document.getElementById('maq-modal-overlay').remove();
  maqModalData=null;
  render();
}

function saveMaqModal(){
  if(!maqModalData||!maqModalData.name)return alert('Informe o nome.');
  const exists = state.maqs.find(m=>m.id===maqModalData.id);
  if(exists){state.maqs=state.maqs.map(m=>m.id===maqModalData.id?maqModalData:m);}
  else{state.maqs=[...state.maqs,maqModalData];}
  save('maqs');
  document.getElementById('maq-modal-overlay').remove();
  maqModalData=null;
  render();
}
</script>
