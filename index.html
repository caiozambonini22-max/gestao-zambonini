<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestao Zambonini</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d0d;--sf:#141414;--sf2:#1c1c1c;--sf3:#242424;--sf4:#2e2e2e;--bd:rgba(255,255,255,.07);--bdb:rgba(249,115,22,.4);--or:#f97316;--orl:#fb923c;--ordim:rgba(249,115,22,.1);--ordim2:rgba(249,115,22,.18);--tx:#f0f0f0;--txd:#555;--txm:#888;--gr:#22c55e;--rd:#ef4444;--bl:#3b82f6;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
.app{display:flex;flex-direction:column;min-height:100vh;}
.topnav{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;height:46px;position:sticky;top:0;z-index:20;overflow-x:auto;gap:0;}
.logo{font-weight:800;font-size:15px;color:var(--or);margin-right:16px;white-space:nowrap;letter-spacing:1px;}
.ni{padding:0 12px;height:46px;display:flex;align-items:center;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;border:none;background:transparent;}
.ni:hover{color:var(--tx);}.ni.active{color:var(--or);border-bottom-color:var(--or);}
.topnav-r{margin-left:auto;display:flex;align-items:center;gap:10px;padding-left:16px;flex-shrink:0;}
.main{flex:1;padding:20px 24px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;}
.ct{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txd);margin-bottom:8px;font-weight:600;}
.cv{font-size:22px;font-weight:700;}.cs{font-size:11px;color:var(--txm);margin-top:4px;}
.cv-or{color:var(--or);}.cv-gr{color:var(--gr);}.cv-rd{color:var(--rd);}.cv-bl{color:var(--bl);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:9px 12px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd);border-bottom:1px solid var(--bd);font-weight:500;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr.cr:hover td{background:rgba(249,115,22,.05);cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.b-or{background:rgba(249,115,22,.15);color:var(--or);}
.b-gr{background:rgba(34,197,94,.12);color:var(--gr);}
.b-bl{background:rgba(59,130,246,.12);color:var(--bl);}
.b-rd{background:rgba(239,68,68,.12);color:var(--rd);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;}
.bp{background:var(--or);color:#fff;}.bp:hover{background:var(--orl);}
.bg2{background:transparent;color:var(--txm);border:1px solid var(--bd);}.bg2:hover{border-color:var(--or);color:var(--or);}
.bd2{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2);}
.bgr2{background:rgba(34,197,94,.1);color:var(--gr);border:1px solid rgba(34,197,94,.2);}
.sm{padding:4px 10px;font-size:11px;}
.fg{display:grid;gap:10px;}.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
label{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--txm);text-transform:uppercase;}
input,select,textarea{background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:8px 11px;color:var(--tx);font-family:inherit;font-size:12px;outline:none;transition:border-color .15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--or);}
select option{background:var(--sf2);}
.ip{position:relative;}
.ips{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txd);font-size:12px;pointer-events:none;}
.ip input{padding-left:24px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--sf);border:1px solid var(--bdb);border-radius:12px;padding:24px;max-width:100%;max-height:94vh;overflow-y:auto;}
.modal-sm{width:560px;}.modal-md{width:760px;}.modal-xl{width:980px;}
.mt2{font-size:18px;font-weight:700;margin-bottom:16px;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--bd);}
.divider{height:1px;background:var(--bd);margin:10px 0;}
.sl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:8px;font-weight:700;}
.empty{text-align:center;padding:40px 20px;color:var(--txd);}
.empty-ic{font-size:32px;margin-bottom:10px;opacity:.3;}
.sbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;padding:10px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;}
.spill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bd);color:var(--txm);transition:all .15s;background:transparent;}
.spill:hover{border-color:var(--or);color:var(--tx);}
.spill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.spill .cnt{font-size:9px;background:rgba(0,0,0,.3);padding:1px 5px;border-radius:10px;}
.fbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.tfoot{display:flex;justify-content:flex-end;gap:20px;padding:10px 12px;border-top:1px solid var(--bdb);background:var(--sf2);font-size:12px;}
.tfoot .tfl{color:var(--txd);}.tfoot .tfv{font-weight:700;color:var(--or);font-size:15px;}
.pf{display:flex;gap:6px;align-items:center;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:16px;flex-wrap:wrap;}
.ptab{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);color:var(--txm);background:transparent;transition:all .15s;}
.ptab.active{background:var(--or);color:#fff;border-color:var(--or);}
.hbar{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.hbar-lbl{font-size:11px;color:var(--txm);width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.hbar-bg{flex:1;background:var(--sf3);border-radius:3px;height:8px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:3px;background:var(--or);}
.hbar-val{font-size:11px;font-weight:600;color:var(--or);width:75px;text-align:right;flex-shrink:0;}
.np-wrap{display:grid;grid-template-columns:320px 1fr;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.np-left{background:var(--sf2);border-right:1px solid var(--bd);padding:18px;}
.np-right{padding:18px;overflow-y:auto;max-height:72vh;}
.wa-box{background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:10px;margin-bottom:10px;}
.wa-box textarea{background:transparent;border:none;resize:vertical;font-family:monospace;font-size:11px;color:var(--tx);width:100%;outline:none;}
.parse-btn{background:var(--or);color:#fff;border:none;border-radius:7px;padding:10px;width:100%;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.parse-btn:hover{background:var(--orl);}.parse-btn:disabled{opacity:.5;cursor:not-allowed;}
.nbadge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;background:var(--or);color:#fff;margin-left:8px;}
.ck-r{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);margin-bottom:5px;}
.ck-r.on{background:var(--ordim2);border-color:rgba(249,115,22,.4);}
.ck-b{width:16px;height:16px;border-radius:3px;background:var(--sf3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:#fff;font-weight:700;}
.ck-b.on{background:var(--or);border-color:var(--or);}
.ig-top{height:3px;background:linear-gradient(to right,#833ab4,#fd1d1d,#f97316);border-radius:8px 8px 0 0;margin:-16px -16px 12px;}
.roas-row{background:var(--sf3);border-radius:6px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.vl-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);}
.vl-num{width:22px;height:22px;border-radius:5px;background:var(--or);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ads-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--gr);font-size:10px;font-weight:600;}
.ads-dot{width:6px;height:6px;border-radius:50%;background:var(--gr);}
.s-ok{color:var(--gr);font-weight:600;}.s-low{color:#f59e0b;font-weight:600;}.s-zero{color:var(--rd);font-weight:600;}
.onum{font-size:13px;font-weight:700;color:var(--or);}
.pay-row{background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px;display:grid;gap:8px;grid-template-columns:100px 140px 90px 160px 1fr auto;align-items:end;margin-bottom:7px;}
.mtabs{display:flex;border:1px solid var(--bd);border-radius:6px;overflow:hidden;}
.mtab{flex:1;padding:6px 0;text-align:center;font-size:11px;font-weight:600;cursor:pointer;color:var(--txm);background:transparent;border:none;}
.mtab-p{background:var(--bl);color:#fff;}.mtab-l{background:var(--or);color:#fff;}
.dre-t{width:100%;border-collapse:collapse;}
.dre-t tr td{padding:8px 14px;font-size:12px;border-bottom:1px solid var(--bd);}
.dre-t tr:last-child td{border-bottom:none;}
.dre-g{background:var(--sf2);}.dre-g td{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);font-weight:700;}
.dre-i td:first-child{padding-left:24px;color:var(--txm);}
.dre-t2{background:var(--sf3);}.dre-t2 td{font-weight:700;font-size:13px;}
.dre-hl{background:rgba(249,115,22,.08)!important;}.dre-hl td{font-size:14px!important;}
.tf2{background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.cp-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:3px 9px;font-size:10px;cursor:pointer;color:var(--txd);}
.cp-btn:hover{border-color:var(--or);color:var(--or);}
.su-c{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);display:inline-block;}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite;}
.sync-dot.error{background:var(--rd);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
#loading-screen{position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
#loading-screen .logo-l{font-size:28px;font-weight:800;color:#f97316;letter-spacing:2px;}
#loading-screen .sub-l{font-size:12px;color:#555;}

.login-screen{position:fixed;inset:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:var(--sf);border:1px solid var(--bdb);border-radius:16px;padding:40px;width:380px;text-align:center;}
.login-logo{font-size:22px;font-weight:800;color:var(--or);letter-spacing:2px;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--txd);margin-bottom:32px;letter-spacing:1px;}
.login-field{text-align:left;margin-bottom:14px;}
.login-field label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--txm);text-transform:uppercase;display:block;margin-bottom:5px;}
.login-field input{width:100%;background:var(--sf3);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.login-field input:focus{border-color:var(--or);}
.login-btn{width:100%;background:var(--or);color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s;}
.login-btn:hover{background:var(--orl);}
.login-err{color:var(--rd);font-size:12px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo-l">GESTAO ZAMBONINI</div>
  <div class="sub-l" id="loading-msg">Iniciando...</div>
</div>

<div class="app" id="app" style="display:none;">
  <nav class="topnav">
    <div class="logo">⚡ GESTAO ZAMBONINI</div>
    <button class="ni active" onclick="setTab('dashboard')" id="nav-dashboard">Dashboard</button>
    <button class="ni" onclick="setTab('pedidos')" id="nav-pedidos">Pedidos</button>
    <button class="ni" onclick="setTab('notas')" id="nav-notas">Notas Fiscais</button>
    <button class="ni" onclick="setTab('estoque')" id="nav-estoque">Estoque <span id="stock-badge" style="display:none;margin-left:4px;background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;"></span></button>
    <button class="ni" onclick="setTab('fornecedores')" id="nav-fornecedores">Fornecedores</button>
    <button class="ni" onclick="setTab('produtos')" id="nav-produtos">Produtos</button>
    <button class="ni" onclick="setTab('rankings')" id="nav-rankings">📊 Rankings</button>
    <button class="ni" onclick="setTab('dre')" id="nav-dre">DRE</button>
    <button class="ni" onclick="setTab('cadastros')" id="nav-cadastros">👥 Cadastros</button>
    <button class="ni" onclick="setTab('metricas')" id="nav-metricas">📊 Metricas</button>
    <button class="ni" onclick="setTab('config')" id="nav-config">Config</button>
    <div class="topnav-r">
      <button class="btn bg2 sm" onclick="forcSync()" title="Forçar sincronização com Supabase" style="font-size:11px;padding:4px 10px">🔄 Sincronizar</button>
      <button class="btn bg2 sm" onclick="document.getElementById('import-input').click()" title="Importar backup" style="font-size:11px;padding:4px 10px">📂 Importar</button>
      <input id="import-input" type="file" accept=".json" style="display:none" onchange="importBackup(this)">
      <button class="btn bg2 sm" onclick="logout()" style="font-size:11px;padding:4px 10px">Sair</button>
      <span id="sync-status" style="font-size:11px;color:var(--txd);display:flex;align-items:center;gap:5px;"><span class="sync-dot" id="sync-dot"></span><span id="sync-txt">Sincronizado</span></span>
    </div>
  </nav>
  <main class="main" id="main-content"></main>
</div>

<script>
// ============ CONFIG SUPABASE ============
const SUPA_URL = 'https://oxtxvfzeowonjsgxkcsn.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94dHh2Znplb3dvbmpzZ3hrY3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODYwMDUsImV4cCI6MjA5MDk2MjAwNX0.oLYb0w3VKRptmmgp7bIONOi2g8A20uAzNs0tz9cYdqE';
// ========================================

const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// ============ CONSTANTS ============
function buildRates(b,s1,s2,s3,lb,ls1,ls2,ls3){const r={presencial:{},link:{}};for(let i=1;i<=18;i++){if(i===1){r.presencial[i]=b;r.link[i]=lb;}else if(i<=6){r.presencial[i]=+(b+s1*(i-1)).toFixed(2);r.link[i]=+(lb+ls1*(i-1)).toFixed(2);}else if(i<=12){r.presencial[i]=+(b+s1*5+s2*(i-6)).toFixed(2);r.link[i]=+(lb+ls1*5+ls2*(i-6)).toFixed(2);}else{r.presencial[i]=+(b+s1*5+s2*6+s3*(i-12)).toFixed(2);r.link[i]=+(lb+ls1*5+ls2*6+ls3*(i-12)).toFixed(2);}}return r;}

const DEF_MAQ=[{id:'cielo',name:'Cielo',color:'#0051A5',rates:buildRates(2.99,.30,.20,.10,3.49,.32,.22,.12)},{id:'infinitepay',name:'Infinite Pay',color:'#00B4A2',rates:buildRates(2.49,.28,.18,.09,2.99,.30,.20,.10)},{id:'mercadopago',name:'Mercado Pago',color:'#009EE3',rates:buildRates(2.89,.29,.19,.10,3.39,.31,.21,.11)},{id:'pagbank',name:'PagBank',color:'#F5A800',rates:buildRates(2.99,.30,.20,.10,3.49,.32,.22,.12)}];
const DEF_CH=[{id:'instagram',label:'Instagram'},{id:'whatsapp',label:'WhatsApp'},{id:'loja',label:'Loja Fisica'},{id:'site',label:'Site'},{id:'outro',label:'Outro'}];
const OS=[{id:'em_aberto',label:'Em Aberto',c:'#f97316'},{id:'aprovado',label:'Aprovado',c:'#22c55e'},{id:'preparando',label:'Preparando',c:'#3b82f6'},{id:'faturado',label:'Faturado',c:'#8b5cf6'},{id:'pronto',label:'Pronto Envio',c:'#f59e0b'},{id:'enviado',label:'Enviado',c:'#06b6d4'},{id:'entregue',label:'Entregue',c:'#22c55e'},{id:'cancelado',label:'Cancelado',c:'#ef4444'}];
const NS=[{id:'pendente',label:'Pendente',c:'#f97316'},{id:'emitida',label:'Emitida',c:'#22c55e'},{id:'cancelada',label:'Cancelada',c:'#ef4444'},{id:'denegada',label:'Denegada',c:'#8b5cf6'}];
const DLV=[{id:'retirada',label:'Retirada',icon:'🏪'},{id:'sedex',label:'SEDEX',icon:'📦'},{id:'sedex10',label:'SEDEX 10',icon:'📦'},{id:'pac',label:'PAC',icon:'📬'},{id:'pac_mini',label:'PAC Mini',icon:'📬'},{id:'motoboy',label:'Motoboy',icon:'🛵'},{id:'jadlog',label:'Jadlog',icon:'🚚'},{id:'transportadora',label:'Transportadora',icon:'🚛'},{id:'outro',label:'Outro',icon:'📮'}];

// ============ STATE ============
let state = {
  tab: 'dashboard',
  prods: [], orders: [], maqs: JSON.parse(JSON.stringify(DEF_MAQ)),
  channels: JSON.parse(JSON.stringify(DEF_CH)), nfs: [], stock: [],
  suppliers: [], purchaseOrders: [], orderSeq: 1001,
  deliveryCities: [], motoboys: [], clients: [],
  categories: [], fretes: [],
  config: {gastoAnuncios:'',igFollowers:'',igF7:'',igF30:'',valores:['Venda e Energia!','Atendimento Humanizado!','Foco no Cliente!','Quanto mais voce posta, mais voce vende!','Simples e bem feito resolve!']}
};
let saveTimers = {};
let currentTab = 'dashboard';

// ============ UTILS ============
const fmtBRL = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtPct = v => Number(v||0).toFixed(2)+'%';
const uid = () => Math.random().toString(36).slice(2,10);
// Data local (YYYY-MM-DD) no fuso do browser — nunca usa UTC direto
function localDate(offsetDays){const d=new Date();if(offsetDays)d.setDate(d.getDate()+offsetDays);return d.toLocaleDateString('fr-CA');}
const localToday=()=>localDate(0);
const stInfo = id => OS.find(s=>s.id===id)||OS[0];
const nfInfo = id => NS.find(s=>s.id===id)||NS[0];
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function payFee(pay,maqs,fallbackBase){
  if(!pay||pay.type==='dinheiro'||pay.type==='pix')return 0;
  const m=maqs.find(x=>x.id===pay.maquininhaId);if(!m)return 0;
  const md=pay.mode||'presencial';const inst=Number(pay.installments||1);
  // Se valor não preenchido, usa base de fallback (total do pedido) — útil quando há só uma forma de pagamento
  const base=Number(pay.amount||0)>0?Number(pay.amount):Number(fallbackBase||0);
  return(base*(m.rates[md]&&m.rates[md][inst]?m.rates[md][inst]:0))/100;
}
// Soma taxas de todas as formas. Fallback (total do pedido) só é aplicado quando há UMA única forma
// de pagamento — em pagamento misto, cada forma precisa do valor preenchido para a divisão ser correta.
function sumFees(payments,maqs,orderTotal){
  const ps=payments||[];
  const fb=ps.length===1?orderTotal:0;
  return ps.reduce((a,p)=>a+payFee(p,maqs,fb),0);
}
function getCost(prod,si){if(!prod)return 0;if(prod.costMode==='avg'&&si&&Number(si.avgCost)>0)return Number(si.avgCost);return Number(prod.costPrice||0);}
function calcM(order){
  if(!order)return{fee:0,rev:0,profit:0,roi:0,mot:0,cor:0,upsell:0,cost:0};
  const mot=Number(order.motoboyCost||0)+Number(order.fuelCost||0)+Number(order.tollCost||0);const cor=Number(order.correiosCost||0);
  const upsell=(order.upsells||[]).reduce((s,u)=>s+Number(u.price||0),0);

  // Soma todos os itens (inclui brindes no custo, exclui na receita)
  const items=order.items&&order.items.length>0?order.items:[{productId:order.productId,quantity:order.quantity||1,salePrice:order.salePrice||0,isGift:false}];
  // Receita = itens vendidos + upsell + frete cobrado do cliente − desconto
  const freteClient=Number(order.freteClient||0);
  const rev=items.reduce((a,it)=>it.isGift?a:a+Number(it.salePrice||0)*Number(it.quantity||1),0)+upsell+freteClient-Number(order.discount||0);
  const cost=items.reduce((a,it)=>{const p=state.prods.find(x=>x.id===it.productId);const si=state.stock.find(s=>s.productId===it.productId);return a+getCost(p,si)*Number(it.quantity||1);},0);
  // Custo dos upsells: puxa do produto cadastrado (dinâmico)
  const upsellCost=(order.upsells||[]).reduce((a,u)=>{
    const p=state.prods.find(x=>x.id===u.productId);
    const si=state.stock?state.stock.find(s=>s.productId===u.productId):null;
    return a+getCost(p,si)*Number(u.quantity||1);
  },0);

  // Taxa de maquininha: base de fallback é a receita do pedido (quando há só uma forma de pagamento)
  const fee=sumFees(order.payments,state.maqs,rev);

  const total=cost+upsellCost+mot+cor+fee;
  const profit=rev-total;const roi=total>0?(profit/total)*100:0;
  return{fee,rev,profit,roi,mot,cor,upsell,cost,upsellCost,freteClient};
}
function calcAvg(cq,ca,aq,ac){const t=cq+aq;return t>0?((cq*ca)+(aq*ac))/t:0;}

async function dbGet(key){
  try{
    const {data,error}=await sb.from('zambonini_data').select('value').eq('key',key).single();
    if(error||!data)return null;
    return data.value;
  }catch{return null;}
}

async function dbSet(key,value){
  // Limita dados grandes antes de salvar
  let dataToSave=value;
  if(key==='config'&&value&&value.adsData){
    // Mantém só últimos 30 dias de followersByDay
    dataToSave={...value,adsData:{...value.adsData,followersByDay:(value.adsData.followersByDay||[]).slice(-30)}};
  }
  // Tenta 2 vezes com intervalo (Supabase às vezes está dormindo)
  for(let attempt=0;attempt<2;attempt++){
    try{
      const {error}=await sb.from('zambonini_data').upsert(
        {key, value:dataToSave, updated_at:new Date().toISOString()},
        {onConflict:'key'}
      );
      if(!error)return true;
      console.warn('Supabase save error:',error.message,error.code);
      if(attempt===0)await new Promise(r=>setTimeout(r,3000)); // aguarda 3s e tenta de novo
    }catch(e){
      if(attempt===0)await new Promise(r=>setTimeout(r,3000));
    }
  }
  return false;
}

const _saveStatus={};
function save(key){
  // 1. Salva no localStorage IMEDIATAMENTE
  try{
    localStorage.setItem('zb_cache_'+key, JSON.stringify(state[key]));
    localStorage.setItem('zb_save_time', new Date().toISOString());
  }catch{}

  // 2. Sincroniza com Supabase em background
  setSyncStatus('syncing');
  clearTimeout(saveTimers[key]);
  saveTimers[key]=setTimeout(async()=>{
    const ok=await dbSet(key, state[key]);
    _saveStatus[key]=ok;
    const anyFail=Object.values(_saveStatus).some(v=>v===false);
    if(anyFail)setSyncStatus('error');
    else setSyncStatus('ok');
  }, 800);
}

async function retrySyncAll(){
  setSyncStatus('syncing');
  const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients','categories','fretes'];
  let allOk=true;
  for(const k of keys){
    const ok=await dbSet(k,state[k]);
    if(!ok)allOk=false;
  }
  setSyncStatus(allOk?'ok':'error');
  if(allOk)showToast('✅ Sincronizado com a nuvem!','gr');
}

async function buscarCEP(cep, callback, onError){
  const c=(cep||'').replace(/\D/g,'');
  if(c.length!==8){if(onError)onError({reason:'formato',cep:c,msg:'CEP deve ter 8 dígitos'});return;}
  try{
    const r=await fetch('https://viacep.com.br/ws/'+c+'/json/');
    const d=await r.json();
    if(d.erro){if(onError)onError({reason:'inexistente',cep:c,msg:'CEP não existe nos Correios'});return;}
    callback({street:d.logradouro||'',bairro:d.bairro||'',city:d.localidade||'',state:d.uf||'',cep:c});
  }catch(e){if(onError)onError({reason:'erro_rede',cep:c,msg:'Não foi possível validar (sem internet?)'});}
}

async function loadAll(){
  document.getElementById('loading-msg').textContent='Carregando dados...';
  setTimeout(()=>{
    const el=document.getElementById('loading-msg');
    if(el&&document.getElementById('loading-screen').style.display!=='none'){
      el.textContent='Conectando ao servidor... (pode levar até 30s na primeira vez)';
    }
  }, 4000);
  const keys=['prods','orders','maqs','channels','nfs','stock','suppliers','purchaseOrders','orderSeq','deliveryCities','config','motoboys','clients','categories','fretes'];

  // ── PASSO 1: Carrega localStorage IMEDIATAMENTE (fonte primária) ──
  keys.forEach(k=>{
    try{
      const cached=localStorage.getItem('zb_cache_'+k);
      if(cached){
        const v=JSON.parse(cached);
        if(k==='maqs'){
          state[k]=v.map(m=>{
            if(m.rates&&!m.rates.presencial){const p={},l={};for(let i=1;i<=18;i++){p[i]=m.rates[i]||0;l[i]=0;}return {...m,rates:{presencial:p,link:l}};}
            return m;
          });
        }else if(Array.isArray(v)){
          // Remove entradas null/inválidas que poderiam quebrar o render (ex: pedido corrompido)
          state[k]=v.filter(x=>x!==null&&x!==undefined&&typeof x==='object');
        }else{state[k]=v;}
      }
    }catch{}
  });

  // Mostra o app com dados locais imediatamente
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  render();

  // ── PASSO 2: Sincroniza com Supabase em background ──
  // REGRA: só sobrescreve se Supabase tiver MAIS dados (ex: mais pedidos)
  // Nunca sobrescreve dados locais com dados vazios do Supabase
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),30000));
    const fetchAll=Promise.all(keys.map(async k=>{
      const v=await dbGet(k);
      return {k,v};
    }));
    const results=await Promise.race([fetchAll,timeout]);
    let updated=false;
    results.forEach(({k,v})=>{
      if(v===null||v===undefined)return;
      // Supabase é a fonte de verdade — mas só sobrescreve se tiver dados
      // Para arrays: só usa Supabase se retornou algo (array não vazio ou igual ao local)
      const local=state[k];
      const supEmpty=Array.isArray(v)&&v.length===0&&Array.isArray(local)&&local.length>0;
      if(supEmpty){
        // Supabase está vazio mas local tem dados — faz upload pro Supabase (recuperação)
        dbSet(k,state[k]);
        return;
      }
      if(k==='maqs'){state[k]=v.map(m=>{if(m.rates&&!m.rates.presencial){const p={},l={};for(let i=1;i<=18;i++){p[i]=m.rates[i]||0;l[i]=0;}return {...m,rates:{presencial:p,link:l}};}return m;});}
      else if(Array.isArray(v)){state[k]=v.filter(x=>x!==null&&x!==undefined&&typeof x==='object');}
      else{state[k]=v;}
      try{localStorage.setItem('zb_cache_'+k,JSON.stringify(state[k]));}catch{}
      updated=true;
    });
    if(updated)render();
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
  }
  // Garante snapshot diário de seguidores + agenda captura à meia-noite
  try{if(typeof scheduleFollowerSnapshot==='function')scheduleFollowerSnapshot();}catch(e){console.warn('scheduleFollowerSnapshot:',e);}
}

  const topCities=Object.entries(cityMap).sort((a,b)=>b[1].rev-a[1].rev).slice(0,15);
  const maxCR=topCities.length>0?topCities[0][1].rev:1;
  const chStats=state.channels.map(c=>{
    const co=filtered.filter(o=>o.channel===c.id);
    const rev=co.reduce((a,o)=>a+calcM(o).rev,0);
    return {...c,count:co.length,rev};
  }).filter(c=>c.count>0).sort((a,b)=>b.rev-a.rev);
  const todayStr0=localDate(0);
  const _isCurMonth=dashMonth===new Date().getMonth()&&dashYear===new Date().getFullYear();
  const adPeriodSpend=state.config.adsData?(dashPeriod==='day'&&dashDay===todayStr0?Number(state.config.adsData.today||0):(dashPeriod==='month'&&_isCurMonth?Number(state.config.adsData.month||0):0)):0;
  const ads=adPeriodSpend>0?adPeriodSpend:Number(state.config.gastoAnuncios||0);
  // ── Custo de aquisição: quanto de anúncio para gerar uma venda (CAC) ──
  // Só é confiável quando há gasto de anúncio válido para o período (hoje / mês atual).
  const adSpendValid=(dashPeriod==='day'&&dashDay===todayStr0)||(dashPeriod==='month'&&_isCurMonth);
  const adSpendForCac=adSpendValid?ads:0;
  const cacPorVenda=(adSpendValid&&filtered.length>0&&adSpendForCac>0)?(adSpendForCac/filtered.length):null;
  // Custo total do período: produtos + brindes + upsells + fretes + taxas (tudo que sai do caixa)
  const custoOperacional=allM.reduce((a,m)=>a+m.cost+(m.upsellCost||0)+m.mot+m.cor+m.fee,0);
  // Custo cheio total inclui também anúncio (quando válido)
  const custoCheioTotal=custoOperacional+adSpendForCac;
  const custoCheioPorVenda=filtered.length>0?(custoCheioTotal/filtered.length):0;
  const roas=ads>0?(totalRev/ads).toFixed(1):0;
  const igF=Number(state.config.igFollowers||0);
  const igF7=Number(state.config.igF7||0);
  const igF30=Number(state.config.igF30||0);
  const valores=state.config.valores||[];
  const presOrders=filtered.filter(o=>o.isPresencial);
  const periodLabel=dashPeriod==='day'?(dashDay===localDate(0)?'hoje':dashDay===localDate(-1)?'ontem':dashDay):dashPeriod==='week'?'últimos 7 dias':dashPeriod==='month'?MESES[dashMonth]+' '+dashYear:String(dashYear);
  const years=Array.from({length:81},(_,i)=>new Date().getFullYear()-5+i);

  // Seguidores por período
  if(!window._igPeriod)window._igPeriod='hoje';
  if(!window._igCustomDate)window._igCustomDate=localDate(0);
  if(!window._igCustomDe)window._igCustomDe=localDate(-7);
  if(!window._igCustomAte)window._igCustomAte=localDate(0);
  const fbd=(state.config.adsData&&state.config.adsData.followersByDay)||[];
  // Datas no fuso local (Brasília)
  const todayStr=localDate(0);
  const yesterdayStr=localDate(-1);
  function igDelta(dateStr){const d=fbd.find(x=>x.date===dateStr);return d?Number(d.delta||0):0;}
  // ── CÁLCULO UNIFICADO DE GANHO DE SEGUIDORES ──
  // Tudo deriva de igHistory [{date, count}] — a fonte de verdade.
  // Ganho num período = count mais recente − count do registro de referência (início do período).
  const _igHist=(state.config.igHistory||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  function igCountOn(dateStr){
    // Count registrado EM dateStr (exato). null se não houver snapshot nesse dia.
    const e=_igHist.find(x=>x.date===dateStr);
    return e?Number(e.count):null;
  }
  function igCountAsOf(dateStr){
    // Último count conhecido ATÉ dateStr (inclusive) — preenche lacunas de dias não sincronizados.
    let val=null;
    for(const e of _igHist){if(e.date<=dateStr)val=Number(e.count);else break;}
    return val;
  }
  const igLatest=_igHist.length?Number(_igHist[_igHist.length-1].count):0;
  // Ganho "Hoje" = count atual − count de ONTEM (registro de ontem, ou último antes de hoje)
  function igGainToday(){
    if(_igHist.length<2)return null; // sem base de comparação
    const ref=igCountAsOf(localDate(-1)); // count no fim de ontem
    if(ref===null)return null;
    return igLatest-ref;
  }
  // Ganho "Ontem" = count do fim de ontem − count do fim de anteontem
  function igGainYesterday(){
    const end=igCountAsOf(localDate(-1));
    const start=igCountAsOf(localDate(-2));
    if(end===null||start===null)return null;
    return end-start;
  }
  // Ganho nos últimos N dias = count atual − count de N dias atrás
  function igGainRange(n){
    if(_igHist.length<2)return null;
    const ref=igCountAsOf(localDate(-n));
    if(ref===null)return null;
    return igLatest-ref;
  }
  // Ganho num dia específico (custom) = count desse dia − count do dia anterior
  function igGainOn(dateStr){
    const end=igCountAsOf(dateStr);
    const prev=localDate(0)===dateStr?localDate(-1):(()=>{const d=new Date(dateStr+'T12:00:00');d.setDate(d.getDate()-1);return d.toLocaleDateString('fr-CA');})();
    const start=igCountAsOf(prev);
    if(end===null||start===null)return null;
    return end-start;
  }
  // Ganho numa FAIXA personalizada [de, até] = count em 'até' − count no dia anterior a 'de'.
  // Se de===até, equivale ao ganho de um único dia.
  function igGainBetween(deStr,ateStr){
    if(!deStr||!ateStr)return null;
    if(deStr>ateStr){const t=deStr;deStr=ateStr;ateStr=t;}
    const dayBeforeDe=(()=>{const d=new Date(deStr+'T12:00:00');d.setDate(d.getDate()-1);return d.toLocaleDateString('fr-CA');})();
    const end=igCountAsOf(ateStr);
    const start=igCountAsOf(dayBeforeDe);
    if(end===null||start===null)return null;
    return end-start;
  }
  // Série dia a dia: para cada registro, ganho = count − count do registro anterior.
  // Retorna do mais recente para o mais antigo.

function setDashPeriod(p){dashPeriod=p;render();}
// Navegação por dia (setas no modo Hoje/Ontem)
function navDay(delta){
  const d=new Date((dashDay||localDate(0))+'T12:00:00');
  d.setDate(d.getDate()+delta);
  // não deixa passar de hoje
  const todayK=localDate(0);
  const novo=d.toLocaleDateString('fr-CA');
  dashDay=novo>todayK?todayK:novo;
  dashPeriod='day';render();
}
// Atalho: ir direto para ontem
function setOntem(){dashDay=localDate(-1);dashPeriod='day';render();}
// Navegação por mês (setas no modo Este Mês)
function navMonth(delta){
  let m=dashMonth+delta,y=dashYear;
  if(m<0){m=11;y--;}else if(m>11){m=0;y++;}
  dashMonth=m;dashYear=y;dashPeriod='month';render();
}

// ============ RESUMO RÁPIDO DO DASHBOARD ============
// Abre um modal com a foto compacta do período atualmente selecionado.
function openDashSummary(){
  const filtered=getFiltered();
  const allM=filtered.map(o=>calcM(o));
  const totRev=allM.reduce((a,m)=>a+m.rev,0);
  const totProfit=allM.reduce((a,m)=>a+m.profit,0);
  const totProdCost=allM.reduce((a,m)=>a+m.cost+(m.upsellCost||0),0);
  const totFrete=allM.reduce((a,m)=>a+m.mot+m.cor,0);
  const totFee=allM.reduce((a,m)=>a+(m.fee||0),0);
  // Smartwatches vendidos (usa mesma regra do dashboard: categoria/nome)
  const catName=(catId)=>{const c=(state.categories||[]).find(x=>x.id===catId);return c?(c.name||'').toLowerCase():'';};
  const isSW=(p)=>{if(!p)return false;const n=(p.name||'').toLowerCase();const cn=catName(p.categoryId);const alvo=/(smart\s?watch|smartwatch|rel[óo]gio|watch)/;return alvo.test(cn)||alvo.test(n);};
  const swCount=filtered.reduce((tot,o)=>{
    const items=o.items&&o.items.length>0?o.items:[{productId:o.productId,quantity:o.quantity||1,isGift:false}];
    return tot+items.reduce((a,it)=>{if(it.isGift)return a;const p=state.prods.find(x=>x.id===it.productId);return isSW(p)?a+Number(it.quantity||1):a;},0);
  },0);
  // Brindes: soma do custo dos itens com isGift=true (não conta upsells)
  let totBrindes=0,brindesUn=0;
  filtered.forEach(o=>{
    const items=o.items||[];
    items.forEach(it=>{
      if(!it.isGift)return;
      const p=state.prods.find(x=>x.id===it.productId);
      const si=state.stock?state.stock.find(s=>s.productId===it.productId):null;
      const qty=Number(it.quantity||1);
      brindesUn+=qty;
      totBrindes+=getCost(p,si)*qty;
    });
  });
  // Anúncio: só vale pra Hoje ou Mês atual (limitação Meta Ads)
  const today=localDate(0);
  const _isCurMonth=dashMonth===new Date().getMonth()&&dashYear===new Date().getFullYear();
  const adValid=(dashPeriod==='day'&&dashDay===today)||(dashPeriod==='month'&&_isCurMonth);
  const adSpend=adValid?(dashPeriod==='day'?Number(state.config.adsData&&state.config.adsData.today||0):Number(state.config.adsData&&state.config.adsData.month||0)):0;
  // Custo total cheio (mesma fórmula do KPI do Dashboard)
  const custoTotal=totProdCost+totFrete+totFee+(adValid?adSpend:0);
  const custoPorVenda=filtered.length>0?(custoTotal/filtered.length):0;
  // CAC (anúncio por venda)
  const cac=(adValid&&filtered.length>0&&adSpend>0)?(adSpend/filtered.length):null;
  // Ticket médio
  const ticket=filtered.length>0?totRev/filtered.length:0;
  // Margem
  const margem=totRev>0?(totProfit/totRev)*100:0;
  const margemBruta=totRev>0?((totRev-totProdCost)/totRev)*100:0;
  // ROAS
  const roas=adValid&&adSpend>0?(totRev/adSpend):null;
  // Seguidores ganhos no período
  const _igHist=(state.config.igHistory||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  function igAsOf(d){let v=null;for(const e of _igHist){if(e.date<=d)v=Number(e.count);else break;}return v;}
  const igLatest=_igHist.length?Number(_igHist[_igHist.length-1].count):0;
  let igDelta=null,igPeriodoLabel='';
  if(_igHist.length>=2){
    if(dashPeriod==='day'){
      // Ganho do dia = count do dia − count do dia anterior
      const dPrev=(()=>{const d=new Date(dashDay+'T12:00:00');d.setDate(d.getDate()-1);return d.toLocaleDateString('fr-CA');})();
      const end=dashDay===today?igLatest:igAsOf(dashDay);
      const start=igAsOf(dPrev);
      if(end!==null&&start!==null)igDelta=end-start;
      igPeriodoLabel='no dia';
    }else if(dashPeriod==='week'){
      const ini=localDate(-6);const start=igAsOf((()=>{const d=new Date(ini+'T12:00:00');d.setDate(d.getDate()-1);return d.toLocaleDateString('fr-CA');})());
      if(start!==null)igDelta=igLatest-start;
      igPeriodoLabel='nos últimos 7 dias';
    }else if(dashPeriod==='month'){
      const ini=`${dashYear}-${String(dashMonth+1).padStart(2,'0')}-01`;
      const fim=new Date(dashYear,dashMonth+1,0).toLocaleDateString('fr-CA');
      const dPrev=(()=>{const d=new Date(ini+'T12:00:00');d.setDate(d.getDate()-1);return d.toLocaleDateString('fr-CA');})();
      const start=igAsOf(dPrev);const end=igAsOf(fim>today?today:fim);
      if(start!==null&&end!==null)igDelta=end-start;
      igPeriodoLabel='no mês';
    }else if(dashPeriod==='year'){
      const start=igAsOf(`${dashYear-1}-12-31`);const end=igAsOf(`${dashYear}-12-31`>today?today:`${dashYear}-12-31`);
      if(start!==null&&end!==null)igDelta=end-start;
      igPeriodoLabel='no ano';
    }
  }
  // Período legível
  let perLbl=periodLabelFor();
  function periodLabelFor(){
    if(dashPeriod==='day')return dashDay===today?'Hoje · '+dashDay:dashDay===localDate(-1)?'Ontem · '+dashDay:dashDay;
    if(dashPeriod==='week')return 'Esta semana (últimos 7 dias)';
    if(dashPeriod==='month')return MESES[dashMonth]+'/'+dashYear;
    if(dashPeriod==='year')return String(dashYear);
    return '';
  }
  perLbl=periodLabelFor();

  // Montagem do modal
  const old=document.querySelector('.dash-summary-overlay');if(old)old.remove();
  const ov=document.createElement('div');
  ov.className='overlay dash-summary-overlay';
  // Card grande de destaque (4 principais no topo, em grid 2x2)
  const bigCard=(emoji,label,value,color,sub)=>`<div style="background:var(--sf3);border:1px solid var(--bd);border-radius:10px;padding:14px 16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:16px">${emoji}</span><span style="font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.6px;font-weight:600">${label}</span></div>
    <div style="font-size:22px;font-weight:800;color:${color||'var(--txm)'};line-height:1.1">${value}</div>
    ${sub?`<div style="font-size:10px;color:var(--txd);margin-top:4px">${sub}</div>`:''}
  </div>`;
  // Linha compacta (secundárias)
  const smallRow=(emoji,label,value,color,sub)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bd)">
    <div style="display:flex;align-items:center;gap:8px;flex:1"><span style="font-size:14px;width:20px;text-align:center;opacity:.8">${emoji}</span><div><div style="font-size:11px;color:var(--txm)">${label}</div>${sub?`<div style="font-size:9px;color:var(--txd)">${sub}</div>`:''}</div></div>
    <div style="font-size:13px;font-weight:600;color:${color||'var(--txm)'};text-align:right;white-space:nowrap">${value}</div>
  </div>`;
  // ROAS sempre presente; mostra "—" quando inválido (mesma regra do anúncio)
  const roasDisplay=roas!==null?roas.toFixed(1)+'x':'—';
  const roasColor=roas===null?'var(--txd)':(roas>=2?'var(--gr)':roas>=1?'var(--or)':'var(--rd)');
  const roasSub=roas!==null?'cada R$1 virou '+fmtBRL(roas):'só hoje / mês atual';

  ov.innerHTML=`<div class="modal" style="max-width:680px;width:92vw">
    <div class="modal-header" style="padding-bottom:10px;border-bottom:1px solid var(--bd)">
      <div>
        <h2 style="margin:0">📋 Resumo</h2>
        <div style="font-size:12px;color:var(--or);margin-top:4px;font-weight:600">${esc(perLbl)}</div>
      </div>
      <button class="btn bg2 sm" onclick="this.closest('.overlay').remove()">×</button>
    </div>
    <div class="modal-body" style="padding:14px">
      <!-- 4 PRINCIPAIS EM DESTAQUE -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        ${bigCard('💰','Faturamento',fmtBRL(totRev),'var(--or)',filtered.length>0?filtered.length+' pedido'+(filtered.length===1?'':'s')+' · ticket '+fmtBRL(ticket):null)}
        ${bigCard('⌚','Smartwatches vendidos',swCount+' un.','#a855f7',null)}
        ${bigCard('📈','ROAS',roasDisplay,roasColor,roasSub)}
        ${bigCard('✅','Lucro líquido',fmtBRL(totProfit),totProfit>=0?'var(--gr)':'var(--rd)',fmtPct(margem)+' margem · bruta '+fmtPct(margemBruta))}
      </div>
      <!-- DETALHAMENTO MENOR -->
      <div style="background:var(--sf2);border:1px solid var(--bd);border-radius:10px;overflow:hidden">
        ${smallRow('📦','Custo dos produtos',fmtBRL(totProdCost),'var(--rd)','itens + upsells + brindes')}
        ${smallRow('🛵','Frete (custo)',fmtBRL(totFrete),'var(--rd)','motoboy + correios')}
        ${smallRow('🎁','Brindes',brindesUn>0?(fmtBRL(totBrindes)+' · '+brindesUn+' un.'):'R$ 0,00','var(--rd)','incluso no custo dos produtos')}
        ${smallRow('💳','Taxas maquininha',fmtBRL(totFee),'var(--rd)',null)}
        ${smallRow('📢','Investido em anúncios',adValid?fmtBRL(adSpend):'—','var(--bl)',adValid?(cac!==null?'CAC '+fmtBRL(cac)+' por venda':null):'só hoje / mês atual')}
        ${smallRow('💸','Custo total do período',fmtBRL(custoTotal),'var(--rd)',filtered.length>0?'média '+fmtBRL(custoPorVenda)+' por venda':null)}
        ${(dashPeriod==='day'||dashPeriod==='week'||dashPeriod==='month'||dashPeriod==='year')?smallRow('📱','Seguidores Instagram',igDelta===null?'—':((igDelta>=0?'+':'')+igDelta+' '+igPeriodoLabel),igDelta===null?'var(--txd)':igDelta>0?'var(--gr)':igDelta<0?'var(--rd)':'var(--txm)','total atual: '+(igLatest?igLatest.toLocaleString('pt-BR'):'—')):''}
      </div>
    </div>
    <div class="modal-footer"><button class="btn bp" onclick="this.closest('.overlay').remove()">Fechar</button></div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
}

function updateConfig(k,v){state.config[k]=v;save('config');render();}
function addValor(){state.config.valores=[...(state.config.valores||[]),'Novo valor...'];save('config');render();}
function removeValor(i){state.config.valores=state.config.valores.filter((_,x)=>x!==i);save('config');render();}
function updateValor(i,v){state.config.valores[i]=v;save('config');}
</script>
<script>
// ============ PEDIDOS ============
let pedidoFilter='todos', pedidoSearch='', pedidoDe='', pedidoAte='';

function renderPedidos(){
  let filtered=[...state.orders].sort((a,b)=>b.orderNum-a.orderNum);

  if(pedidoDe)filtered=filtered.filter(o=>o.date>=pedidoDe);
  if(pedidoAte)filtered=filtered.filter(o=>o.date<=pedidoAte);
  const total=filtered.reduce((a,o)=>a+calcM(o).rev,0);
  const cntBy=sid=>state.orders.filter(o=>o.status===sid).length;
  let statusBtns=`<button class="spill ${pedidoFilter==='todos'?'':''}\" style="${pedidoFilter==='todos'?'background:var(--or);border-color:var(--or);color:#fff':''}" onclick="pedidoFilter='todos';render()">Todos<span class="cnt">${state.orders.length}</span></button>`;
  OS.forEach(s=>{statusBtns+=`<button class="spill" style="${pedidoFilter===s.id?`background:${s.c};border-color:${s.c};color:#fff`:''}" onclick="pedidoFilter='${s.id}';render()"><span class="dot" style="background:${s.c}"></span>${s.label}<span class="cnt">${cntBy(s.id)}</span></button>`;});
  let rows='';
  if(filtered.length===0){rows='<tr><td colspan="11"><div class="empty"><div class="empty-ic">📋</div><p>Nenhum pedido</p></div></td></tr>';}
  else{filtered.forEach(o=>{
    const m=calcM(o);const st=stInfo(o.status);const ch=state.channels.find(c=>c.id===o.channel);const dlv=DLV.find(d=>d.id===o.deliveryMethod);
    rows+=`<tr class="cr" onclick="openEditOrder('${o.id}')">
      <td><span class="onum">#${o.orderNum}</span></td>
      <td style="color:var(--txd);font-size:11px">${o.date}</td>
      <td style="font-weight:600">${esc(o.clientName||'—')}</td>
      <td style="color:var(--txm)">${esc(o.city?o.city+(o.state?'/'+o.state:''):'—')}</td>
      <td>${ch?`<span class="badge b-bl">${esc(ch.label)}</span>`:'—'}</td>
      <td style="font-size:11px">${dlv?dlv.icon+' '+dlv.label:'—'}</td>
      <td style="font-size:11px;color:var(--txm)">${(o.payments||[]).slice(0,1).map(p=>p.type==='pix'?'PIX':p.type==='dinheiro'?'Dinheiro':'Cartao').join('')}</td>
      <td style="font-weight:700;color:var(--or)">${fmtBRL(m.rev)}</td>
      <td style="color:${m.profit>=0?'var(--gr)':'var(--rd)'};font-weight:600">${fmtBRL(m.profit)}</td>
      <td onclick="event.stopPropagation()"><select onchange="changeStatus('${o.id}',this.value)" onclick="event.stopPropagation()" style="padding:3px 6px;font-size:10px;border:1px solid ${st.c}55;color:${st.c};background:${st.c}15;width:auto;min-width:95px">${OS.map(s=>`<option value="${s.id}" ${o.status===s.id?'selected':''}>${s.label}</option>`).join('')}</select></td>
      <td onclick="event.stopPropagation()"><div style="display:flex;gap:4px"><button class="btn bp sm" style="padding:3px 8px;font-size:10px" onclick="openTinyModal('${o.id}')">NF</button><button class="btn bd2 sm" onclick="deleteOrder('${o.id}')">×</button></div></td>
    </tr>`;
  });}
  return `
  <div class="sbar">${statusBtns}</div>
  <div class="fbar" style="flex-wrap:wrap;gap:6px">
    <input placeholder="Buscar..." value="${esc(pedidoSearch)}" oninput="pedidoSearch=this.value;render()" style="flex:1;min-width:160px;max-width:280px">
    <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
      ${(()=>{
        const _tz=new Date().getTimezoneOffset()*60000;
        function _bd(n){return new Date(Date.now()-_tz+n*86400000).toISOString().slice(0,10);}
        const today=_bd(0),yest=_bd(-1),w0=_bd(-6),m0=_bd(-29);
        const mon=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
        const wStart=(()=>{const d=new Date(Date.now()-_tz);d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10);})();
        const f15=_bd(-14);
        const presets=[
          ['Hoje',today,today],['Ontem',yest,yest],
          ['7 dias',w0,today],['15 dias',f15,today],
          ['Semana',wStart,today],['Mês',mon,today]
        ];
        return presets.map(([l,de,ate])=>{
          const active=pedidoDe===de&&pedidoAte===ate;
          return `<button onclick="pedidoDe='${de}';pedidoAte='${ate}';render()" style="padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid ${active?'var(--or)':'var(--bd)'};background:${active?'var(--or)':'transparent'};color:${active?'#fff':'var(--txm)'}">${l}</button>`;
        }).join('');
      })()}
    </div>
    <div style="display:flex;gap:4px;align-items:center">
      <input type="date" value="${pedidoDe}" onchange="pedidoDe=this.value;render()" style="width:130px">
      <span style="color:var(--txd);font-size:11px">até</span>
      <input type="date" value="${pedidoAte}" onchange="pedidoAte=this.value;render()" style="width:130px">
      ${pedidoSearch||pedidoDe||pedidoAte?`<button class="btn bg2 sm" onclick="pedidoSearch='';pedidoDe='';pedidoAte='';render()">×</button>`:''}
    </div>
    <button class="btn bp" style="margin-left:auto" onclick="openNewOrder()">+ Novo Pedido</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="tw"><table><thead><tr><th>N</th><th>Data</th><th>Cliente</th><th>Cidade</th><th>Canal</th><th>Envio</th><th>Pgto</th><th>Total</th><th>Lucro</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>

  </div>`;
}

function renderItemsList(o){
  const items=o.items&&o.items.length>0?o.items:[{id:'main',productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||'',isGift:false}];
  let html='';
  items.forEach(function(item,idx){
    const selProd=state.prods.find(p=>p.id===item.productId);
    const selStock=selProd?getStockForProd(selProd):null;
    const hasVars=selStock&&selStock.variations&&selStock.variations.length>0;

    let allProdOpts='<option value="">-- Selecione --</option>';
    state.prods.forEach(function(p){allProdOpts+='<option value="'+p.id+'"'+(item.productId===p.id?' selected':'')+'>'+esc(p.name)+'</option>';});

    let varOpts='';

      varOpts='<option value="">— Cor/Tamanho —</option>';

        const qty=Number(v.quantity||0);
        varOpts+='<option value="'+v.id+'"'+(item.variacaoId===v.id?' selected':'')+' '+(qty===0?'style="color:#ef4444"':'')+'>'+esc(v.name)+' ('+qty+' un.)</option>';

    }

    html+='<div data-item-idx="'+idx+'" style="display:grid;grid-template-columns:'+cols+';gap:7px;align-items:end;padding:10px;background:'+bg+';border-radius:8px;border:1px solid '+border+';margin-bottom:7px">';
    const ssOpts=[{v:'',l:''},...state.prods.map(p=>({v:p.id,l:p.name}))];
    const onProdSelect=`setItemField(${idx},'productId',__VAL__);setItemField(${idx},'variacaoId','');const _sp=state.prods.find(p=>p.id===__VAL__);if(_sp)setItemField(${idx},'salePrice',_sp.salePrice);updateOrderSummary();document.getElementById('order-items-list').innerHTML=renderItemsList(orderModalData);`;

    html+='<div class="field"><label>'+lbl+'</label>'+makeSearchSelect('item-prod-'+idx,item.productId,ssOpts,onProdSelect)+'</div>';
    if(hasVars){
      html+='<div class="field"><label>Variação</label><select onchange="setItemField('+idx+',\'variacaoId\',this.value)">'+varOpts+'</select></div>';
    }
    html+='<div class="field"><label>Qtd</label><input class="item-qty" type="number" min="1" value="'+(item.quantity||1)+'" oninput="setItemField('+idx+',\'quantity\',Number(this.value));updateOrderSummary()"></div>';
    html+='<div class="field"><label>'+valorLbl+'</label><div class="ip"><span class="ips">R$</span><input class="item-val" type="number" value="'+(item.salePrice||'')+'" oninput="setItemField('+idx+',\'salePrice\',this.value);updateOrderSummary()" placeholder="0,00"></div></div>';
    html+='<button onclick="toggleItemGift('+idx+')" style="padding:6px;border-radius:6px;cursor:pointer;border:1px solid '+giftBorder+';background:'+giftBg+';color:'+giftColor+';font-size:14px;height:36px;align-self:flex-end">🎁</button>';
    if(items.length>1)html+='<button class="btn bd2 sm" style="align-self:flex-end;padding:6px;height:36px" onclick="removeOrderItem('+idx+')">×</button>';
    html+='</div>';
  });
  return html;
}
function showOrderModal(){
  currentTab='order-form';
  const el=document.getElementById('main-content');
  window._formScroll=window.scrollY||window.pageYOffset||0;
  if(el){el.innerHTML=renderOrderModal();}
  setTimeout(()=>{window.scrollTo(0,window._formScroll||0);initCityAutocompletes();updateOrderSummary();if(typeof renderUpsellList==='function')renderUpsellList();},0);
}

function renderOrderModal(){
  const o=orderModalData;const isNew=o._isNew;
  const prod=state.prods.find(p=>p.id===o.productId);
  const si=state.stock?state.stock.find(s=>s.productId===o.productId):null;
  const cp=getCost(prod,si);
  // Multi-item support — resumo calcula RECEITA só de itens pagos e CUSTO de TODOS os itens (inclui brindes)
  const _items=(o.items&&o.items.length>0?o.items:[{productId:o.productId,quantity:o.quantity||1,salePrice:o.salePrice||0,isGift:false}]);
  const itemsTotal=_items.reduce((a,item)=>item.isGift?a:a+Number(item.salePrice||0)*Number(item.quantity||1),0);
  const st=itemsTotal;
  const ut=(o.upsells||[]).reduce((a,u)=>a+Number(u.price||0),0);
  const freteClientR=Number(o.freteClient||0);
  const baseRev=st+ut+freteClientR;
  let discountAmt=0;
  if(o.discountType==='pct'&&o.discountVal){discountAmt=baseRev*(Number(o.discountVal)/100);}
  else{discountAmt=Number(o.discount||o.discountVal||0);}
  const rev=baseRev-discountAmt;
  const ctotal=_items.reduce((a,item)=>{const _p=state.prods.find(x=>x.id===item.productId);const _si=state.stock?state.stock.find(s=>s.productId===item.productId):null;return a+getCost(_p,_si)*Number(item.quantity||1);},0);
  const mot=Number(o.motoboyCost||0)+Number(o.fuelCost||0)+Number(o.tollCost||0);const cor=Number(o.correiosCost||0);
  const fee=sumFees(o.payments,state.maqs,rev);
  const td=ctotal+mot+cor+fee;const profit=rev-td;const roi=td>0?(profit/td)*100:0;

  let prodOptions=`<option value="">-- Selecione --</option>`;
  state.prods.forEach(p=>{prodOptions+=`<option value="${p.id}" ${o.productId===p.id?'selected':''}>${esc(p.name)}</option>`;});
  let channelOptions='';state.channels.forEach(c=>{channelOptions+=`<option value="${c.id}" ${o.channel===c.id?'selected':''}>${esc(c.label)}</option>`;});
  let statusOptions='';OS.forEach(s=>{statusOptions+=`<option value="${s.id}" ${o.status===s.id?'selected':''}>${s.label}</option>`;});
  let dlvOptions='';DLV.forEach(d=>{dlvOptions+=`<option value="${d.id}" ${o.deliveryMethod===d.id?'selected':''}>${d.icon} ${d.label}</option>`;});
  // upsells são renderizados via renderUpsellList() após o modal carregar (botões de excluir + editar preço)
  let upsellRows='';
  const usSSOpts=[{v:'',l:''},{v:'_c',l:'✏️ Digitar produto...'},...state.prods.map(p=>({v:p.id,l:p.name}))];
  const usOnSelect=`ufProdChange(__VAL__);`;
  let paysHTML='';
  (o.payments||[]).forEach((pay,idx)=>{
    const m=state.maqs.find(x=>x.id===pay.maquininhaId);const md=pay.mode||'presencial';const inst=Number(pay.installments||1);
    const feeP=payFee(pay,state.maqs,(o.payments||[]).length===1?rev:0);
    let maqOpts='';state.maqs.forEach(x=>{maqOpts+=`<option value="${x.id}" ${pay.maquininhaId===x.id?'selected':''}>${x.name}</option>`;});
    let parcOpts='';for(let n=1;n<=18;n++){const r=m&&m.rates[md]?m.rates[md][n]||0:0;parcOpts+=`<option value="${n}" ${inst===n?'selected':''}>${n}x ${fmtPct(r)}</option>`;}
    paysHTML+=`<div style="display:grid;grid-template-columns:110px ${pay.type==='cartao'?'150px 90px 160px':''} 1fr ${(o.payments||[]).length>1?'32px':''};gap:8px;align-items:end;background:var(--sf3);border:1px solid var(--bd);border-radius:7px;padding:10px;margin-bottom:7px">
      <div class="field"><label>Tipo</label><select onchange="changePayType(${idx},this.value)"><option value="dinheiro" ${pay.type==='dinheiro'?'selected':''}>Dinheiro</option><option value="pix" ${pay.type==='pix'?'selected':''}>PIX</option><option value="cartao" ${pay.type==='cartao'?'selected':''}>Cartao</option></select></div>
      ${pay.type==='cartao'?`<div class="field"><label>Maquininha</label><select onchange="changePayField(${idx},'maquininhaId',this.value)">${maqOpts}</select></div><div class="field"><label>Modo</label><div class="mtabs"><button class="mtab ${md==='presencial'?'mtab-p':''}" onclick="changePayField(${idx},'mode','presencial')">Pres.</button><button class="mtab ${md==='link'?'mtab-l':''}" onclick="changePayField(${idx},'mode','link')">Link</button></div></div><div class="field"><label>Parcelas ${feeP>0?'<span style=color:var(--rd)>-'+fmtBRL(feeP)+'</span>':''}</label><select onchange="changePayField(${idx},'installments',Number(this.value))">${parcOpts}</select></div>`:''}
      <div class="field"><label>Valor (R$)</label><div class="ip"><span class="ips">R$</span><input type="number" value="${pay.amount}" oninput="changePayField(${idx},'amount',this.value)" placeholder="0,00"></div></div>
      ${(o.payments||[]).length>1?`<button class="btn bd2 sm" style="align-self:flex-end;padding:7px 8px" onclick="removePay(${idx})">×</button>`:''}
    </div>`;
  });

  const acts=[{k:'nf',l:'Emitir NF',i:'🧾'},{k:'sep',l:'Enviar p/ Separacao',i:'📦'},{k:'rastreio',l:'Enviar Rastreio Email',i:'📧'},{k:'entregue',l:'Marcar Entregue',i:'✅'}];
  let actsHTML='';
  acts.forEach(a=>{const chk=(o.postActions||{})[a.k];actsHTML+=`<div class="ck-r ${chk?'on':''}" data-act="${a.k}" onclick="toggleAct('${a.k}')"><div class="ck-b ${chk?'on':''}">${chk?'v':''}</div><span class="ck-lbl" style="font-size:12px;color:${chk?'var(--or)':'var(--txm)'}">${a.i} ${a.l}</span></div>`;});

  return `<div style="max-width:1400px;margin:0 auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:22px;font-weight:800;color:var(--or)">${isNew?'NOVO PEDIDO':'EDITAR PEDIDO #'+o.orderNum}</div>
        <div style="font-size:11px;color:var(--txm)">Cole os textos do WhatsApp e o sistema preenche automaticamente</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="field" style="margin:0">
          <label style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--txd)">Data do Pedido</label>
          <input type="date" value="${o.date}" oninput="setOrderField('date',this.value)" style="font-size:14px;font-weight:600;color:var(--or);border-color:var(--or);background:var(--ordim)">
        </div>
        <button class="btn bg2" onclick="closeOrderModal()" style="font-size:13px">← Voltar</button>
      </div>
    </div>

    <!-- PARSER WHATSAPP -->
    <div class="card" style="margin-bottom:16px;border-color:rgba(249,115,22,.2)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:18px">📱</span><div class="sl" style="margin:0">Colar do WhatsApp (opcional)</div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end">
        <div class="field"><label>Endereco / Cliente</label><textarea id="wa-text" rows="3" placeholder="Nome, telefone, CEP, rua..." style="resize:vertical;font-family:monospace;font-size:11px;background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:8px"></textarea></div>
        <div class="field"><label>Pedido</label><textarea id="wa-order" rows="3" placeholder="1x X11 Medio - Prata&#10;Total: R$297,00" style="resize:vertical;font-family:monospace;font-size:11px;background:var(--sf3);border:1.5px solid var(--or);border-radius:7px;padding:8px"></textarea></div>
        <button class="btn bp" style="padding:10px 18px;font-size:13px;font-weight:700;align-self:flex-end" id="parse-btn" onclick="parseWA()">📋 Preencher</button>
      </div>
    </div>

    ${o._cepWarning?`<div style="margin-bottom:14px;padding:10px 14px;background:rgba(250,204,21,.12);border:1px solid rgba(250,204,21,.45);border-radius:8px;display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">⚠️</span>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:#facc15">Conferir CEP de cobrança — ${esc(o._cepWarning.msg||'inválido')}</div>
        <div style="font-size:11px;color:var(--txm);margin-top:2px">CEP informado: <strong>${esc(o._cepWarning.cep||'(vazio)')}</strong>. O pedido pode ser salvo, mas é importante corrigir antes de emitir nota fiscal.</div>
      </div>
      <button class="btn bg2 sm" onclick="orderModalData._cepWarning=null;showOrderModal()">Dispensar</button>
    </div>`:''}
    ${o._cepDelWarning?`<div style="margin-bottom:14px;padding:10px 14px;background:rgba(250,204,21,.12);border:1px solid rgba(250,204,21,.45);border-radius:8px;display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">⚠️</span>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:#facc15">Conferir CEP de entrega — ${esc(o._cepDelWarning.msg||'inválido')}</div>
        <div style="font-size:11px;color:var(--txm);margin-top:2px">CEP informado: <strong>${esc(o._cepDelWarning.cep||'(vazio)')}</strong>. O endereço de entrega não foi encontrado nos Correios.</div>
      </div>
      <button class="btn bg2 sm" onclick="orderModalData._cepDelWarning=null;showOrderModal()">Dispensar</button>
    </div>`:''}

    <div style="display:grid;grid-template-columns:1fr 320px;gap:16px">
      <div>
        <!-- CLIENTE -->
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <div class="sl" style="margin:0">Cliente</div>
            <div style="position:relative;flex:1">
              <input id="client-search" placeholder="Buscar cliente na base..." oninput="searchClients(this.value)" style="font-size:11px;padding:4px 10px">
              <div id="client-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--sf2);border:1px solid var(--bdb);border-radius:7px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.5)"></div>
            </div>
          </div>
          <!-- Tipo de Pessoa -->
          <div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">
            <span style="font-size:11px;color:var(--txm);font-weight:600">Tipo de Pessoa:</span>
            ${['fisica','juridica'].map(t=>`<button onclick="setOrderField('tipoPessoa','${t}');showOrderModal()" style="padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid ${o.tipoPessoa===t?'var(--or)':'var(--bd)'};background:${o.tipoPessoa===t?'var(--or)':'transparent'};color:${o.tipoPessoa===t?'#fff':'var(--txm)'}">${t==='fisica'?'Pessoa Física':'Pessoa Jurídica'}</button>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px">
            <div class="field"><label>${o.tipoPessoa==='juridica'?'Razão Social':'Nome completo'}</label><input value="${esc(o.clientName)}" oninput="setOrderField('clientName',this.value)"></div>
            <div class="field"><label>${o.tipoPessoa==='juridica'?'CNPJ':'CPF'}</label><input value="${esc(o.cpfCnpj)}" oninput="setOrderField('cpfCnpj',this.value)"></div>
            <div class="field"><label>Celular</label><input value="${esc(o.phone||'')}" oninput="setOrderField('phone',this.value)"></div>
            <div class="field"><label>Email</label><input value="${esc(o.email||'')}" oninput="setOrderField('email',this.value)"></div>
          </div>
          ${o.tipoPessoa==='juridica'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div class="field"><label>Contribuinte ICMS</label><select onchange="setOrderField('contribuinte',this.value)" style="background:var(--sf3)">
              <option value="nao" ${o.contribuinte==='nao'?'selected':''}>Não informado</option>
              <option value="sim" ${o.contribuinte==='sim'?'selected':''}>Contribuinte ICMS</option>
              <option value="isento" ${o.contribuinte==='isento'?'selected':''}>Contribuinte isento</option>
              <option value="nao_contrib" ${o.contribuinte==='nao_contrib'?'selected':''}>Não contribuinte</option>
            </select></div>
            <div class="field"><label>Inscrição Estadual</label><input value="${esc(o.inscEstadual||'')}" oninput="setOrderField('inscEstadual',this.value)" placeholder="Opcional"></div>
          </div>`:''}
          <div style="display:grid;grid-template-columns:3fr 90px 1.4fr 1.4fr 1.5fr 55px 140px;gap:8px">
            <div class="field"><label>Rua / Endereço de Cobrança</label><input value="${esc(o.street||'')}" oninput="setOrderField('street',this.value)"></div>
            <div class="field"><label>Número</label><input value="${esc(o.streetNum||'')}" oninput="setOrderField('streetNum',this.value)"></div>
            <div class="field"><label>Bairro</label><input value="${esc(o.bairro||'')}" oninput="setOrderField('bairro',this.value)"></div>
            <div class="field"><label>Complemento</label><input value="${esc(o.complement||'')}" oninput="setOrderField('complement',this.value)"></div>
            <div class="field"><label>Cidade</label><input id="order-city" value="${esc(o.city)}" oninput="setOrderField('city',this.value);onCityInput('order-state',this.value)" autocomplete="off"></div>
            <div class="field"><label>UF</label><input id="order-state" value="${esc(o.state)}" oninput="setOrderField('state',this.value)" maxlength="2" style="text-transform:uppercase"></div>
            <div class="field"><label>CEP</label>
              <div style="display:flex;gap:5px;align-items:center">
                <input id="order-cep" value="${esc(o.cep||'')}" oninput="setOrderField('cep',this.value)" placeholder="00000-000" style="flex:1">
                <button onclick="(async()=>{const el=document.getElementById('order-cep');if(!el)return;const btn=this;btn.textContent='⏳';btn.disabled=true;await new Promise(r=>{buscarCEP(el.value,function(d){setOrderField('street',d.street||orderModalData.street);setOrderField('bairro',d.bairro||orderModalData.bairro);setOrderField('city',d.city||orderModalData.city);setOrderField('state',d.state||orderModalData.state);setOrderField('cep',d.cep);orderModalData._cepWarning=null;showOrderModal();r();},function(err){if(orderModalData){orderModalData._cepWarning=err;showOrderModal();}r();});setTimeout(r,4000);});btn.textContent='🔍';btn.disabled=false;})()" style="background:var(--sf3);border:1px solid var(--bd);border-radius:6px;color:var(--or);cursor:pointer;padding:6px 10px;font-size:14px;white-space:nowrap" title="Buscar endereço pelo CEP">🔍</button>
              </div>
            </div>
          </div>
          <!-- Endereço de entrega diferente -->
          <div style="margin-top:10px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="setOrderField('diffDeliveryAddr',!orderModalData.diffDeliveryAddr);showOrderModal()">
            <div style="width:16px;height:16px;border-radius:3px;background:${o.diffDeliveryAddr?'var(--or)':'var(--sf3)'};border:1px solid ${o.diffDeliveryAddr?'var(--or)':'var(--bd)'};display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff">${o.diffDeliveryAddr?'v':''}</div>
            <span style="font-size:12px;color:var(--txm)">O endereço de entrega é diferente do endereço de cobrança</span>
          </div>
          ${o.diffDeliveryAddr?`<div style="margin-top:10px;padding:12px;background:var(--sf3);border-radius:8px;border:1px solid var(--bd)">
            <div class="sl" style="margin-bottom:8px">Endereço de Entrega</div>
            <div style="display:grid;grid-template-columns:3fr 90px 1.4fr 1.4fr 1.5fr 55px 140px;gap:8px">
              <div class="field"><label>Rua</label><input value="${esc(o.deliveryStreet||'')}" oninput="setOrderField('deliveryStreet',this.value)"></div>
              <div class="field"><label>Número</label><input value="${esc(o.deliveryStreetNum||'')}" oninput="setOrderField('deliveryStreetNum',this.value)"></div>
              <div class="field"><label>Bairro</label><input value="${esc(o.deliveryBairro||'')}" oninput="setOrderField('deliveryBairro',this.value)"></div>
              <div class="field"><label>Complemento</label><input value="${esc(o.deliveryComplement||'')}" oninput="setOrderField('deliveryComplement',this.value)"></div>
              <div class="field"><label>Cidade</label><input id="order-del-city" value="${esc(o.deliveryCity||'')}" oninput="setOrderField('deliveryCity',this.value);onCityInput('order-del-state',this.value)" autocomplete="off"></div>
              <div class="field"><label>UF</label><input value="${esc(o.deliveryState||'')}" oninput="setOrderField('deliveryState',this.value.toUpperCase().slice(0,2))" maxlength="2"></div>
              <div class="field"><label>CEP</label>
                <div style="display:flex;gap:5px;align-items:center">
                  <input id="order-del-cep" value="${esc(o.deliveryCep||'')}" oninput="setOrderField('deliveryCep',this.value)" placeholder="00000-000" style="flex:1">
                  <button onclick="(async()=>{const el=document.getElementById('order-del-cep');if(!el)return;const btn=this;btn.textContent='⏳';btn.disabled=true;await new Promise(r=>{buscarCEP(el.value,function(d){setOrderField('deliveryStreet',d.street||orderModalData.deliveryStreet);setOrderField('deliveryBairro',d.bairro||orderModalData.deliveryBairro);setOrderField('deliveryCity',d.city||orderModalData.deliveryCity);setOrderField('deliveryState',d.state||orderModalData.deliveryState);setOrderField('deliveryCep',d.cep);orderModalData._cepDelWarning=null;showOrderModal();r();},function(err){if(orderModalData){orderModalData._cepDelWarning=err;showOrderModal();}r();});setTimeout(r,4000);});btn.textContent='🔍';btn.disabled=false;})()" style="background:var(--sf3);border:1px solid var(--bd);border-radius:6px;color:var(--or);cursor:pointer;padding:6px 10px;font-size:14px" title="Buscar endereço pelo CEP">🔍</button>
                </div>
              </div>
            </div>
          </div>`:''}
        </div>
        <!-- ITENS -->
        <div class="card" style="margin-bottom:12px;border-color:rgba(249,115,22,.15)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div class="sl" style="margin:0">Itens do Pedido</div>
            <div style="font-size:11px;color:var(--txd)">Zere o valor para brinde. 🎁 = marcar como presente.</div>
          </div>
          <div id="order-items-list">${renderItemsList(o)}</div>
          <button class="btn bg2 sm" style="width:100%;margin-bottom:14px" onclick="addOrderItem()">+ Adicionar Produto ao Pedido</button>
          <div style="border-top:1px solid var(--bd);padding-top:12px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--or)">Upsell</div>
              <div style="font-size:10px;color:var(--txd)">Produto extra que o cliente decidiu comprar além do pedido combinado</div>
            </div>
            <div style="display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap">
              <div class="field" style="flex:2;min-width:200px">${makeSearchSelect('uf-prod','',usSSOpts,"window._ufProdVal=__VAL__;ufProdChange(__VAL__);")}</div>
              <div class="field" id="uf-var-wrap" style="display:none;width:160px"><select id="uf-var" style="width:100%"><option value="">— Variação —</option></select></div>
              <div class="field" id="uf-custom-wrap" style="display:none;flex:1"><input id="uf-custom" placeholder="Descricao..."></div>
              <div class="field" style="width:100px"><div class="ip"><span class="ips">R$</span><input type="number" id="uf-price" placeholder="0,00"></div></div>
              <button class="btn bp sm" onclick="addUpsell()">+Add</button>
            </div>
            <div id="upsell-list">${upsellRows}</div>
          </div>
        </div>


        <!-- PAGAMENTO -->
        <div class="card" style="margin-bottom:12px">
          <div class="sl">Pedido e Pagamento</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px">
            <div class="field"><label>Status</label><select onchange="setOrderField('status',this.value)">${statusOptions}</select></div>
            <div class="field">
              <label>Status Pagamento</label>
              <select onchange="setOrderField('statusPagamento',this.value)" style="border-color:${o.statusPagamento==='pago'?'var(--gr)':o.statusPagamento==='entrega'?'var(--or)':'var(--bd)'}">
                <option value="" ${!o.statusPagamento?'selected':''}>— Selecione —</option>
                <option value="pago" ${o.statusPagamento==='pago'?'selected':''}>✅ Já Pagou</option>
                <option value="entrega" ${o.statusPagamento==='entrega'?'selected':''}>🚚 Pagar na Entrega</option>
                <option value="pendente" ${o.statusPagamento==='pendente'?'selected':''}>⏳ Pendente</option>
                <option value="parcial" ${o.statusPagamento==='parcial'?'selected':''}>🔄 Parcialmente Pago</option>
              </select>
            </div>
            <div class="field"><label>Data</label><input type="date" value="${o.date}" oninput="setOrderField('date',this.value)"></div>
            <div class="field"><label>Canal</label><select onchange="setOrderField('channel',this.value)">${channelOptions}</select></div>
          </div>
          <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--txd);font-weight:600;margin-bottom:8px">Forma de Pagamento</div>
          ${paysHTML}
          ${(o.payments||[]).length<3?`<button class="btn bg2 sm" style="margin-top:4px" onclick="addPay()">+ Pagamento</button>`:''}
          <!-- DESCONTO -->
          <div style="margin-top:12px;padding:12px;background:var(--sf3);border-radius:8px;border:1px solid var(--bd)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <span class="sl" style="margin:0">Desconto</span>
              <div style="display:flex;gap:4px">
                <button onclick="setOrderField('discountType','valor');showOrderModal()" style="padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid ${(o.discountType||'valor')==='valor'?'var(--or)':'var(--bd)'};background:${(o.discountType||'valor')==='valor'?'var(--or)':'transparent'};color:${(o.discountType||'valor')==='valor'?'#fff':'var(--txm)'}">R$ Valor</button>
                <button onclick="setOrderField('discountType','pct');showOrderModal()" style="padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid ${o.discountType==='pct'?'var(--or)':'var(--bd)'};background:${o.discountType==='pct'?'var(--or)':'transparent'};color:${o.discountType==='pct'?'#fff':'var(--txm)'}">% Porcentagem</button>
              </div>

function setOrderField(k,v){

  if(k==='city'&&typeof applyFreteFromCity==='function'){

function syncItemsFromDOM(){
  // Lê quantidade e valor do DOM — mas NÃO lê productId do select (seria o select de variação)
  // productId já está em orderModalData.items[idx].productId via setItemField
  if(!orderModalData||!orderModalData.items)return;
  const rows=document.querySelectorAll('[data-item-idx]');
  rows.forEach(row=>{
    const idx=Number(row.getAttribute('data-item-idx'));
    if(!orderModalData.items[idx])return;
    const qtd=row.querySelector('.item-qty');
    const val=row.querySelector('.item-val');
    if(qtd)orderModalData.items[idx].quantity=Number(qtd.value)||1;

function initOrderItems(){
  if(!orderModalData)return;
  // migrate legacy single-product to items array
  if(!orderModalData.items||orderModalData.items.length===0){
    orderModalData.items=[{id:uid(),productId:orderModalData.productId||'',quantity:Number(orderModalData.quantity||1),salePrice:orderModalData.salePrice||'',isGift:false}];
  }
}
function setItemField(idx,k,v){
  if(!orderModalData)return;
  initOrderItems();
  orderModalData.items[idx][k]=v;
  // auto-fill price when product is selected
  if(k==='productId'&&v){
    const p=state.prods.find(x=>x.id===v);
    if(p&&p.salePrice&&!orderModalData.items[idx].salePrice){
      orderModalData.items[idx].salePrice=p.salePrice;
      // update the price input in DOM directly
      const rows=document.querySelectorAll('[data-item-idx]');
      if(rows[idx]){const inp=rows[idx].querySelector('.item-val');if(inp)inp.value=p.salePrice;}
    }
  }
  // keep legacy fields in sync with first item
  if(idx===0){
    if(k==='productId')orderModalData.productId=v;
    if(k==='quantity')orderModalData.quantity=v;
    if(k==='salePrice')orderModalData.salePrice=v;
  }
  updateOrderSummary();
}
function addOrderItem(){
  if(!orderModalData)return;
  initOrderItems();
  // Save current item values from DOM before re-rendering
  syncItemsFromDOM();
  orderModalData.items.push({id:uid(),productId:'',quantity:1,salePrice:'',isGift:false});
  refreshItemsList();
}
function removeOrderItem(idx){
  if(!orderModalData)return;
  initOrderItems();
  if(orderModalData.items.length<=1)return;
  syncItemsFromDOM();
  orderModalData.items.splice(idx,1);
  orderModalData.productId=orderModalData.items[0].productId;
  orderModalData.quantity=orderModalData.items[0].quantity;
  orderModalData.salePrice=orderModalData.items[0].salePrice;
  refreshItemsList();
}
function toggleItemGift(idx){
  if(!orderModalData)return;
  initOrderItems();
  syncItemsFromDOM();
  const it=orderModalData.items[idx];
  const willBeGift=!it.isGift;
  if(willBeGift){
    // Vai virar brinde: guarda o valor atual para poder restaurar depois, zera a cobrança
    it._prevPrice=it.salePrice;
    it.salePrice='0';
  }else{
    // Vai deixar de ser brinde: restaura o valor guardado, ou o preço de tabela do produto
    if(it._prevPrice!==undefined&&Number(it._prevPrice)>0){it.salePrice=it._prevPrice;}
    else{const p=state.prods.find(x=>x.id===it.productId);it.salePrice=p&&p.salePrice?p.salePrice:'';}
    delete it._prevPrice;
  }
  it.isGift=willBeGift;
  refreshItemsList();
}
window._ufProdVal='';
window._ufVarVal='';
function ufProdChange(v){
  window._ufProdVal=v;
  const w=document.getElementById('uf-custom-wrap');if(w)w.style.display=v==='_c'?'':'none';
  const varWrap=document.getElementById('uf-var-wrap');
  const varSel=document.getElementById('uf-var');
  const priceEl=document.getElementById('uf-price');
  if(!varWrap||!varSel)return;
  const prod=state.prods.find(p=>p.id===v);
  if(prod&&prod.tipo==='variacao'&&prod.variacoes&&prod.variacoes.length>0){
    const stock=state.stock?state.stock.find(s=>s.productId===v):null;
    const vars=stock&&stock.variations&&stock.variations.length>0?stock.variations:[];
    let opts='<option value="">— Variação —</option>';
    prod.variacoes.forEach(attr=>{
      (attr.opcoes||[]).forEach(op=>{
        const label=prod.variacoes.length>1?attr.nome+': '+op:op;
        const vStock=vars.find(vv=>vv.name===label);
        const qty=vStock?Number(vStock.quantity||0):0;
        opts+=`<option value="${label}">${label} (${qty} un.)</option>`;
      });
    });
    varSel.innerHTML=opts;
    varWrap.style.display='';
  } else {
    varWrap.style.display='none';
    varSel.innerHTML='';
  }
  // Auto-fill price
  if(prod&&prod.salePrice&&priceEl&&!priceEl.value){priceEl.value=prod.salePrice;}
}
